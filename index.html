  /* 회원가입/승인 정보 → 기존 멤버리스트(memberList/main)에 추가 병합
     중요: memberList/main 전체를 새 가입자 목록으로 재작성하지 않고,
     기존 표 데이터를 읽은 뒤 회원UID 또는 이름+전화번호 기준으로 한 행만 추가/갱신한다. */
  const MEMBER_LIST_TABLE_HEADERS = ["직 책","이 름","성별","출생년도","주민번호","연락처","비상연락처<br>( 가족 )","구","거주지","집","배우자","닉네임","버스타는곳","참석  ○ △ Χ","연관검색","연관검색","연관검색","전임직책","전임총무","가입:승인","회원UID","가입일","승인결과"];
  const MEMBER_LIST_TABLE_WIDTHS = [72,78,45,57,78,118,118,54,86,133,72,94,141,86,70,110,62,70,94,86,170,94,86];

  function makeMemberListCell(value = "", tag = "td") {
    return {
      html: String(value || ""),
      tag,
      className: tag === "th" ? "header-cell" : "",
      style: tag === "th"
        ? "font-weight:700;font-size:12px;text-align:center;vertical-align:middle;white-space:nowrap;overflow-wrap:normal;word-break:keep-all;"
        : "font-size:12px;text-align:center;vertical-align:middle;white-space:nowrap;overflow-wrap:normal;word-break:keep-all;"
    };
  }

  function makeDefaultMemberListData() {
    const rows = [];
    rows.push(MEMBER_LIST_TABLE_HEADERS.map((h) => makeMemberListCell(h, "th")));
    for (let i = 0; i < 20; i += 1) rows.push(MEMBER_LIST_TABLE_HEADERS.map(() => makeMemberListCell("")));
    return { cols: MEMBER_LIST_TABLE_WIDTHS.map((w) => `width:${w}px`), rows };
  }

  function stripMemberListHtml(value) {
    const div = document.createElement("div");
    div.innerHTML = String(value || "");
    return String(div.textContent || div.innerText || "").trim();
  }

  function normalizeMemberListLabel(value) {
    return stripMemberListHtml(value).replace(/\s+/g, "");
  }

  function normalizeMemberListPhone(value) {
    return String(value || "").replace(/\D/g, "");
  }

  function formatMemberListPhone344(value) {
    const digits = normalizeMemberListPhone(value).slice(0, 11);
    if (digits.length <= 3) return digits;
    if (digits.length <= 7) return `${digits.slice(0, 3)} ${digits.slice(3)}`;
    return `${digits.slice(0, 3)} ${digits.slice(3, 7)} ${digits.slice(7, 11)}`;
  }

  function formatMemberListDate(ms) {
    if (!ms) return "";
    const d = new Date(Number(ms));
    if (Number.isNaN(d.getTime())) return "";
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
  }

  function memberListJoinResult(member) {
    const status = String(member?.status || "");
    if (status === "active") return member?.adminAccess ? "관리자" : "승인";
    if (status === "blocked") return "차단";
    if (status === "withdrawn") return "탈퇴";
    if (status === "rejected") return "거절";
    if (status === "pending") return "가입대기";
    return member?.approved ? "승인" : "가입대기";
  }

  function normalizeMemberListMainPayload(rawValue) {
    const payload = rawValue && typeof rawValue === "object" ? { ...rawValue } : {};
    let data = payload.data && typeof payload.data === "object" ? payload.data : payload;
    if (!data || !Array.isArray(data.rows)) data = makeDefaultMemberListData();
    if (!Array.isArray(data.cols)) data.cols = MEMBER_LIST_TABLE_WIDTHS.map((w) => `width:${w}px`);
    if (!Array.isArray(data.rows) || !data.rows.length) data.rows = makeDefaultMemberListData().rows;
    data.rows = data.rows.map((row, rIdx) => {
      const sourceRow = Array.isArray(row) ? row : [];
      const nextRow = [];
      const colCount = Math.max(MEMBER_LIST_TABLE_HEADERS.length, data.cols.length || 0, sourceRow.length || 0);
      for (let c = 0; c < colCount; c += 1) {
        const cell = sourceRow[c] && typeof sourceRow[c] === "object" ? { ...sourceRow[c] } : makeMemberListCell("", rIdx === 0 ? "th" : "td");
        if (cell.html == null) cell.html = "";
        if (!cell.tag) cell.tag = rIdx === 0 ? "th" : "td";
        if (rIdx === 0) cell.className = "header-cell";
        nextRow.push(cell);
      }
      return nextRow;
    });
    return { payload, data };
  }

  function getMemberListHeaderIndex(data, label, fallback) {
    const header = data.rows?.[0] || [];
    const target = normalizeMemberListLabel(label);
    for (let i = 0; i < header.length; i += 1) {
      const text = normalizeMemberListLabel(header[i]?.html || "");
      if (text === target || text.includes(target)) return i;
    }
    return fallback;
  }

  function getMemberListCellText(row, index) {
    if (!row || index < 0 || !row[index]) return "";
    return stripMemberListHtml(row[index].html || "");
  }

  function setMemberListCellText(row, index, value) {
    if (!row || index < 0) return;
    while (row.length <= index) row.push(makeMemberListCell(""));
    row[index].html = String(value || "");
    if (!row[index].tag) row[index].tag = "td";
  }

  function findMemberListRowByUid(data, uidIdx, code) {
    const key = String(code || "").trim();
    if (!key) return null;
    return (data.rows || []).slice(1).find((row) => getMemberListCellText(row, uidIdx) === key) || null;
  }

  function findMemberListRowByNamePhone(data, nameIdx, phoneIdx, name, phone) {
    const nameKey = normalizeMemberListLabel(name);
    const phoneKey = normalizeMemberListPhone(phone);
    if (!nameKey || !phoneKey) return null;
    return (data.rows || []).slice(1).find((row) => {
      return normalizeMemberListLabel(getMemberListCellText(row, nameIdx)) === nameKey &&
        normalizeMemberListPhone(getMemberListCellText(row, phoneIdx)) === phoneKey;
    }) || null;
  }

  function findFirstEmptyMemberListRow(data, nameIdx, phoneIdx, uidIdx) {
    return (data.rows || []).slice(1).find((row) => {
      return !getMemberListCellText(row, nameIdx) && !getMemberListCellText(row, phoneIdx) && !getMemberListCellText(row, uidIdx);
    }) || null;
  }

  function applyMemberToMemberListData(data, member) {
    const code = String(member?.code || "").trim();
    if (!code) return false;
    const idx = {
      name: getMemberListHeaderIndex(data, "이 름", 1),
      gender: getMemberListHeaderIndex(data, "성별", 2),
      birth: getMemberListHeaderIndex(data, "출생년도", 3),
      phone: getMemberListHeaderIndex(data, "연락처", 5),
      dong: getMemberListHeaderIndex(data, "거주지", 8),
      approval: getMemberListHeaderIndex(data, "가입:승인", 19),
      uid: getMemberListHeaderIndex(data, "회원UID", 20),
      joinDate: getMemberListHeaderIndex(data, "가입일", 21),
      result: getMemberListHeaderIndex(data, "승인결과", 22)
    };
    const incomingName = String(member.name || "").trim();
    const incomingPhone = formatMemberListPhone344(member.phone || member.phoneDigits || "");
    const resultLabel = memberListJoinResult(member);
    const joinDate = formatMemberListDate(member.approvedAt || member.createdAt || member.updatedAt);

    let row = findMemberListRowByUid(data, idx.uid, code);
    let metadataOnly = !!row;
    if (!row) {
      row = findMemberListRowByNamePhone(data, idx.name, idx.phone, incomingName, incomingPhone);
      metadataOnly = !!row;
    }
    if (!row) {
      row = findFirstEmptyMemberListRow(data, idx.name, idx.phone, idx.uid);
    }
    if (!row) {
      row = MEMBER_LIST_TABLE_HEADERS.map(() => makeMemberListCell(""));
      data.rows.push(row);
    }

    if (!metadataOnly) {
      setMemberListCellText(row, idx.name, incomingName);
      setMemberListCellText(row, idx.gender, member.gender || "");
      setMemberListCellText(row, idx.birth, member.birthYear || "");
      setMemberListCellText(row, idx.phone, incomingPhone);
      setMemberListCellText(row, idx.dong, member.dong || "");
    }
    setMemberListCellText(row, idx.approval, (resultLabel === "승인" || resultLabel === "관리자") ? "승인" : resultLabel);
    setMemberListCellText(row, idx.uid, code);
    setMemberListCellText(row, idx.joinDate, joinDate);
    setMemberListCellText(row, idx.result, resultLabel);
    return true;
  }

  async function mergeMemberIntoMemberListMain(member) {
    if (!member || !member.code) return;
    const snap = await get(ref(membershipDb, MEMBER_LIST_MAIN_PATH));
    const currentValue = snap.exists() ? snap.val() : null;
    const normalized = normalizeMemberListMainPayload(currentValue);
    const changed = applyMemberToMemberListData(normalized.data, member);
    if (!changed) return;
    const nextPayload = {
      ...(currentValue && typeof currentValue === "object" && currentValue.data ? currentValue : {}),
      type: "member-list-table-data",
      version: "membel-list-realtime-2.0",
      source: "bus-seat-approval-merge",
      reason: "bus-seat-member-approval-merge",
      updatedBy: "bus-seat-approval",
      clientId: "bus-seat-approval",
      updatedAt: Date.now(),
      updatedAtISO: new Date().toISOString(),
      data: normalized.data
    };
    await update(ref(membershipDb), { [MEMBER_LIST_MAIN_PATH]: nextPayload });
  }


  /* 테스트 회원 자동 생성 기능 제거됨.
     실제 회원 데이터는 Firebase DB 또는 JSON 복구 데이터만 사용한다. */

  async function findMembersByName(name) {
    const key = makeNameKey(name);
    const idxSnap = await get(ref(membershipDb, `${MEMBERS_ROOT}/nameIndex/${key}`));
    const codes = idxSnap.exists() ? Object.keys(idxSnap.val() || {}) : [];
    const members = [];
    for (const code of codes) {
      const snap = await get(ref(membershipDb, `${MEMBERS_ROOT}/members/${code}`));
      if (snap.exists()) members.push(snap.val());
    }
    // 구버전/초기 데이터 대비: 인덱스가 없으면 전체 검색
    if (members.length === 0) {
      const allSnap = await get(ref(membershipDb, `${MEMBERS_ROOT}/members`));
      const all = allSnap.val() || {};
      Object.keys(all).forEach((code) => {
        const m = all[code];
        if (normalizeName(m && m.name) === normalizeName(name)) members.push(m);
      });
    }
    return members;
  }

  async function loginMember() {
    const name = normalizeName(byId("memberLoginNameInput")?.value);
    const password = String(byId("memberLoginPasswordInput")?.value || "");

    // 관리자 로그인: 아이디를 비워두고 비밀번호 칸에 관리자 비밀번호만 입력한 뒤 [로그인]을 누르면 진입 가능
    // 일반 회원은 기존처럼 이름 + 개인 비밀번호가 모두 필요함.
    if (!name && password) {
      if (await isBusSeatAdminPassword(password)) {
        const adminSession = {
          code: "ADMIN",
          name: "관리자",
          role: "admin",
          adminAccess: true,
          loginAt: Date.now()
        };
        currentApprovedMemberSession = adminSession;
        try {
          // 보안 수정: 로그인 세션은 현재 탭(sessionStorage)에만 저장한다.
          // localStorage에 남기면 로그인 화면에서 새로고침 시 자동 진입되는 문제가 생긴다.
          localStorage.removeItem(LOGIN_SESSION_KEY);
          sessionStorage.setItem(LOGIN_SESSION_KEY, JSON.stringify(adminSession));
        } catch (e) {}
        unlockApp(adminSession);
        if (typeof window.__busSeatEnterAdminFromMembership === "function") {
          window.__busSeatEnterAdminFromMembership();
        } else if (typeof window.__busSeatSwitchMode === "function") {
          window.__busSeatSwitchMode("member");
        }
        setAuthMessage("관리자 비밀번호로 로그인되었습니다. 회원 입력 모드로 진입했습니다.", true);
        return;
      }
      setAuthMessage("올바른 비밀번호 회원은 이름도 입력하세요.");
      return;
    }

    if (!name || !password) {
      setAuthMessage("아이디와 비밀번호를 입력하세요.");
      return;
    }
    if (!/^[가-힣]/.test(name)) {
      setAuthMessage("아이디는 한글 이름으로 시작해야 합니다.");
      return;
    }

    setAuthMessage("로그인 확인중입니다...");

    const members = await findMembersByName(name);
    if (members.length === 0) {
      setAuthMessage("등록된 회원이 없습니다. 회원가입을 먼저 진행하세요.");
      return;
    }

    const passwordHash = await sha256Hex(password);
    const matched = members.find((m) => String(m.passwordHash || "") === passwordHash);

    if (!matched) {
      setAuthMessage("비밀번호가 맞지 않습니다.");
      return;
    }

    if (!matched.approved || matched.status === "pending") {
      setAuthMessage(`관리자 승인 대기중입니다. 회원코드: ${matched.code}`);
      return;
    }
    if (matched.status === "blocked") {
      setAuthMessage("접근 차단된 회원입니다. 관리자에게 문의하세요.");
      return;
    }
    if (matched.status === "withdrawn") {
      setAuthMessage("탈퇴 처리된 회원입니다.");
      return;
    }
    if (matched.status !== "active") {
      setAuthMessage("사용 가능한 회원 상태가 아닙니다.");
      return;
    }

    const session = {
      code: matched.code,
      name: matched.name,
      role: matched.role || "member",
      adminAccess: !!matched.adminAccess,
      loginAt: Date.now()
    };
    currentApprovedMemberSession = session;
    try {
      // 보안 수정: 로그인 세션은 현재 탭(sessionStorage)에만 저장한다.
      // localStorage에 남기면 로그인 화면에서 새로고침 시 자동 진입되는 문제가 생긴다.
      localStorage.removeItem(LOGIN_SESSION_KEY);
      sessionStorage.setItem(LOGIN_SESSION_KEY, JSON.stringify(session));
    } catch (e) {}

    unlockApp(session);
  }

  async function joinMember() {
    const rawName = String(byId("memberJoinNameInput")?.value || "");
    const rawPassword = String(byId("memberJoinPasswordInput")?.value || "");
    const rawPhone = String(byId("memberJoinPhoneInput")?.value || "");
    const rawDong = String(byId("memberJoinDongInput")?.value || "");

    const name = normalizeName(rawName);
    const password = rawPassword;
    const gender = String(byId("memberJoinGenderInput")?.value || "").trim();
    const birthYear = normalizeBirthYear(byId("memberJoinBirthInput")?.value);
    const phoneDigits = normalizePhone(rawPhone);
    const phone = formatPhone344(phoneDigits);
    const dong = normalizeTextNoSpace(rawDong);

    const spaceError = validateNoWhitespaceFields([
      { label: "본명", value: rawName },
      { label: "비밀번호", value: rawPassword },
      { label: "거주지", value: rawDong }
    ]);
    if (spaceError) {
      setAuthMessage(spaceError);
      return;
    }

    if (!name || !password || !gender || !birthYear || !phoneDigits || !dong) {
      setAuthMessage("본명, 비밀번호, 성별, 출생년도, 전화번호, 거주지를 모두 입력하세요.");
      return;
    }
    if (hasInvalidPhoneChars(rawPhone)) {
      setAuthMessage("전화번호는 숫자만 입력하세요. 저장 시 010 1234 5678 형식으로 자동 정리됩니다.");
      return;
    }
    if (!isValidKoreanMobileDigits(phoneDigits)) {
      setAuthMessage("전화번호는 휴대폰 숫자 11자리로 입력하세요. 저장 시 010 1234 5678 형식으로 자동 정리됩니다.");
      return;
    }
    if (!/^[가-힣]{2,}$/.test(name)) {
      setAuthMessage("아이디/본명은 띄어쓰기 없이 한글 이름으로 입력하세요.");
      return;
    }
    if (password.length < 4) {
      setAuthMessage("비밀번호는 4자리 이상 입력하세요.");
      return;
    }

    setAuthMessage("기존 회원 중복 확인중입니다...");
    const samePhoneMembers = await findMembersByPhoneDigits(phoneDigits);
    const samePersonMembers = samePhoneMembers.filter((m) => normalizeName(m && m.name) === name);
    if (samePersonMembers.length > 0) {
      const detail = samePersonMembers.map(summarizeMemberForDuplicateCheck).join("\n");
      const ok = confirm(`동일인으로 보이는 기존 가입 자료가 있습니다.\n\n${detail}\n\n변경된 정보가 있으면 새 가입 자료를 추가 등록한 뒤 멤버리스트에서 편집하세요.\n계속 추가 등록할까요?`);
      if (!ok) {
        setAuthMessage("동일인 자료가 있어 가입 추가를 취소했습니다.");
        return;
      }
    } else if (samePhoneMembers.length > 0) {
      const detail = samePhoneMembers.map(summarizeMemberForDuplicateCheck).join("\n");
      const ok = confirm(`같은 전화번호를 사용하는 기존 자료가 있습니다.\n\n${detail}\n\n동명이인/가족 등 별도 회원이면 추가 등록하세요. 계속할까요?`);
      if (!ok) {
        setAuthMessage("같은 전화번호 자료가 있어 가입 추가를 취소했습니다.");
        return;
      }
    }

    setAuthMessage("가입 신청 저장중입니다...");

    const code = await allocateMemberCode(phoneDigits);

    const now = Date.now();
    const passwordHash = await sha256Hex(password);
    const payload = {
      code,
      name,
      nameKey: name,
      gender,
      birthYear,
      phone,
      phoneDigits,
      phoneLast4: phoneDigits.slice(-4),
      dong,
      passwordHash,
      approved: false,
      status: "pending",
      role: "pending",
      memberType: "new",
      duplicateCheck: {
        samePhoneCount: samePhoneMembers.length,
        samePersonCount: samePersonMembers.length,
        checkedAt: now
      },
      adminAccess: false,
      apps: {
        busSeat: false,
        tripSchedule: false,
        memberList: false,
        busRute: false
      },
      createdAt: now,
      updatedAt: now,
      approvedAt: null,
      approvedBy: null,
      withdrawnAt: null,
      withdrawnBy: null
    };

    await update(ref(membershipDb), {
      [`${MEMBERS_ROOT}/members/${code}`]: payload,
      [`${MEMBERS_ROOT}/nameIndex/${makeNameKey(name)}/${code}`]: true,
      [`${MEMBERS_ROOT}/pending/${code}`]: true
    });
    await saveMemberListJoinCode(payload);

    setAuthMessage(`가입 신청 완료. 관리자 승인 대기중입니다. 회원코드: ${code}`, true);
    clearMemberJoinInputs();
    byId("memberSignupPanel")?.classList.remove("is-open");
    setMemberAuthViewMode("main");
  }

  async function changeMemberPassword() {
    const rawName = String(byId("memberChangeNameInput")?.value || "");
    const oldPassword = String(byId("memberChangeOldPasswordInput")?.value || "");
    const newPassword = String(byId("memberChangeNewPasswordInput")?.value || "");
    const confirmPassword = String(byId("memberChangeConfirmPasswordInput")?.value || "");

    const spaceError = validateNoWhitespaceFields([
      { label: "아이디", value: rawName },
      { label: "기존비번", value: oldPassword },
      { label: "변경비번", value: newPassword },
      { label: "비번확인", value: confirmPassword }
    ]);
    if (spaceError) {
      setAuthMessage(spaceError);
      return;
    }

    const name = normalizeName(rawName);
    if (!name || !oldPassword || !newPassword || !confirmPassword) {
      setAuthMessage("아이디, 기존비번, 변경비번, 비번확인을 모두 입력하세요.");
      return;
    }
    if (!/^[가-힣]{2,}$/.test(name)) {
      setAuthMessage("아이디는 띄어쓰기 없이 한글 이름으로 입력하세요.");
      return;
    }
    if (newPassword.length < 4) {
      setAuthMessage("변경 비밀번호는 4자리 이상 입력하세요.");
      return;
    }
    if (newPassword !== confirmPassword) {
      setAuthMessage("변경 비밀번호와 비번확인이 서로 다릅니다.");
      return;
    }
    if (oldPassword === newPassword) {
      setAuthMessage("기존 비밀번호와 다른 비밀번호를 입력하세요.");
      return;
    }

    setAuthMessage("기존 비밀번호 확인중입니다...");
    const members = await findMembersByName(name);
    if (!members.length) {
      setAuthMessage("등록된 회원이 없습니다. 회원가입을 먼저 진행하세요.");
      return;
    }

    const oldHash = await sha256Hex(oldPassword);
    const matches = members.filter((m) => String(m.passwordHash || "") === oldHash);
    if (!matches.length) {
      setAuthMessage("기존 비밀번호가 맞지 않습니다.");
      return;
    }
    if (matches.length > 1) {
      setAuthMessage("같은 이름과 비밀번호의 회원이 여러 명입니다. 관리자에게 문의하세요.");
      return;
    }

    const member = matches[0];
    if (member.status === "withdrawn") {
      setAuthMessage("탈퇴 처리된 회원은 비밀번호를 변경할 수 없습니다.");
      return;
    }
    if (member.status === "blocked") {
      setAuthMessage("차단된 회원은 비밀번호를 변경할 수 없습니다. 관리자에게 문의하세요.");
      return;
    }

    const newHash = await sha256Hex(newPassword);
    await update(ref(membershipDb), {
      [`${MEMBERS_ROOT}/members/${member.code}/passwordHash`]: newHash,
      [`${MEMBERS_ROOT}/members/${member.code}/updatedAt`]: Date.now(),
      [`${MEMBERS_ROOT}/members/${member.code}/passwordChangedAt`]: Date.now()
    });

    byId("memberChangeOldPasswordInput").value = "";
    byId("memberChangeNewPasswordInput").value = "";
    byId("memberChangeConfirmPasswordInput").value = "";
    byId("memberPasswordChangePanel")?.classList.remove("is-open");
    setMemberAuthViewMode("main");
    setAuthMessage("비밀번호가 변경되었습니다. 새 비밀번호로 로그인하세요.", true);
  }

  async function isBusSeatAdminPassword(inputPassword) {
    const normalizedInput = String(inputPassword || "").trim();
    if (!normalizedInput) return false;
    const inputHash = await sha256Hex(normalizedInput);

    // 핵심 수정: 회원 로그인 화면의 관리자 로그인은 반드시 Firebase busSeatApp 최신 관리자 비밀번호를 먼저 확인한다.
    // 이렇게 해야 다른 기기/관리자모드에서 변경한 bus-seat 관리자 비밀번호와 즉시 연동된다.
    try {
      const rootSnap = await get(ref(membershipDb, "busSeatApp"));
      const root = rootSnap.exists() ? (rootSnap.val() || {}) : {};
      const remoteHash = String(root.adminPasswordHash || "").trim();
      const remotePlain = String(root.adminPassword || "").trim();
      if (remoteHash && inputHash === remoteHash) return true;
      if (remotePlain && normalizedInput === remotePlain) return true;
    } catch (error) {
      console.warn("bus-seat 관리자 비밀번호 원격 확인 오류:", error);
    }

    // 보조: 현재 bus-seat 앱 내부 검증 함수 확인
    try {
      if (typeof window.__busSeatVerifyAdminPassword === "function") {
        const ok = await window.__busSeatVerifyAdminPassword(normalizedInput);
        if (ok) return true;
      }
    } catch (error) {
      console.warn("bus-seat 내부 관리자 비밀번호 확인 오류:", error);
    }

    // 보조: 기존 bus-seat 로컬 저장 해시 확인
    try {
      const localHash = String(localStorage.getItem("bus-seat-admin-password-hash-v1") || "").trim();
      if (localHash && inputHash === localHash) return true;
    } catch (error) {}

    // 최초 설치 기본값
    return normalizedInput === "1234";
  }

  function formatDateTime(ms) {
    if (!ms) return "-";
    try {
      const d = new Date(Number(ms));
      const yy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      const hh = String(d.getHours()).padStart(2, "0");
      const mi = String(d.getMinutes()).padStart(2, "0");
      return `${yy}-${mm}-${dd} ${hh}:${mi}`;
    } catch (error) {
      return "-";
    }
  }

    const status = String(member?.status || "");
    if (status === "pending") return "승인대기";

    if (status === "blocked") return "차단";
    if (status === "withdrawn") return "탈퇴";
    if (status === "rejected") return "거절";
    return status || "-";

  function applyMemberApprovalSearchFilter() {
    const inputEl = byId("memberApprovalSearchInput");
    const listEl = byId("memberApprovalList");

    if (!listEl) return;

    const query = normalizeMemberApprovalSearchText(inputEl ? inputEl.value : "");

  async function loadApprovalMembers() {
    const listEl = byId("memberApprovalList");
    if (!listEl) return;
    listEl.innerHTML = '<div class="member-approval-empty">회원 목록 불러오는 중...</div>';
    const snap = await get(ref(membershipDb, `${MEMBERS_ROOT}/members`));
    const all = snap.val() || {};
    const members = Object.values(all).sort((a, b) => {
      // 회원관리 정렬:
      // 1) 신규/가입대기 회원을 항상 상단에 표시
      // 2) 승인완료(active + approved) 회원은 하단으로 이동
      // 3) 같은 그룹 안에서는 신규순(createdAt 최신순), 생성일이 없으면 회원번호순
      function approvalSortRank(member) {
        const status = String(member?.status || "");
        const approved = !!member?.approved;
        if (status === "pending" || (!approved && status !== "blocked" && status !== "withdrawn" && status !== "rejected")) return 0;
        if (status === "blocked") return 1;
        if (status === "withdrawn") return 2;
        if (status === "rejected") return 3;
        if (status === "active" && approved) return 4;
        return 5;
      }
      const rankDiff = approvalSortRank(a) - approvalSortRank(b);
      if (rankDiff) return rankDiff;
      const createdDiff = Number(b.createdAt || 0) - Number(a.createdAt || 0);
      if (createdDiff) return createdDiff;
      return String(a.name || a.code || "").localeCompare(String(b.name || b.code || ""), "ko");
    });
    if (members.length === 0) {
      listEl.innerHTML = '<div class="member-approval-empty">회원 데이터가 없습니다.</div>';
      return;
    }
    const approvedNamesForDuplicateJoin = new Set();
    members.forEach((m) => {
      const name = String(m?.name || "").replace(/\s+/g, "").trim();
      if (name && m?.approved && m?.status === "active") approvedNamesForDuplicateJoin.add(name);
    });
    listEl.innerHTML = members.map((m) => {
      const adminText = m.adminAccess ? "관리자" : "회원";
      const approvedCardClass = (m.approved && m.status === "active") ? " approved-member" : "";
      const duplicateJoin = !!(String(m?.name || "").replace(/\s+/g, "").trim() && approvedNamesForDuplicateJoin.has(String(m?.name || "").replace(/\s+/g, "").trim()) && (m.status === "pending" || !m.approved));
      const resultText = joinResultLabel(m);
      const resultSegment = resultText === "승인" ? "" : ` · 승인결과: ${escapeHtml(resultText)}`;
      return `
        <div class="member-approval-card${approvedCardClass}${duplicateJoin ? ' duplicate-join-person' : ''}" data-member-code="${escapeHtml(m.code)}" data-member-name="${escapeHtml(m.name || '')}">
          <div class="member-approval-card-title">${escapeHtml(m.name)} / ${escapeHtml(m.code)} / ${escapeHtml(statusLabelForMember(m))}${duplicateJoin ? '<span class="duplicate-join-badge">중복가입</span>' : ''}</div>
          <div>성별: ${escapeHtml(m.gender || '-')} · 출생년도: ${escapeHtml(m.birthYear || '-')} · 거주지: ${escapeHtml(m.dong || '-')}</div>
          <div>전화: ${escapeHtml(m.phone || '-')}</div>
          <div>등급: ${escapeHtml(m.role || '-')} · ${adminText} · 가입일: ${escapeHtml(formatDateTime(m.createdAt))}${resultSegment}</div>
          <div class="member-approval-card-actions">
            ${(m.approved && m.status === "active") ? "" : `<button class="approve" data-member-action="approve" data-code="${escapeHtml(m.code)}">승인</button>`}
            <button class="block" data-member-action="block" data-code="${escapeHtml(m.code)}">차단</button>
            <button class="admin" data-member-action="toggle-admin" data-code="${escapeHtml(m.code)}">관리자</button>
            <button class="withdraw" data-member-action="withdraw" data-code="${escapeHtml(m.code)}">탈퇴</button>
            <button class="delete" data-member-action="delete" data-code="${escapeHtml(m.code)}">삭제</button>
          </div>
        </div>`;
    }).join("");
    applyMemberApprovalSearchFilter();
  }

  async function updateMemberApprovalStatus(code, action) {
    const snap = await get(ref(membershipDb, `${MEMBERS_ROOT}/members/${code}`));
    if (!snap.exists()) {
      setAuthMessage("해당 회원을 찾을 수 없습니다.");
      return;
    }
    const member = snap.val();
    const now = Date.now();
    const updates = {};
    if (action === "approve") {
      Object.assign(member, {
        approved: true,
        status: "active",
        role: member.role === "admin" ? "admin" : "member",
        apps: { busSeat: true, tripSchedule: true, memberList: false, busRute: true },
        approvedAt: member.approvedAt || now,
        approvedBy: "membership-admin",
        updatedAt: now
      });
      updates[`${MEMBERS_ROOT}/pending/${code}`] = null;
    } else if (action === "block") {
      Object.assign(member, {
        approved: false,
        status: "blocked",
        apps: { busSeat: false, tripSchedule: false, memberList: false, busRute: false },
        adminAccess: false,
        updatedAt: now
      });
    } else if (action === "toggle-admin") {
      const nextAdmin = !member.adminAccess;
      Object.assign(member, {
        approved: true,
        status: "active",
        role: nextAdmin ? "admin" : "member",
        adminAccess: nextAdmin,
        apps: { ...(member.apps || {}), busSeat: true, tripSchedule: true, busRute: true, memberList: nextAdmin },
        updatedAt: now
      });
      updates[`${MEMBERS_ROOT}/pending/${code}`] = null;
    } else if (action === "withdraw") {
      Object.assign(member, {
        approved: false,
        status: "withdrawn",
        role: "withdrawn",
        adminAccess: false,
        passwordHash: null,
        apps: { busSeat: false, tripSchedule: false, memberList: false, busRute: false },
        withdrawnAt: now,
        withdrawnBy: "membership-admin",
        updatedAt: now
      });
      updates[`${MEMBERS_ROOT}/pending/${code}`] = null;
    } else if (action === "delete") {
      updates[`${MEMBERS_ROOT}/members/${code}`] = null;
      updates[`${MEMBERS_ROOT}/pending/${code}`] = null;
      if (member?.name) updates[`${MEMBERS_ROOT}/nameIndex/${makeNameKey(member.name)}/${code}`] = null;
      updates[`${MEMBER_LIST_JOIN_CODES_PATH}/${code}`] = null;
      await update(ref(membershipDb), updates);
      setAuthMessage(`${member.name || code} / ${code} 삭제 완료`, true);
      await loadApprovalMembers();
      return;
    }
    updates[`${MEMBERS_ROOT}/members/${code}`] = member;
    updates[`${MEMBER_LIST_JOIN_CODES_PATH}/${code}`] = {
      code: member.code,
      name: member.name,
      gender: member.gender || "",
      birthYear: member.birthYear || "",
      phone: member.phone || "",
      phoneLast4: member.phoneLast4 || "",
      dong: member.dong || "",
      status: member.status || "pending",
      approved: !!member.approved,
      role: member.role || "member",
      adminAccess: !!member.adminAccess,
      memberType: member.memberType || "",
      createdAt: member.createdAt || now,
      updatedAt: now
    };
    await update(ref(membershipDb), updates);
    await mergeMemberIntoMemberListMain(member);
    setAuthMessage(`${member.name} / ${code} 처리 완료`, true);
    await loadApprovalMembers();
  }

      }
      memberApprovalAdminAuthed = true;
      loadApprovalMembers().catch((error) => {
        console.error("회원 목록 새로고침 오류:", error);
        setAuthMessage("회원 목록을 불러오지 못했습니다.");
      });
    });
    byId("memberApprovalList")?.addEventListener("click", (event) => {
      const btn = event.target.closest("button[data-member-action]");
      if (!btn) return;
      if (typeof window.__busSeatIsAdminAuthenticated === "function" && !window.__busSeatIsAdminAuthenticated()) return;
      memberApprovalAdminAuthed = true;
      const action = btn.getAttribute("data-member-action");
      const code = btn.getAttribute("data-code");
      if (!code) return;
      if (action === "withdraw" && !confirm("이 회원을 탈퇴 처리하고 비밀번호 해시를 삭제할까요?")) return;
      if (action === "delete" && !confirm("이 회원 데이터를 가입자 DB와 회원코드 DB에서 완전히 삭제할까요?")) return;
      if (action === "block" && !confirm("이 회원의 앱 접근을 차단할까요?")) return;
      updateMemberApprovalStatus(code, action).catch((error) => {
        console.error("회원 승인 처리 오류:", error);
        setAuthMessage("회원 처리 오류: Firebase 연결 또는 저장 규칙을 확인하세요.");
      });
    });
  }

  function bindKoreanFirstNameInput(inputId) {
    const el = byId(inputId);
    if (!el) return;
    el.setAttribute("lang", "ko");
    el.setAttribute("inputmode", "text");
    el.setAttribute("autocomplete", "off");
    // 중요: 한글 IME 조합 중에는 값을 강제로 바꾸면 키보드 입력이 막힌다.
    // 따라서 입력 중 자동삭제는 하지 않고, 로그인/가입 버튼을 누를 때 한글 이름 여부를 검사한다.
    let isComposing = false;
    el.addEventListener("compositionstart", () => { isComposing = true; });
    el.addEventListener("compositionend", () => { isComposing = false; });
    el.addEventListener("input", () => {
      if (isComposing) return;
      // 입력은 자유롭게 허용한다. 앞 글자 한글 조건은 loginMember/joinMember에서 검증한다.
    });
    el.addEventListener("focus", () => {
      el.setAttribute("lang", "ko");
      el.setAttribute("inputmode", "text");
    });
  }

  function bindPhone344Input(inputId) {
    const el = byId(inputId);
    if (!el) return;
    el.setAttribute("inputmode", "numeric");
    el.addEventListener("input", () => {
      const digits = normalizePhone(el.value).slice(0, 11);
      el.value = formatPhone344(digits);
    });
    el.addEventListener("blur", () => {
      el.value = formatPhone344(normalizePhone(el.value));
    });
  }

  function setMemberAuthViewMode(mode) {
    const box = byId("memberAuthGate")?.querySelector(".member-auth-box");
    if (!box) return;
    box.classList.remove("signup-open", "change-open");
    if (mode === "signup") box.classList.add("signup-open");
    if (mode === "change") box.classList.add("change-open");
  }


  function clearMemberJoinInputs() {
    [
      "memberJoinNameInput",
      "memberJoinPasswordInput",
      "memberJoinGenderInput",
      "memberJoinBirthInput",
      "memberJoinPhoneInput",
      "memberJoinDongInput"
    ].forEach((id) => {
      const el = byId(id);
      if (el) el.value = "";
    });
  }

  function bindMembershipGate() {
    bindApprovalAdminMode();
    bindKoreanFirstNameInput("memberLoginNameInput");
    bindKoreanFirstNameInput("memberJoinNameInput");
    bindKoreanFirstNameInput("memberChangeNameInput");
    bindPhone344Input("memberJoinPhoneInput");

    byId("memberLoginBtn")?.addEventListener("click", () => {
      loginMember().catch((error) => {
        console.error("회원 로그인 오류:", error);
        setAuthMessage("로그인 오류: Firebase 연결 또는 저장 규칙을 확인하세요.");
      });
    });

    byId("memberJoinOpenBtn")?.addEventListener("click", () => {
      clearMemberAuthTypingInputsOnScreenSwitch();
      byId("memberPasswordChangePanel")?.classList.remove("is-open");
      byId("memberSignupPanel")?.classList.add("is-open");
      setMemberAuthViewMode("signup");
      setAuthMessage("회원 정보를 입력 후 가입신청을 누르세요.");
    });

    byId("memberPasswordChangeOpenBtn")?.addEventListener("click", () => {
      clearMemberAuthTypingInputsOnScreenSwitch();
      byId("memberSignupPanel")?.classList.remove("is-open");
      byId("memberPasswordChangePanel")?.classList.add("is-open");
      setMemberAuthViewMode("change");
      setAuthMessage("본인 확인 후 비밀번호를 변경하세요.");
    });

    byId("memberPasswordChangeCloseBtn")?.addEventListener("click", () => {
      clearMemberAuthTypingInputsOnScreenSwitch();
      byId("memberPasswordChangePanel")?.classList.remove("is-open");
      setMemberAuthViewMode("main");
      setAuthMessage("아이디와 비밀번호를 입력하세요.");
    });

    byId("memberJoinCloseBtn")?.addEventListener("click", () => {
      clearMemberAuthTypingInputsOnScreenSwitch();
      byId("memberSignupPanel")?.classList.remove("is-open");
      setMemberAuthViewMode("main");
      setAuthMessage("아이디와 비밀번호를 입력하세요.");
    });

    byId("memberChangePasswordSubmitBtn")?.addEventListener("click", () => {
      changeMemberPassword().catch((error) => {
        console.error("회원 비밀번호 변경 오류:", error);
        setAuthMessage("비밀번호 변경 오류: Firebase 연결 또는 저장 규칙을 확인하세요.");
      });
    });

    byId("memberTopLogoutBtn")?.addEventListener("click", () => {
      if (confirm("로그아웃하시겠습니까?")) showMembershipLoginScreenAfterLogout();
    });

    byId("memberJoinSubmitBtn")?.addEventListener("click", () => {
      joinMember().catch((error) => {
        console.error("회원가입 저장 오류:", error);
        setAuthMessage("회원가입 저장 오류: Firebase 연결 또는 저장 규칙을 확인하세요.");
      });
    });

    byId("memberLoginPasswordInput")?.addEventListener("keydown", (event) => {
      if (event.key === "Enter") loginMember().catch(console.error);
    });
    ["memberChangeNameInput", "memberChangeOldPasswordInput", "memberChangeNewPasswordInput", "memberChangeConfirmPasswordInput"].forEach((id) => {
      byId(id)?.addEventListener("keydown", (event) => {
        if (event.key === "Enter") changeMemberPassword().catch(console.error);
      });
    });
  }

  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "hidden" && document.body.classList.contains("membership-locked")) {
      clearMemberAuthTypingInputsOnScreenSwitch();
    }
  });

  window.addEventListener("pagehide", () => {
    if (document.body.classList.contains("membership-locked")) {
      clearMemberAuthTypingInputsOnScreenSwitch();
    }
  });

  window.addEventListener("blur", () => {
    if (document.body.classList.contains("membership-locked")) {
      clearMemberAuthTypingInputsOnScreenSwitch();
    }
  });

  window.addEventListener("pageshow", () => {
    if (document.body.classList.contains("membership-locked")) {
      clearMemberAuthInputValues();
      byId("memberSignupPanel")?.classList.remove("is-open");
      byId("memberPasswordChangePanel")?.classList.remove("is-open");
      setMemberAuthViewMode("main");
    }
  });

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", () => {
      clearMemberAuthInputValues();
      bindMembershipGate();
      restoreSessionIfValid().catch((error) => {
        console.error("회원 세션 복구 오류:", error);
        setAuthMessage("회원정보 확인 오류: Firebase 연결을 확인하세요.");
      });
    });
  } else {
    clearMemberAuthInputValues();
    bindMembershipGate();
    restoreSessionIfValid().catch((error) => {
      console.error("회원 세션 복구 오류:", error);
      setAuthMessage("회원정보 확인 오류: Firebase 연결을 확인하세요.");
    });
  }

  window.__busSeatMembershipGate = {
    loginMember,
    joinMember,
    restoreSessionIfValid,
    loadApprovalMembers,
    updateMemberApprovalStatus
  };
</script>


<script type="module" id="bus-seat-member-manage-forced-render-script">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import { getDatabase, ref, get, set, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

  const MANAGE_FIREBASE_CONFIG = {
    apiKey: "AIzaSyBH3866EIMkhI--ms4xAZ7k7XS9sQFvgwQ",
    authDomain: "bus-seat-eb86c.firebaseapp.com",
    databaseURL: "https://bus-seat-eb86c-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "bus-seat-eb86c",
    storageBucket: "bus-seat-eb86c.firebasestorage.app",
    messagingSenderId: "132111967366",
    appId: "1:132111967366:web:e034a00f8c8cc4aa441d07"
  };

  const MANAGE_MEMBERS_ROOT = "busSeatApp/membership";
  const MANAGE_JOIN_CODES_PATH = "memberList/joinCodes";
  const MANAGE_MEMBER_LIST_MAIN_PATH = "memberList/main";
  const manageApp = initializeApp(MANAGE_FIREBASE_CONFIG, "busSeatMemberManageForcedRenderApp");
  const manageDb = getDatabase(manageApp);

  function q(sel) { return document.querySelector(sel); }
  function esc(value) {
    return String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }
  function fmt(ms) {
    if (!ms) return "-";
    const d = new Date(Number(ms));
    if (Number.isNaN(d.getTime())) return "-";
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
  }
  function label(m) {
    const s = String(m?.status || "pending");
    if (s === "pending") return "가입대기";
    if (s === "active") return m?.approved ? "승인완료" : "미승인";
    if (s === "blocked") return "차단";
    if (s === "withdrawn") return "탈퇴";
    if (s === "rejected") return "거절";
    return s;
  }
  function listNode() {
    return q('#memberManagePanel #memberApprovalList') || document.getElementById('memberApprovalList');
  }
  function setListMessage(text) {
    const list = listNode();
    if (list) list.innerHTML = `<div class="member-approval-empty">${esc(text)}</div>`;
  }
  function normalizeRecord(code, raw) {
    const m = raw && typeof raw === "object" ? raw : {};
    return {
      code: String(m.code || code || ""),
      name: String(m.name || m.displayName || ""),
      gender: String(m.gender || ""),
      birthYear: String(m.birthYear || ""),
      phone: String(m.phone || ""),
      phoneLast4: String(m.phoneLast4 || ""),
      dong: String(m.dong || ""),
      approved: !!m.approved,
      status: String(m.status || (m.approved ? "active" : "pending")),
      role: String(m.role || (m.approved ? "member" : "pending")),
      adminAccess: !!m.adminAccess,
      memberType: String(m.memberType || ""),
      createdAt: m.createdAt || 0,
      updatedAt: m.updatedAt || 0,
      raw: m
    };
  }
  function joinResultLabel(m) {
    const status = String(m?.status || "");
    if (status === "active") return m?.adminAccess ? "관리자" : "승인";
    if (status === "blocked") return "차단";
    if (status === "withdrawn") return "탈퇴";
    if (status === "rejected") return "거절";
    if (status === "pending") return "가입대기";
    return status || (m?.approved ? "승인" : "가입대기");
  }
  function addMemberMapRecord(map, code, raw, defaults = {}) {
    if (!code) return;
    const normalized = normalizeRecord(code, { ...(defaults || {}), ...(raw || {}) });
    const prev = map.get(String(code));
    if (!prev) {
      map.set(String(code), normalized);
      return;
    }
    // 여러 경로에서 같은 회원이 발견되면, 비어 있는 값만 보강한다.
    map.set(String(code), {
      ...prev,
      ...Object.fromEntries(Object.entries(normalized).filter(([, v]) => v !== "" && v !== 0 && v !== false && v != null)),
      approved: prev.approved || normalized.approved,
      adminAccess: prev.adminAccess || normalized.adminAccess,
      raw: { ...(prev.raw || {}), ...(normalized.raw || {}) }
    });
  }

  async function readAllMembers() {
    const [membersSnap, pendingSnap, joinCodesSnap, rootMembershipSnap, rootMembersSnap] = await Promise.all([
      get(ref(manageDb, `${MANAGE_MEMBERS_ROOT}/members`)).catch(() => null),
      get(ref(manageDb, `${MANAGE_MEMBERS_ROOT}/pending`)).catch(() => null),
      get(ref(manageDb, MANAGE_JOIN_CODES_PATH)).catch(() => null),
      get(ref(manageDb, "membership/members")).catch(() => null),
      get(ref(manageDb, "members")).catch(() => null)
    ]);
    const map = new Map();

    // 1순위: 현재 회원가입 DB 기본 경로
    const members = membersSnap && membersSnap.exists() ? membersSnap.val() || {} : {};
    Object.keys(members).forEach((code) => addMemberMapRecord(map, code, members[code]));

    // 2순위: 승인 처리 때 별도로 미러링되는 memberList/joinCodes 경로
    // 24인승 전환 중 busSeatApp/membership 이 비었더라도 이 경로에 남아 있으면 회원관리에서 표시한다.
    const joinCodes = joinCodesSnap && joinCodesSnap.exists() ? joinCodesSnap.val() || {} : {};
    Object.keys(joinCodes).forEach((code) => addMemberMapRecord(map, code, joinCodes[code], { status: "active", approved: true, role: "member" }));

    // 3순위: 과거/백업 호환 경로
    const rootMembershipMembers = rootMembershipSnap && rootMembershipSnap.exists() ? rootMembershipSnap.val() || {} : {};
    Object.keys(rootMembershipMembers).forEach((code) => addMemberMapRecord(map, code, rootMembershipMembers[code]));
    const rootMembers = rootMembersSnap && rootMembersSnap.exists() ? rootMembersSnap.val() || {} : {};
    Object.keys(rootMembers).forEach((code) => addMemberMapRecord(map, code, rootMembers[code]));

    // pending 경로에 코드만 남아 있고 members 객체가 누락된 경우도 표시한다.
    const pending = pendingSnap && pendingSnap.exists() ? pendingSnap.val() || {} : {};
    Object.keys(pending).forEach((code) => {
      if (!map.has(code)) {
        addMemberMapRecord(map, code, { code, name: "가입정보 없음", approved: false, status: "pending", role: "pending" });
      } else {
        const prev = map.get(code);
        if (!prev.status) prev.status = "pending";
      }
    });

    return Array.from(map.values()).sort((a,b) => {
      const rank = { pending: 0, active: 1, blocked: 2, withdrawn: 3, rejected: 4 };
      return (rank[a.status] ?? 9) - (rank[b.status] ?? 9) || String(a.code).localeCompare(String(b.code));
    });
  }

  function normalizeDuplicateJoinName(value) {
    return String(value || "").replace(/\s+/g, "").trim();
  }
  function buildDuplicateJoinNameSet(members) {
    const approvedNames = new Set();
    (members || []).forEach((m) => {
      const name = normalizeDuplicateJoinName(m && m.name);
      if (!name) return;
      const status = String(m && m.status || "");
      if ((status === "active" && m && m.approved) || (m && m.approved === true)) approvedNames.add(name);
    });
    return approvedNames;
  }
  function isDuplicateJoinMember(m, approvedNames) {
    const name = normalizeDuplicateJoinName(m && m.name);
    if (!name || !approvedNames || !approvedNames.has(name)) return false;
    const status = String(m && m.status || "");
    return status === "pending" || !m.approved;
  }
  function renderMembers(members) {
    const list = listNode();
    if (!list) return;
    if (!members.length) {
      list.innerHTML = '<div class="member-approval-empty">가입자 DB에 저장된 회원이 없습니다. busSeatApp/membership 과 memberList/joinCodes 를 모두 확인했지만 표시할 회원이 없습니다. JSON 백업이 있으면 복구하세요.</div>';
      return;
    }
    const pendingCount = members.filter(m => m.status === 'pending' || !m.approved).length;
    const approvedCount = members.filter(m => m.status === 'active' && m.approved).length;
    const duplicateJoinNames = buildDuplicateJoinNameSet(members);
    const duplicateJoinCount = members.filter(m => isDuplicateJoinMember(m, duplicateJoinNames)).length;
    list.innerHTML = `
      <div class="member-approval-empty member-approval-summary-line">
        <span>승인완료 ${approvedCount}명</span> / <span class="pending-count ${pendingCount > 0 ? 'has-pending' : ''}">승인대기 ${pendingCount}명</span> / <span>전체 ${members.length}명</span>
        ${duplicateJoinCount ? `<span class="duplicate-join-badge">중복가입 ${duplicateJoinCount}명</span>` : ''}
      </div>
      ${members.map((m) => {
        const approvedCardClass = (m.approved && m.status === 'active') ? ' approved-member' : '';
        const duplicateJoin = isDuplicateJoinMember(m, duplicateJoinNames);
        const resultText = joinResultLabel(m);
        const resultSegment = resultText === "승인" ? "" : ` · 승인결과: ${esc(resultText)}`;
        return `
        <div class="member-approval-card${approvedCardClass}${duplicateJoin ? ' duplicate-join-person' : ''}" data-member-code="${esc(m.code)}" data-member-name="${esc(m.name || '')}">
          <div class="member-approval-card-title">${esc(m.name || '-')} / ${esc(m.code)} / ${esc(label(m))}${duplicateJoin ? '<span class="duplicate-join-badge">중복가입</span>' : ''}</div>
          <div>성별: ${esc(m.gender || '-')} · 출생년도: ${esc(m.birthYear || '-')} · 거주지: ${esc(m.dong || '-')}</div>
          <div>전화: ${esc(m.phone || '-')}</div>
          <div>등급: ${esc(m.role || '-')} · ${m.adminAccess ? '관리자' : '회원'} · 가입일: ${esc(fmt(m.createdAt))}${resultSegment}</div>
          <div class="member-approval-card-actions">
            ${(m.approved && m.status === "active") ? "" : `<button class="approve" data-forced-member-action="approve" data-code="${esc(m.code)}">승인</button>`}
            <button class="block" data-forced-member-action="block" data-code="${esc(m.code)}">차단</button>
            <button class="admin" data-forced-member-action="toggle-admin" data-code="${esc(m.code)}">관리자</button>
            <button class="withdraw" data-forced-member-action="withdraw" data-code="${esc(m.code)}">탈퇴</button>
            <button class="delete" data-forced-member-action="delete" data-code="${esc(m.code)}">삭제</button>
          </div>
        </div>`;
      }).join('')}`;
  }
  function makeMemberJsonBackupFileName() {
    const d = new Date();
    const pad = (n) => String(n).padStart(2, "0");
    return `회원가입백업_${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}.json`;
  }

  function downloadMemberJsonBackup(payload) {
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = makeMemberJsonBackupFileName();
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  function readMemberJsonFile(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => {
        try { resolve(JSON.parse(String(reader.result || "{}"))); }
        catch (error) { reject(error); }
      };
      reader.onerror = () => reject(reader.error || new Error("파일 읽기 실패"));
      reader.readAsText(file, "utf-8");
    });
  }

  async function handleMemberJsonBackup() {
    try {
      const [membersSnap, pendingSnap, nameIndexSnap, joinCodesSnap] = await Promise.all([
        get(ref(manageDb, `${MANAGE_MEMBERS_ROOT}/members`)),
        get(ref(manageDb, `${MANAGE_MEMBERS_ROOT}/pending`)),
        get(ref(manageDb, `${MANAGE_MEMBERS_ROOT}/nameIndex`)),
        get(ref(manageDb, MANAGE_JOIN_CODES_PATH))
      ]);
      const payload = {
        backupType: "bus-seat-membership-backup",
        version: 1,
        exportedAt: new Date().toISOString(),
        data: {
          membership: {
            members: membersSnap.exists() ? membersSnap.val() : null,
            pending: pendingSnap.exists() ? pendingSnap.val() : null,
            nameIndex: nameIndexSnap.exists() ? nameIndexSnap.val() : null
          },
          memberList: {
            joinCodes: joinCodesSnap.exists() ? joinCodesSnap.val() : null
          }
        }
      };
      downloadMemberJsonBackup(payload);
      const btn = q('#memberJsonBackupBtn');
      if (btn) {
        btn.classList.add('btn-success-flash');
        setTimeout(() => btn.classList.remove('btn-success-flash'), 900);
      }
    } catch (error) {
      console.error('회원 JSON 백업 실패:', error);
      alert('회원 JSON 백업 실패: Firebase 연결 또는 읽기 권한을 확인하세요.');
    }
  }

  function normalizeRestoredMemberBackup(backup) {
    const data = backup?.data || backup || {};
    const membership = data?.membership || data?.busSeatApp?.membership || data?.[MANAGE_MEMBERS_ROOT] || {};
    const joinCodes = data?.memberList?.joinCodes || backup?.memberList?.joinCodes || null;
    return {
      members: membership?.members ?? data?.members ?? null,
      pending: membership?.pending ?? data?.pending ?? null,
      nameIndex: membership?.nameIndex ?? data?.nameIndex ?? null,
      joinCodes
    };
  }

  async function handleMemberJsonRestoreFile(event) {
    const input = event.target;
    const file = input?.files?.[0];
    if (input) input.value = '';
    if (!file) return;
    try {
      const backup = await readMemberJsonFile(file);
      const restored = normalizeRestoredMemberBackup(backup);
      if (!restored.members || typeof restored.members !== 'object') {
        alert('복구할 회원가입자 members 데이터가 없는 JSON 파일입니다.');
        return;
      }
      const ok = confirm('현재 회원가입자 정보를 JSON 파일 내용으로 복구할까요?\n\n회원목록/승인대기/nameIndex/회원번호 DB가 백업 파일 기준으로 덮어쓰기 됩니다.');
      if (!ok) return;
      await Promise.all([
        set(ref(manageDb, `${MANAGE_MEMBERS_ROOT}/members`), restored.members || null),
        set(ref(manageDb, `${MANAGE_MEMBERS_ROOT}/pending`), restored.pending || null),
        set(ref(manageDb, `${MANAGE_MEMBERS_ROOT}/nameIndex`), restored.nameIndex || null),
        restored.joinCodes && typeof restored.joinCodes === 'object'
          ? set(ref(manageDb, MANAGE_JOIN_CODES_PATH), restored.joinCodes)
          : Promise.resolve()
      ]);
      await forceLoadMemberManageList();
      const btn = q('#memberJsonRestoreBtn');
      if (btn) {
        btn.classList.add('btn-success-flash');
        setTimeout(() => btn.classList.remove('btn-success-flash'), 900);
      }
      alert('회원 JSON 복구 완료');
    } catch (error) {
      console.error('회원 JSON 복구 실패:', error);
      alert('회원 JSON 복구 실패: 올바른 회원 백업 JSON 파일인지 확인하세요.');
    }
  }

  function handleMemberJsonRestoreClick() {
    q('#memberJsonRestoreFileInput')?.click();
  }

  async function forceLoadMemberManageList() {
    setListMessage('가입자 DB 불러오는 중...');
    try {
      const members = await readAllMembers();
      renderMembers(members);
    } catch (error) {
      console.error('강제 회원관리 리스트 불러오기 오류:', error);
      setListMessage(`가입자 DB를 읽지 못했습니다. Firebase Rules 또는 연결을 확인하세요. (${error?.code || error?.message || error})`);
    }
  }
  async function mirrorJoinCode(member) {
    await update(ref(manageDb), {
      [`${MANAGE_JOIN_CODES_PATH}/${member.code}`]: {
        code: member.code,
        name: member.name || '',
        gender: member.gender || '',
        birthYear: member.birthYear || '',
        phone: member.phone || '',
        phoneLast4: member.phoneLast4 || '',
        dong: member.dong || '',
        status: member.status || 'pending',
        approvalResult: joinResultLabel(member),
        joinStatus: joinResultLabel(member),
        approved: !!member.approved,
        role: member.role || 'member',
        adminAccess: !!member.adminAccess,
        memberType: member.memberType || '',
        createdAt: member.createdAt || Date.now(),
        updatedAt: Date.now()
      }
    });
  }

  /* 회원관리 강제 렌더 모듈에서도 승인 처리 시 기존 memberList/main 표에 병합한다. */
  const MANAGE_MEMBER_LIST_TABLE_HEADERS = ["직 책","이 름","성별","출생년도","주민번호","연락처","비상연락처<br>( 가족 )","구","거주지","집","배우자","닉네임","버스타는곳","참석  ○ △ Χ","연관검색","연관검색","연관검색","전임직책","전임총무","가입:승인","회원UID","가입일","승인결과"];
  const MANAGE_MEMBER_LIST_TABLE_WIDTHS = [72,78,45,57,78,118,118,54,86,133,72,94,141,86,70,110,62,70,94,86,170,94,86];

  function makeManageMemberListCell(value = "", tag = "td") {
    return {
      html: String(value || ""),
      tag,
      className: tag === "th" ? "header-cell" : "",
      style: tag === "th"
        ? "font-weight:700;font-size:12px;text-align:center;vertical-align:middle;white-space:nowrap;overflow-wrap:normal;word-break:keep-all;"
        : "font-size:12px;text-align:center;vertical-align:middle;white-space:nowrap;overflow-wrap:normal;word-break:keep-all;"
    };
  }

  function makeDefaultManageMemberListData() {
    const rows = [];
    rows.push(MANAGE_MEMBER_LIST_TABLE_HEADERS.map((h) => makeManageMemberListCell(h, "th")));
    for (let i = 0; i < 20; i += 1) rows.push(MANAGE_MEMBER_LIST_TABLE_HEADERS.map(() => makeManageMemberListCell("")));
    return { cols: MANAGE_MEMBER_LIST_TABLE_WIDTHS.map((w) => `width:${w}px`), rows };
  }

  function stripManageMemberListHtml(value) {
    const div = document.createElement("div");
    div.innerHTML = String(value || "");
    return String(div.textContent || div.innerText || "").trim();
  }
  function normalizeManageMemberListLabel(value) {
    return stripManageMemberListHtml(value).replace(/\s+/g, "");
  }
  function normalizeManageMemberListPhone(value) {
    return String(value || "").replace(/\D/g, "");
  }
  function formatManageMemberListPhone344(value) {
    const digits = normalizeManageMemberListPhone(value).slice(0, 11);
    if (digits.length <= 3) return digits;
    if (digits.length <= 7) return `${digits.slice(0, 3)} ${digits.slice(3)}`;
    return `${digits.slice(0, 3)} ${digits.slice(3, 7)} ${digits.slice(7, 11)}`;
  }
  function formatManageMemberListDate(ms) {
    if (!ms) return "";
    const d = new Date(Number(ms));
    if (Number.isNaN(d.getTime())) return "";
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
  }
  function normalizeManageMemberListMainPayload(rawValue) {
    const payload = rawValue && typeof rawValue === "object" ? { ...rawValue } : {};
    let data = payload.data && typeof payload.data === "object" ? payload.data : payload;
    if (!data || !Array.isArray(data.rows)) data = makeDefaultManageMemberListData();
    if (!Array.isArray(data.cols)) data.cols = MANAGE_MEMBER_LIST_TABLE_WIDTHS.map((w) => `width:${w}px`);
    if (!Array.isArray(data.rows) || !data.rows.length) data.rows = makeDefaultManageMemberListData().rows;
    data.rows = data.rows.map((row, rIdx) => {
      const sourceRow = Array.isArray(row) ? row : [];
      const nextRow = [];
      const colCount = Math.max(MANAGE_MEMBER_LIST_TABLE_HEADERS.length, data.cols.length || 0, sourceRow.length || 0);
      for (let c = 0; c < colCount; c += 1) {
        const cell = sourceRow[c] && typeof sourceRow[c] === "object" ? { ...sourceRow[c] } : makeManageMemberListCell("", rIdx === 0 ? "th" : "td");
        if (cell.html == null) cell.html = "";
        if (!cell.tag) cell.tag = rIdx === 0 ? "th" : "td";
        if (rIdx === 0) cell.className = "header-cell";
        nextRow.push(cell);
      }
      return nextRow;
    });
    return { payload, data };
  }
  function getManageMemberListHeaderIndex(data, label, fallback) {
    const header = data.rows?.[0] || [];
    const target = normalizeManageMemberListLabel(label);
    for (let i = 0; i < header.length; i += 1) {
      const text = normalizeManageMemberListLabel(header[i]?.html || "");
      if (text === target || text.includes(target)) return i;
    }
    return fallback;
  }
  function getManageMemberListCellText(row, index) {
    if (!row || index < 0 || !row[index]) return "";
    return stripManageMemberListHtml(row[index].html || "");
  }
  function setManageMemberListCellText(row, index, value) {
    if (!row || index < 0) return;
    while (row.length <= index) row.push(makeManageMemberListCell(""));
    row[index].html = String(value || "");
    if (!row[index].tag) row[index].tag = "td";
  }
  function findManageMemberListRowByUid(data, uidIdx, code) {
    const key = String(code || "").trim();
    if (!key) return null;
    return (data.rows || []).slice(1).find((row) => getManageMemberListCellText(row, uidIdx) === key) || null;
  }
  function findManageMemberListRowByNamePhone(data, nameIdx, phoneIdx, name, phone) {
    const nameKey = normalizeManageMemberListLabel(name);
    const phoneKey = normalizeManageMemberListPhone(phone);
    if (!nameKey || !phoneKey) return null;
    return (data.rows || []).slice(1).find((row) => {
      return normalizeManageMemberListLabel(getManageMemberListCellText(row, nameIdx)) === nameKey &&
        normalizeManageMemberListPhone(getManageMemberListCellText(row, phoneIdx)) === phoneKey;
    }) || null;
  }
  function findFirstEmptyManageMemberListRow(data, nameIdx, phoneIdx, uidIdx) {
    return (data.rows || []).slice(1).find((row) => {
      return !getManageMemberListCellText(row, nameIdx) && !getManageMemberListCellText(row, phoneIdx) && !getManageMemberListCellText(row, uidIdx);
    }) || null;
  }
  function applyManageMemberToMemberListData(data, member) {
    const code = String(member?.code || "").trim();
    if (!code) return false;
    const idx = {
      name: getManageMemberListHeaderIndex(data, "이 름", 1),
      gender: getManageMemberListHeaderIndex(data, "성별", 2),
      birth: getManageMemberListHeaderIndex(data, "출생년도", 3),
      phone: getManageMemberListHeaderIndex(data, "연락처", 5),
      dong: getManageMemberListHeaderIndex(data, "거주지", 8),
      approval: getManageMemberListHeaderIndex(data, "가입:승인", 19),
      uid: getManageMemberListHeaderIndex(data, "회원UID", 20),
      joinDate: getManageMemberListHeaderIndex(data, "가입일", 21),
      result: getManageMemberListHeaderIndex(data, "승인결과", 22)
    };
    const incomingName = String(member.name || "").trim();
    const incomingPhone = formatManageMemberListPhone344(member.phone || member.phoneDigits || "");
    const resultLabel = joinResultLabel(member);
    const joinDate = formatManageMemberListDate(member.approvedAt || member.createdAt || member.updatedAt);

    let row = findManageMemberListRowByUid(data, idx.uid, code);
    let metadataOnly = !!row;
    if (!row) {
      row = findManageMemberListRowByNamePhone(data, idx.name, idx.phone, incomingName, incomingPhone);
      metadataOnly = !!row;
    }
    if (!row) row = findFirstEmptyManageMemberListRow(data, idx.name, idx.phone, idx.uid);
    if (!row) {
      row = MANAGE_MEMBER_LIST_TABLE_HEADERS.map(() => makeManageMemberListCell(""));
      data.rows.push(row);
    }
    if (!metadataOnly) {
      setManageMemberListCellText(row, idx.name, incomingName);
      setManageMemberListCellText(row, idx.gender, member.gender || "");
      setManageMemberListCellText(row, idx.birth, member.birthYear || "");
      setManageMemberListCellText(row, idx.phone, incomingPhone);
      setManageMemberListCellText(row, idx.dong, member.dong || "");
    }
    setManageMemberListCellText(row, idx.approval, (resultLabel === "승인" || resultLabel === "관리자") ? "승인" : resultLabel);
    setManageMemberListCellText(row, idx.uid, code);
    setManageMemberListCellText(row, idx.joinDate, joinDate);
    setManageMemberListCellText(row, idx.result, resultLabel);
    return true;
  }
  async function mergeManageMemberIntoMemberListMain(member) {
    if (!member || !member.code) return;
    const snap = await get(ref(manageDb, MANAGE_MEMBER_LIST_MAIN_PATH));
    const currentValue = snap.exists() ? snap.val() : null;
    const normalized = normalizeManageMemberListMainPayload(currentValue);
    const changed = applyManageMemberToMemberListData(normalized.data, member);
    if (!changed) return;
    const nextPayload = {
      ...(currentValue && typeof currentValue === "object" && currentValue.data ? currentValue : {}),
      type: "member-list-table-data",
      version: "membel-list-realtime-2.0",
      source: "bus-seat-member-manage-merge",
      reason: "bus-seat-member-approval-merge",
      updatedBy: "bus-seat-member-manage",
      clientId: "bus-seat-member-manage",
      updatedAt: Date.now(),
      updatedAtISO: new Date().toISOString(),
      data: normalized.data
    };
    await update(ref(manageDb), { [MANAGE_MEMBER_LIST_MAIN_PATH]: nextPayload });
  }


  async function forceUpdateMember(code, action) {
    const snap = await get(ref(manageDb, `${MANAGE_MEMBERS_ROOT}/members/${code}`));
    if (!snap.exists()) {
      alert('해당 회원코드를 members DB에서 찾지 못했습니다.');
      return;
    }
    const member = snap.val() || {};
    const now = Date.now();
    const updates = {};
    if (action === 'approve') {
      Object.assign(member, {
        code,
        approved: true,
        status: 'active',
        role: member.adminAccess ? 'admin' : 'member',
        apps: { busSeat: true, tripSchedule: true, memberList: !!member.adminAccess, busRute: true },
        approvedAt: member.approvedAt || now,
        approvedBy: 'bus-seat-admin',
        updatedAt: now
      });
      updates[`${MANAGE_MEMBERS_ROOT}/pending/${code}`] = null;
    } else if (action === 'block') {
      Object.assign(member, {
        code,
        approved: false,
        status: 'blocked',
        role: 'blocked',
        adminAccess: false,
        apps: { busSeat: false, tripSchedule: false, memberList: false, busRute: false },
        updatedAt: now
      });
      updates[`${MANAGE_MEMBERS_ROOT}/pending/${code}`] = null;
    } else if (action === 'toggle-admin') {
      const nextAdmin = !member.adminAccess;
      Object.assign(member, {
        code,
        approved: true,
        status: 'active',
        role: nextAdmin ? 'admin' : 'member',
        adminAccess: nextAdmin,
        apps: { busSeat: true, tripSchedule: true, memberList: nextAdmin, busRute: true },
        approvedAt: member.approvedAt || now,
        approvedBy: member.approvedBy || 'bus-seat-admin',
        updatedAt: now
      });
      updates[`${MANAGE_MEMBERS_ROOT}/pending/${code}`] = null;
    } else if (action === 'withdraw') {
      Object.assign(member, {
        code,
        approved: false,
        status: 'withdrawn',
        role: 'withdrawn',
        adminAccess: false,
        passwordHash: null,
        apps: { busSeat: false, tripSchedule: false, memberList: false, busRute: false },
        withdrawnAt: now,
        withdrawnBy: 'bus-seat-admin',
        updatedAt: now
      });
      updates[`${MANAGE_MEMBERS_ROOT}/pending/${code}`] = null;
    } else if (action === 'delete') {
      updates[`${MANAGE_MEMBERS_ROOT}/members/${code}`] = null;
      updates[`${MANAGE_MEMBERS_ROOT}/pending/${code}`] = null;
      if (member?.name) {
        const nameKey = String(member.name || '').replace(/\s+/g, '').trim();
        if (nameKey) updates[`${MANAGE_MEMBERS_ROOT}/nameIndex/${nameKey}/${code}`] = null;
      }
      updates[`${MANAGE_JOIN_CODES_PATH}/${code}`] = null;
      await update(ref(manageDb), updates);
      await forceLoadMemberManageList();
      return;
    }
    updates[`${MANAGE_MEMBERS_ROOT}/members/${code}`] = member;
    await update(ref(manageDb), updates);
    await mirrorJoinCode(member);
    await mergeManageMemberIntoMemberListMain(member);
    await forceLoadMemberManageList();
  }

  window.__loadMembershipApprovalMembers = forceLoadMemberManageList;
  window.__forceLoadMemberManageList = forceLoadMemberManageList;

  document.addEventListener('click', (event) => {
    const manageTab = event.target.closest('#memberManageTab');
    if (manageTab) {
      setTimeout(forceLoadMemberManageList, 180);
      return;
    }
    const refresh = event.target.closest('#memberManagePanel #memberApprovalRefreshBtn');
    if (refresh) {
      event.preventDefault();
      forceLoadMemberManageList();
      return;
    }
    const memberBackup = event.target.closest('#memberManagePanel #memberJsonBackupBtn');
    if (memberBackup) {
      event.preventDefault();
      handleMemberJsonBackup();
      return;
    }
    const memberRestore = event.target.closest('#memberManagePanel #memberJsonRestoreBtn');
    if (memberRestore) {
      event.preventDefault();
      handleMemberJsonRestoreClick();
      return;
    }
    const actionBtn = event.target.closest('#memberManagePanel button[data-forced-member-action], #memberManagePanel button[data-member-action]');
    if (actionBtn) {
      event.preventDefault();
      const action = actionBtn.getAttribute('data-forced-member-action') || actionBtn.getAttribute('data-member-action');
      const code = actionBtn.getAttribute('data-code');
      if (!code) return;
      if (action === 'withdraw' && !confirm('이 회원을 탈퇴 처리하고 비밀번호 해시를 삭제할까요?')) return;
      if (action === 'delete' && !confirm('이 회원 데이터를 가입자 DB와 회원코드 DB에서 완전히 삭제할까요?')) return;
      if (action === 'block' && !confirm('이 회원의 앱 접근을 차단할까요?')) return;
      forceUpdateMember(code, action).catch((error) => {
        console.error('회원 처리 오류:', error);
        alert(`회원 처리 오류: ${error?.code || error?.message || error}`);
      });
    }
  }, true);

  // 회원관리 탭이 이미 열려 있거나 관리자 모드에서 패널이 보이면 자동 표시한다.
  setInterval(() => {
    const panel = q('#memberManagePanel');
    const list = listNode();
    if (!panel || !list) return;
    const panelVisible = !panel.classList.contains('hidden') && panel.offsetParent !== null;
    const needsLoad = /회원관리 탭|관리자 로그인|불러옵니다|사용할 수 있습니다/.test(list.textContent || '');
    if (panelVisible && needsLoad && !window.__memberManageAutoLoading) {
      window.__memberManageAutoLoading = true;
      forceLoadMemberManageList().finally(() => setTimeout(() => { window.__memberManageAutoLoading = false; }, 1000));
    }
  }, 1000);
</script>
