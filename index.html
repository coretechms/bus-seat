  const MEMBER_LIST_JOIN_CODES_PATH = "memberList/joinCodes";
  const MEMBER_LIST_DELETED_JOIN_CODES_PATH = "memberList/deletedJoinCodes";
  const MEMBER_LIST_MAIN_PATH = "memberList/main";
  const MEMBER_LOGIN_INDEX_PATH = `${MEMBERS_ROOT}/loginIndex`;
  const LOGIN_SESSION_KEY = "bus-seat-approved-member-session-v1";
  const MEMBER_SAVED_LOGIN_NAME_KEY = "bus-seat-member-saved-login-name-v1";
  const LOGIN_DEVICE_KEY = "bus-seat-member-device-id-v1";
  const ACTIVE_SESSIONS_PATH = `${MEMBERS_ROOT}/activeSessions`;
  const LOGIN_LOGS_PATH = `${MEMBERS_ROOT}/loginLogs`;
  const LOGIN_LOG_SETTINGS_PATH = `${MEMBERS_ROOT}/loginLogSettings`;
  const DEFAULT_LOGIN_LOG_RETENTION_DAYS = 30;
  const ACTIVE_SESSION_STALE_MS = 2 * 60 * 1000;
  const ACTIVE_SESSION_HEARTBEAT_MS = 15000;
  let currentApprovedMemberSession = null;
  let activeSessionHeartbeatTimer = null;
  let activeSessionUnsubscribe = null;
  let memberManageActiveSessionUnsubscribe = null;
  let memberManageLoginLogUnsubscribe = null;
  let latestLoginLogs = [];
  let isProcessingRemoteLogout = false;

  const membershipApp = getApps().length ? getApp() : initializeApp(MEMBERSHIP_FIREBASE_CONFIG);
  const membershipDb = getDatabase(membershipApp);

  /* 회원 승인 → 멤버리스트 반영 DB 분리 보강
     - bus-seat 보안 DB(bus-seat-eb86c)와 실제 멤버리스트 DB(member-b458f)가 다를 수 있으므로
       승인 시 member-b458f/memberList/main에도 같은 회원 행을 병합 저장한다. */
  const MEMBER_LIST_EXTERNAL_FIREBASE_CONFIG = {
    apiKey: "AIzaSyBRxAdYRyjMIcQvCQ2ja7YOkdFGNCkW1cE",
    authDomain: "member-b458f.firebaseapp.com",
    databaseURL: "https://member-b458f-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "member-b458f",
    storageBucket: "member-b458f.firebasestorage.app",
    messagingSenderId: "399411166551",
    appId: "1:399411166551:web:3c693da51daaa042751212"
  };

  function getMemberListExternalDb() {
    const appName = "memberListExternalSync";
    const app = getApps().some((item) => item.name === appName)
      ? getApp(appName)
      : initializeApp(MEMBER_LIST_EXTERNAL_FIREBASE_CONFIG, appName);
    return getDatabase(app);
  }

  /* 회원 DB 경로 호환 보강
     회원관리/로그인이 반드시 같은 DB를 보도록 모든 사용 이력 경로를 통합 조회한다.
     - 기본 저장: busSeatApp/membership/members
     - 이전/복구 경로: membership/members, members, busSeatApp/members
     nameIndex가 깨져도 전체 회원 DB에서 이름으로 재검색한다. */
  const MEMBER_DB_PATH_CANDIDATES = [
    { rootPath: MEMBERS_ROOT, membersPath: `${MEMBERS_ROOT}/members`, nameIndexPath: `${MEMBERS_ROOT}/nameIndex`, pendingPath: `${MEMBERS_ROOT}/pending` },
    // 이전 보안분리 적용 전 파일이 사용하던 경로. 신규 저장은 membershipSecure로만 하되, 기존 대기/회원 자료 승인을 위해 읽기 호환 유지.
    { rootPath: "busSeatApp/membership", membersPath: "busSeatApp/membership/members", nameIndexPath: "busSeatApp/membership/nameIndex", pendingPath: "busSeatApp/membership/pending" },
    { rootPath: "membership", membersPath: "membership/members", nameIndexPath: "membership/nameIndex", pendingPath: "membership/pending" },
    { rootPath: "members", membersPath: "members", nameIndexPath: "nameIndex", pendingPath: "pending" },
    { rootPath: "busSeatApp", membersPath: "busSeatApp/members", nameIndexPath: "busSeatApp/nameIndex", pendingPath: "busSeatApp/pending" }
  ];

  async function getAllMembersFromAnyRoot() {
    const merged = {};
    for (const cfg of MEMBER_DB_PATH_CANDIDATES) {
      try {
        const snap = await get(ref(membershipDb, cfg.membersPath));
        if (snap.exists()) {
          const value = snap.val() || {};
          Object.keys(value).forEach((code) => {
            const raw = value[code] || {};
            if (raw && typeof raw === "object" && !merged[code]) {
              merged[code] = {
                ...raw,
                code: raw.code || code,
                __memberRoot: cfg.rootPath,
                __membersPath: cfg.membersPath,
                __nameIndexPath: cfg.nameIndexPath,
                __pendingPath: cfg.pendingPath
              };
            }
          });
        }
      } catch (error) {
        console.warn("회원 DB 전체 조회 실패:", cfg.membersPath, error);
      }
    }
    // 회원관리 목록에는 보이지만 로그인 DB에는 없을 수 있는 승인 미러 경로도 확인한다.
    // 주의: memberList/joinCodes에는 보통 passwordHash가 없으므로, 여기서 찾힌 회원은 로그인 비밀번호 재설정/복구가 필요할 수 있다.
    try {
      const joinSnap = await get(ref(membershipDb, MEMBER_LIST_JOIN_CODES_PATH));
      if (joinSnap.exists()) {
        const joinCodes = joinSnap.val() || {};
        Object.keys(joinCodes).forEach((code) => {
          const raw = joinCodes[code] || {};
          // 삭제 기록은 멤버리스트 승인결과 표시용일 뿐,
          // 신규 회원가입 중복검사/회원코드 생성에서는 존재하지 않는 회원으로 처리한다.
          if (isDeletedJoinRecord(raw)) return;
          if (raw && typeof raw === "object" && !merged[code]) {
            merged[code] = {
              ...raw,
              code: raw.code || code,
              __joinCodesOnly: true,
              __memberRoot: "memberList",
              __membersPath: MEMBER_LIST_JOIN_CODES_PATH
            };
          }
        });
      }
    } catch (error) {
      console.warn("회원관리 미러 DB 조회 실패:", MEMBER_LIST_JOIN_CODES_PATH, error);
    }
    return merged;
  }

  async function getMemberRecordByCodeAnyRoot(code) {
    const key = String(code || "").trim();
    if (!key) return null;
    for (const cfg of MEMBER_DB_PATH_CANDIDATES) {
      try {
        const snap = await get(ref(membershipDb, `${cfg.membersPath}/${key}`));
        if (snap.exists()) {
          const member = snap.val() || {};
          return {
            rootPath: cfg.rootPath,
            membersPath: cfg.membersPath,
            nameIndexPath: cfg.nameIndexPath,
            pendingPath: cfg.pendingPath,
            member: {
              ...member,
              code: member.code || key,
              __memberRoot: cfg.rootPath,
              __membersPath: cfg.membersPath,
              __nameIndexPath: cfg.nameIndexPath,
              __pendingPath: cfg.pendingPath
            }
          };
        }
      } catch (error) {
        console.warn("회원 DB 코드 조회 실패:", cfg.membersPath, key, error);
      }
    }
    // 신규 보안 구조: 가입신청은 members가 아니라 pending 객체에 먼저 저장된다.
    // 관리자 승인 처리 시 pending 자료를 members로 승격한다.
    try {
      const pendingSnap = await get(ref(membershipDb, `${MEMBERS_ROOT}/pending/${key}`));
      if (pendingSnap.exists()) {
        const pendingMember = pendingSnap.val() || {};
        return {
          rootPath: MEMBERS_ROOT,
          membersPath: `${MEMBERS_ROOT}/members`,
          nameIndexPath: `${MEMBERS_ROOT}/nameIndex`,
          pendingPath: `${MEMBERS_ROOT}/pending`,
          member: {
            ...pendingMember,
            code: pendingMember.code || key,
            __pendingOnly: true,
            __memberRoot: MEMBERS_ROOT,
            __membersPath: `${MEMBERS_ROOT}/members`,
            __nameIndexPath: `${MEMBERS_ROOT}/nameIndex`,
            __pendingPath: `${MEMBERS_ROOT}/pending`
          }
        };
      }
    } catch (error) {
      console.warn("가입대기 DB 코드 조회 실패:", key, error);
    }

    // 회원 비밀번호 변경 대상 확인 보강:
    // Rules상 일반 사용자는 membershipSecure/members를 읽지 못할 수 있으므로,
    // 공개 읽기 경로인 memberList/joinCodes에서 회원코드의 실제 이름을 최종 검증한다.
    // 이 검증이 없으면 오래된 loginIndex/nameIndex에 남은 다른 회원 코드가
    // 같은 비밀번호라는 이유로 비밀번호 변경 후보에 섞일 수 있다.
    try {
      const joinSnap = await get(ref(membershipDb, `${MEMBER_LIST_JOIN_CODES_PATH}/${key}`));
      if (joinSnap.exists()) {
        const joinMember = joinSnap.val() || {};
        if (!isDeletedJoinRecord(joinMember)) {
          return {
            rootPath: "memberList",
            membersPath: MEMBER_LIST_JOIN_CODES_PATH,
            nameIndexPath: "",
            pendingPath: "",
            member: {
              ...joinMember,
              code: joinMember.code || key,
              __joinCodesOnly: true,
              __memberRoot: "memberList",
              __membersPath: MEMBER_LIST_JOIN_CODES_PATH
            }
          };
        }
      }
    } catch (error) {
      console.warn("회원관리 코드 조회 실패:", MEMBER_LIST_JOIN_CODES_PATH, key, error);
    }
    return null;
  }

  async function getNameIndexCodesAnyRoot(nameKey) {
    const codeSet = new Set();
    const key = String(nameKey || "").trim();
    if (!key) return [];
    for (const cfg of MEMBER_DB_PATH_CANDIDATES) {
      try {
        const snap = await get(ref(membershipDb, `${cfg.nameIndexPath}/${key}`));
        if (snap.exists()) Object.keys(snap.val() || {}).forEach((code) => codeSet.add(String(code)));
      } catch (error) {
        console.warn("회원 이름 인덱스 조회 실패:", cfg.nameIndexPath, key, error);
      }
    }
    return Array.from(codeSet);
  }

  // 회원 로그인/가입 모듈은 별도 type=module 스코프이므로 필요한 공통 함수를 내부에 포함한다.
  // 이 함수들이 없으면 ReferenceError로 로그인/회원가입 버튼 이벤트가 전부 멈춘다.
  function byId(id) { return document.getElementById(id); }

  function escapeHtml(text) {
    return String(text ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }

  function normalizeName(inputName) {
    return String(inputName || "").trim().replace(/\s+/g, "");
  }

  // 모바일 키보드/자동완성에서 들어오는 앞뒤 공백, 전각문자 차이 때문에
  // PC와 모바일의 비밀번호 해시가 달라지는 문제를 방지한다.
  // 회원가입 때 공백 비밀번호는 이미 차단하므로 trim/NFKC 정규화만 적용한다.
  function normalizePasswordInput(value) {
    return String(value || "").normalize("NFKC").trim();
  }

  function makeNameKey(inputName) {
    return normalizeName(inputName).toLowerCase();
  }

  function normalizeBirthYear(value) {
    // 회원가입 화면의 "생년월일" 입력값은 멤버리스트 "주민번호" 칸으로 넘긴다.
    // 기존 변수명(birthYear)은 호환을 위해 유지하되, 값은 YYMMDD 6자리까지 보존한다.
    const digits = String(value || "").replace(/\D/g, "").slice(0, 6);
    return digits;
  }

  function normalizePhone(value) {
    return String(value || "").replace(/\D/g, "");
  }

  function formatPhone344(phoneDigits) {
    const digits = normalizePhone(phoneDigits).slice(0, 11);
    if (digits.length <= 3) return digits;
    if (digits.length <= 7) return `${digits.slice(0, 3)} ${digits.slice(3)}`;
    return `${digits.slice(0, 3)} ${digits.slice(3, 7)} ${digits.slice(7, 11)}`;
  }

  function hasInvalidPhoneChars(value) {
    return /[^0-9\s]/.test(String(value || ""));
  }

  function hasWhitespace(value) {
    return /\s/.test(String(value || ""));
  }

  function normalizeTextNoSpace(value) {
    return String(value || "").trim();
  }

  function validateNoWhitespaceFields(fields) {
    for (const item of fields) {
      if (hasWhitespace(item.value)) {
        return `${item.label}에는 띄어쓰기를 넣을 수 없습니다.`;
      }
    }
    return "";
  }

  function isValidKoreanMobileDigits(phoneDigits) {
    return /^010\d{8}$/.test(String(phoneDigits || ""));
  }

  async function findMembersByPhoneDigits(phoneDigits) {
    const target = String(phoneDigits || "");
    if (!target) return [];
    const all = await getAllMembersFromAnyRoot();
    return Object.keys(all)
      .map((code) => all[code])
      .filter((m) => String((m && m.phoneDigits) || normalizePhone(m && m.phone)) === target);
  }

  function summarizeMemberForDuplicateCheck(member) {
    if (!member) return "";
    const parts = [
      `회원번호 ${member.code || "-"}`,
      `이름 ${member.name || "-"}`,
      `생년월일 ${member.birthDate || member.rrn || member.birthYear || "-"}`,
      `거주지 ${member.dong || "-"}`
    ];
    return parts.join(" / ");
  }
  function normalizeDuplicateJoinCompareText(value) {
    return String(value || "").replace(/\s+/g, "").trim();
  }

  function isDeletedJoinRecord(member) {
    if (!member) return false;
    const status = String(member.status || "").trim();
    const approvalResult = String(member.approvalResult || "").trim();
    const joinStatus = String(member.joinStatus || "").trim();
    const role = String(member.role || "").trim();
    return status === "deleted" || role === "deleted" || approvalResult === "삭제" || joinStatus === "삭제";
  }

  function memberJoinStatusLabelForMessage(member) {
    if (isDeletedJoinRecord(member)) return "삭제";
    const status = String(member && member.status || "");
    if (status === "active" && member?.approved) return "승인완료";
    if (status === "blocked") return "차단";
    if (status === "withdrawn") return "탈퇴";
    if (status === "rejected") return "거절";
    if (status === "pending" || !member?.approved) return "승인대기";
    return status || "회원";
  }

  function isSameJoinPersonByRequiredInfo(member, joinInfo) {
    if (!member || !joinInfo) return false;
    const memberName = normalizeDuplicateJoinCompareText(member.name);
    const joinName = normalizeDuplicateJoinCompareText(joinInfo.name);
    const memberPhone = normalizePhone(member.phoneDigits || member.phone);
    const joinPhone = normalizePhone(joinInfo.phoneDigits);
    return !!memberName && memberName === joinName && !!memberPhone && memberPhone === joinPhone;
  }

  function hasSameNameDifferentJoinInfo(member, joinInfo) {
    if (!member || !joinInfo) return false;
    const memberName = normalizeDuplicateJoinCompareText(member.name);
    const joinName = normalizeDuplicateJoinCompareText(joinInfo.name);
    if (!memberName || memberName !== joinName) return false;

    const memberPhone = normalizePhone(member.phoneDigits || member.phone);
    const joinPhone = normalizePhone(joinInfo.phoneDigits);
    const memberBirth = normalizeDuplicateJoinCompareText(member.birthDate || member.rrn || member.birthYear);
    const joinBirth = normalizeDuplicateJoinCompareText(joinInfo.birthDate || joinInfo.rrn || joinInfo.birthYear);
    const memberDong = normalizeDuplicateJoinCompareText(member.dong);
    const joinDong = normalizeDuplicateJoinCompareText(joinInfo.dong);

    return memberPhone !== joinPhone || memberBirth !== joinBirth || memberDong !== joinDong;
  }

  function summarizeMemberForJoinDuplicateMessage(member) {
    if (!member) return "";
    return `${summarizeMemberForDuplicateCheck(member)} / 상태 ${memberJoinStatusLabelForMessage(member)}`;
  }

  async function checkJoinDuplicateBeforeSave(joinInfo) {
    const sameNameMembers = await findMembersByName(joinInfo.name);
    const samePhoneMembers = await findMembersByPhoneDigits(joinInfo.phoneDigits);

    const byCode = new Map();
    [...sameNameMembers, ...samePhoneMembers].forEach((member) => {
      if (!member) return;
      const code = String(member.code || `${member.name || ""}-${member.phoneDigits || member.phone || ""}`);
      byCode.set(code, member);
    });

    const relatedMembers = Array.from(byCode.values()).filter((member) => !isDeletedJoinRecord(member));
    const activeSameNameMembers = sameNameMembers.filter((member) => !isDeletedJoinRecord(member));
    const samePersonMembers = relatedMembers.filter((member) => isSameJoinPersonByRequiredInfo(member, joinInfo));
    const pendingSamePerson = samePersonMembers.filter((member) => String(member.status || "") === "pending");
    const approvedSamePerson = samePersonMembers.filter((member) => String(member.status || "") === "active" && member.approved);
    const sameNameDifferentMembers = activeSameNameMembers.filter((member) => hasSameNameDifferentJoinInfo(member, joinInfo));

    if (pendingSamePerson.length > 0) {
      return {
        block: true,
        samePhoneMembers,
        samePersonMembers,
        message: `이미 승인대기 중인 가입신청이 있습니다.\n관리자 승인을 기다려 주세요.\n\n${pendingSamePerson.map(summarizeMemberForJoinDuplicateMessage).join("\n")}`
      };
    }

    if (approvedSamePerson.length > 0) {
      return {
        block: true,
        samePhoneMembers,
        samePersonMembers,
        message: `이미 승인완료된 회원입니다.\n회원 로그인을 이용하세요.\n\n${approvedSamePerson.map(summarizeMemberForJoinDuplicateMessage).join("\n")}`
      };
    }

    if (samePersonMembers.length > 0) {
      return {
        block: true,
        samePhoneMembers,
        samePersonMembers,
        message: `같은 이름과 같은 전화번호의 가입 자료가 있습니다.\n중복 가입신청은 저장하지 않습니다.\n\n${samePersonMembers.map(summarizeMemberForJoinDuplicateMessage).join("\n")}`
      };
    }

    if (sameNameDifferentMembers.length > 0) {
      const detail = sameNameDifferentMembers.map(summarizeMemberForJoinDuplicateMessage).join("\n");
      const ok = confirm(`같은 이름의 기존 회원이 있습니다.\n전화번호/생년월일/거주지가 다르면 신규회원으로 가입신청할 수 있습니다.\n\n${detail}\n\n신규회원으로 가입신청을 계속할까요?`);
      if (!ok) {
        return {
          block: true,
          samePhoneMembers,
          samePersonMembers,
          message: "같은 이름의 기존 회원이 있어 가입신청을 취소했습니다."
        };
      }
    }

    return {
      block: false,
      samePhoneMembers,
      samePersonMembers,
      sameNameDifferentCount: sameNameDifferentMembers.length
    };
  }


  async function sha256Hex(value) {
    const text = String(value ?? "");
    const bytes = new TextEncoder().encode(text);
    const digest = await crypto.subtle.digest("SHA-256", bytes);
    return Array.from(new Uint8Array(digest)).map((b) => b.toString(16).padStart(2, "0")).join("");
  }

  function setAuthMessage(message, ok = false) {
    const el = byId("memberAuthMessage");
    if (!el) return;
    el.textContent = message || "";
    el.classList.toggle("ok", !!ok);
  }

  async function memberExists(code) {
    return !!(await getMemberRecordByCodeAnyRoot(code));
  }

  async function getExistingMemberCodes() {
    const codeSet = new Set();
    try {
      const members = await getAllMembersFromAnyRoot();
      Object.keys(members || {}).forEach((code) => codeSet.add(String(code)));
    } catch (error) {}
    try {
      const pendingSnap = await get(ref(membershipDb, `${MEMBERS_ROOT}/pending`));
      const pending = pendingSnap && pendingSnap.exists() ? pendingSnap.val() || {} : {};
      Object.keys(pending).forEach((code) => codeSet.add(String(code)));
    } catch (error) {}
    try {
      const joinCodesSnap = await get(ref(membershipDb, MEMBER_LIST_JOIN_CODES_PATH));
      const joinCodes = joinCodesSnap && joinCodesSnap.exists() ? joinCodesSnap.val() || {} : {};
      Object.keys(joinCodes).forEach((code) => {
        const raw = joinCodes[code] || {};
        // 삭제 기록은 재가입/신규 회원코드 생성을 막지 않는다.
        if (isDeletedJoinRecord(raw)) return;
        codeSet.add(String(code));
      });
    } catch (error) {}
    return codeSet;
  }

  function makeMemberCodeCandidate(letter, sequenceNumber, phoneLast4) {
    const seqText = sequenceNumber < 100
      ? String(sequenceNumber).padStart(2, "0")
      : String(sequenceNumber);
    return `${letter}${seqText}${phoneLast4}`;
  }

  async function allocateMemberCode(phoneDigits) {
    const phoneLast4 = String(phoneDigits || "").replace(/\D/g, "").slice(-4);
    if (phoneLast4.length !== 4) {
      throw new Error("전화번호 끝 4자리를 확인할 수 없습니다.");
    }

    const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const existingCodes = await getExistingMemberCodes();

    // 기본형: A006218 ~ A996218, B006218 ~ Z996218
    for (const letter of letters) {
      for (let seq = 0; seq <= 99; seq += 1) {
        const code = makeMemberCodeCandidate(letter, seq, phoneLast4);
        if (!existingCodes.has(code) && !(await memberExists(code))) return code;
      }
    }

    // 초과형: 2600개를 넘으면 순번 자릿수를 자동 확장한다. 예: A1006218
    for (let seq = 100; seq <= 999999; seq += 1) {
      for (const letter of letters) {
        const code = makeMemberCodeCandidate(letter, seq, phoneLast4);
        if (!existingCodes.has(code) && !(await memberExists(code))) return code;
      }
    }

    throw new Error("회원코드 생성 실패");
  }

      birthYear: "",
      birthDate: member.birthDate || member.rrn || member.birthYear || "",
      rrn: member.rrn || member.birthDate || member.birthYear || "",
      passwordHash: member.passwordHash || "",

      phoneLast4: member.phoneLast4 || "",

    };

  /* 회원가입/승인 정보 → 기존 멤버리스트(memberList/main)에 추가 병합
     중요: memberList/main 전체를 새 가입자 목록으로 재작성하지 않고,
     기존 표 데이터를 읽은 뒤 회원UID 또는 이름+전화번호 기준으로 한 행만 추가/갱신한다. */
  const MEMBER_LIST_TABLE_HEADERS = ["직 책","이 름","성별","출생년도","주민번호","연락처","비상연락처<br>( 가족 )","구","거주지","집","배우자","닉네임","버스타는곳","참석  ○ △ Χ","연관검색","연관검색","연관검색","전임직책","전임총무","가입:승인","회원UID","가입일","승인결과"];
  const MEMBER_LIST_TABLE_WIDTHS = [72,78,45,57,78,118,118,54,86,133,72,94,141,86,70,110,62,70,94,86,170,94,86];

  function makeMemberListCell(value = "", tag = "td") {
    return {
      html: String(value || ""),
      tag,
      className: tag === "th" ? "header-cell" : "",
      style: tag === "th"
        ? "font-weight:700;font-size:12px;text-align:center;vertical-align:middle;white-space:nowrap;overflow-wrap:normal;word-break:keep-all;"
        : "font-size:12px;text-align:center;vertical-align:middle;white-space:nowrap;overflow-wrap:normal;word-break:keep-all;"
    };
  }

  function makeDefaultMemberListData() {
    const rows = [];
    rows.push(MEMBER_LIST_TABLE_HEADERS.map((h) => makeMemberListCell(h, "th")));
    for (let i = 0; i < 20; i += 1) rows.push(MEMBER_LIST_TABLE_HEADERS.map(() => makeMemberListCell("")));
    return { cols: MEMBER_LIST_TABLE_WIDTHS.map((w) => `width:${w}px`), rows };
  }

  function stripMemberListHtml(value) {
    const div = document.createElement("div");
    div.innerHTML = String(value || "");
    return String(div.textContent || div.innerText || "").trim();
  }

  function normalizeMemberListLabel(value) {
    return stripMemberListHtml(value).replace(/\s+/g, "");
  }

  function normalizeMemberListPhone(value) {
    return String(value || "").replace(/\D/g, "");
  }

  function formatMemberListPhone344(value) {
    const digits = normalizeMemberListPhone(value).slice(0, 11);
    if (digits.length <= 3) return digits;
    if (digits.length <= 7) return `${digits.slice(0, 3)} ${digits.slice(3)}`;
    return `${digits.slice(0, 3)} ${digits.slice(3, 7)} ${digits.slice(7, 11)}`;
  }

  function formatMemberListDate(ms) {
    if (!ms) return "";
    const d = new Date(Number(ms));
    if (Number.isNaN(d.getTime())) return "";
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
  }

  function memberListJoinResult(member) {
    const status = String(member?.status || "");
    if (status === "active") return member?.adminAccess ? "관리자" : "승인";
    if (status === "blocked") return "차단";
    if (status === "withdrawn") return "탈퇴";
    if (status === "deleted") return "삭제";
    if (status === "rejected") return "거절";
    if (status === "pending") return "가입대기";
    return member?.approved ? "승인" : "가입대기";
  }

  function normalizeMemberListMainPayload(rawValue) {
    const payload = rawValue && typeof rawValue === "object" ? { ...rawValue } : {};
    let data = payload.data && typeof payload.data === "object" ? payload.data : payload;
    if (!data || !Array.isArray(data.rows)) data = makeDefaultMemberListData();
    if (!Array.isArray(data.cols)) data.cols = MEMBER_LIST_TABLE_WIDTHS.map((w) => `width:${w}px`);
    if (!Array.isArray(data.rows) || !data.rows.length) data.rows = makeDefaultMemberListData().rows;
    data.rows = data.rows.map((row, rIdx) => {
      const sourceRow = Array.isArray(row) ? row : [];
      const nextRow = [];
      const colCount = Math.max(MEMBER_LIST_TABLE_HEADERS.length, data.cols.length || 0, sourceRow.length || 0);
      for (let c = 0; c < colCount; c += 1) {
        const cell = sourceRow[c] && typeof sourceRow[c] === "object" ? { ...sourceRow[c] } : makeMemberListCell("", rIdx === 0 ? "th" : "td");
        if (cell.html == null) cell.html = "";
        if (!cell.tag) cell.tag = rIdx === 0 ? "th" : "td";
        if (rIdx === 0) cell.className = "header-cell";
        nextRow.push(cell);
      }
      return nextRow;
    });
    return { payload, data };
  }

  function getMemberListHeaderIndex(data, label, fallback) {
    const header = data.rows?.[0] || [];
    const target = normalizeMemberListLabel(label);
    for (let i = 0; i < header.length; i += 1) {
      const text = normalizeMemberListLabel(header[i]?.html || "");
      if (text === target || text.includes(target)) return i;
    }
    return fallback;
  }

  function getMemberListCellText(row, index) {
    if (!row || index < 0 || !row[index]) return "";
    return stripMemberListHtml(row[index].html || "");
  }

  function setMemberListCellText(row, index, value) {
    if (!row || index < 0) return;
    while (row.length <= index) row.push(makeMemberListCell(""));
    row[index].html = String(value || "");
    if (!row[index].tag) row[index].tag = "td";
  }

  function findMemberListRowByUid(data, uidIdx, code) {
    const key = String(code || "").trim();
    if (!key) return null;
    return (data.rows || []).slice(1).find((row) => getMemberListCellText(row, uidIdx) === key) || null;
  }

  function findMemberListRowByNamePhone(data, nameIdx, phoneIdx, name, phone) {
    const nameKey = normalizeMemberListLabel(name);
    const phoneKey = normalizeMemberListPhone(phone);
    if (!nameKey || !phoneKey) return null;
    return (data.rows || []).slice(1).find((row) => {
      return normalizeMemberListLabel(getMemberListCellText(row, nameIdx)) === nameKey &&
        normalizeMemberListPhone(getMemberListCellText(row, phoneIdx)) === phoneKey;
    }) || null;
  }

  function findFirstEmptyMemberListRow(data, nameIdx, phoneIdx, uidIdx) {
    return (data.rows || []).slice(1).find((row) => {
      return !getMemberListCellText(row, nameIdx) && !getMemberListCellText(row, phoneIdx) && !getMemberListCellText(row, uidIdx);
    }) || null;
  }

  function applyMemberToMemberListData(data, member) {
    const code = String(member?.code || "").trim();
    if (!code) return false;
    const idx = {
      name: getMemberListHeaderIndex(data, "이 름", 1),
      gender: getMemberListHeaderIndex(data, "성별", 2),
      birth: getMemberListHeaderIndex(data, "출생년도", 3),
      rrn: getMemberListHeaderIndex(data, "주민번호", 4),
      phone: getMemberListHeaderIndex(data, "연락처", 5),
      dong: getMemberListHeaderIndex(data, "거주지", 8),
      approval: getMemberListHeaderIndex(data, "가입:승인", 19),
      uid: getMemberListHeaderIndex(data, "회원UID", 20),
      joinDate: getMemberListHeaderIndex(data, "가입일", 21),
      result: getMemberListHeaderIndex(data, "승인결과", 22)
    };
    const incomingName = String(member.name || "").trim();
    const incomingPhone = formatMemberListPhone344(member.phone || member.phoneDigits || "");
    const resultLabel = memberListJoinResult(member);
    const joinDate = formatMemberListDate(member.approvedAt || member.createdAt || member.updatedAt);

    let row = findMemberListRowByUid(data, idx.uid, code);
    let metadataOnly = !!row;
    if (!row) {
      row = findMemberListRowByNamePhone(data, idx.name, idx.phone, incomingName, incomingPhone);
      metadataOnly = !!row;
    }
    if (!row) {
      row = findFirstEmptyMemberListRow(data, idx.name, idx.phone, idx.uid);
    }
    if (!row) {
      row = MEMBER_LIST_TABLE_HEADERS.map(() => makeMemberListCell(""));
      data.rows.push(row);
    }

    if (!metadataOnly) {
      setMemberListCellText(row, idx.name, incomingName);
      setMemberListCellText(row, idx.gender, member.gender || "");
      setMemberListCellText(row, idx.birth, "");
      setMemberListCellText(row, idx.rrn, member.rrn || member.birthDate || member.birthYear || "");
      setMemberListCellText(row, idx.phone, incomingPhone);
      setMemberListCellText(row, idx.dong, member.dong || "");
    }
    setMemberListCellText(row, idx.approval, (resultLabel === "승인" || resultLabel === "관리자") ? "승인" : resultLabel);
    setMemberListCellText(row, idx.uid, code);
    setMemberListCellText(row, idx.joinDate, joinDate);
    setMemberListCellText(row, idx.result, resultLabel);
    return true;
  }

  async function mergeMemberIntoOneMemberListDb(targetDb, member, label) {
    const snap = await get(ref(targetDb, MEMBER_LIST_MAIN_PATH));
    const currentValue = snap.exists() ? snap.val() : null;
    const normalized = normalizeMemberListMainPayload(currentValue);
    const changed = applyMemberToMemberListData(normalized.data, member);
    if (!changed) return false;
    const nextPayload = {
      ...(currentValue && typeof currentValue === "object" && currentValue.data ? currentValue : {}),
      type: "member-list-table-data",
      version: "membel-list-realtime-2.0",
      source: `bus-seat-approval-merge-${label || "default"}`,
      reason: "bus-seat-member-approval-merge",
      updatedBy: "bus-seat-approval",
      clientId: "bus-seat-approval",
      updatedAt: Date.now(),
      updatedAtISO: new Date().toISOString(),
      data: normalized.data
    };
    await update(ref(targetDb), { [MEMBER_LIST_MAIN_PATH]: nextPayload });
    return true;
  }

  async function mergeMemberIntoMemberListMain(member) {
    if (!member || !member.code) return;
    await mergeMemberIntoOneMemberListDb(membershipDb, member, "bus-seat");
    try {
      await mergeMemberIntoOneMemberListDb(getMemberListExternalDb(), member, "member-list-external");
    } catch (error) {
      console.warn("외부 멤버리스트 DB 반영 실패:", error);
      // 회원 승인 자체는 이미 저장되었으므로 중단하지 않는다. 다만 콘솔에서 권한/연결 문제를 확인할 수 있게 남긴다.
    }
  }


  /* 테스트 회원 자동 생성 기능 제거됨.
     실제 회원 데이터는 Firebase DB 또는 JSON 복구 데이터만 사용한다. */

  function memberNameMatches(member, inputName) {
    const target = normalizeName(inputName);
    if (!target || !member) return false;
    const candidates = [
      member.name,
      member.nameKey,
      member.memberName,
      member.userName,
      member.displayName,
      member.id,
      member.loginName
    ];
    return candidates.some((value) => normalizeName(value) === target);
  }

  function memberPasswordMatches(member, inputPassword, inputHash) {
    if (!member) return false;
    const normalizedInput = normalizePasswordInput(inputPassword);
    const savedHashes = [member.passwordHash, member.passHash, member.pwHash, member.memberPasswordHash]
      .map((v) => String(v || "").trim())
      .filter(Boolean);
    if (savedHashes.includes(inputHash)) return true;

    // 과거 파일/JSON 복구에서 평문 필드로 남아 있는 경우도 로그인 가능하게 호환 처리
    const savedPlain = [member.password, member.pass, member.pw, member.memberPassword, member.loginPassword]
      .map((v) => normalizePasswordInput(v))
      .filter(Boolean);
    if (savedPlain.includes(normalizedInput)) return true;

    // 승인완료인데 passwordHash가 누락된 joinCodes-only 자료는 운영 기준 초기비번(끝4자리+0)으로 통과시킨다.
    // 로그인 후 관리자가 비번초기화/고아복구를 실행하면 표준 DB로 완전 복구된다.
    const status = String(member.status || "").toLowerCase();
    if ((member.__joinCodesOnly || member.__loginIndexOnly) && (member.approved || status === "active")) {
      const last4 = getMemberPhoneLast4(member);
      if (last4.length === 4 && normalizedInput === `${last4}0`) return true;
    }
    return false;
  }

  function isMemberAllowedToLogin(member) {
    const status = String(member?.status || "").toLowerCase();
    if (status === "blocked" || status === "withdrawn" || status === "rejected") return false;
    if (member?.approved === true) return true;
    return ["active", "approved", "member", "admin"].includes(status);
  }

  function makeMemberLoginIndexRecord(member) {
    const m = member || {};
    return {
      code: String(m.code || ""),
      name: String(m.name || ""),
      nameKey: makeNameKey(m.name || ""),
      passwordHash: String(m.passwordHash || m.passHash || m.pwHash || m.memberPasswordHash || ""),
      approved: !!m.approved,
      status: String(m.status || (m.approved ? "active" : "pending")),
      role: String(m.role || (m.adminAccess ? "admin" : "member")),
      adminAccess: !!m.adminAccess,
      phone: m.phone || "",
      phoneDigits: m.phoneDigits || "",
      phoneLast4: m.phoneLast4 || getMemberPhoneLast4(m),
      birthDate: m.birthDate || m.rrn || m.birthYear || "",
      rrn: m.rrn || m.birthDate || m.birthYear || "",
      apps: m.apps || {},
      updatedAt: Date.now()
    };
  }

  function getMemberPhoneLast4(member) {
    const direct = String(member?.phoneLast4 || "").replace(/\D/g, "").slice(-4);
    if (direct.length === 4) return direct;
    return String(member?.phoneDigits || member?.phone || member?.tel || "").replace(/\D/g, "").slice(-4);
  }

  async function ensureMemberPasswordHashForLogin(member) {
    if (!member) return "";
    const current = String(member.passwordHash || member.passHash || member.pwHash || member.memberPasswordHash || "").trim();
    if (current) {
      member.passwordHash = current;
      return current;
    }
    const plain = normalizePasswordInput(member.password || member.pass || member.pw || member.memberPassword || member.loginPassword || "");
    if (plain) {
      const hash = await sha256Hex(plain);
      member.passwordHash = hash;
      return hash;
    }
    // 신규 승인 과정에서 비밀번호 해시가 누락된 회원은 로그인 불능이 되므로
    // 운영 기준인 전화번호 끝 4자리 + 0으로 복구한다.
    const last4 = getMemberPhoneLast4(member);
    if (last4.length === 4) {
      const hash = await sha256Hex(`${last4}0`);
      member.passwordHash = hash;
      member.passwordResetAt = member.passwordResetAt || Date.now();
      return hash;
    }
    return "";
  }

  function addCanonicalLoginPathUpdates(updates, member, code) {
    const keyCode = String(code || member?.code || "").trim();
    const nameKey = makeNameKey(member?.name || "");
    const plainNameKey = normalizeName(member?.name || "");
    if (!keyCode || !nameKey) return;
    const allowed = String(member?.status || "").toLowerCase() === "active" && !!member?.approved && !!member?.passwordHash;
    const loginRecord = makeMemberLoginIndexRecord(member);
    Array.from(new Set([nameKey, plainNameKey].filter(Boolean))).forEach((key) => {
      updates[`${MEMBERS_ROOT}/nameIndex/${key}/${keyCode}`] = allowed ? true : null;
      updates[`${MEMBER_LOGIN_INDEX_PATH}/${key}/${keyCode}`] = allowed ? loginRecord : null;
    });
    updates[`${MEMBERS_ROOT}/members/${keyCode}`] = allowed ? { ...member, code: keyCode } : updates[`${MEMBERS_ROOT}/members/${keyCode}`];
  }

  async function getLoginIndexMembersByName(name) {
    const key = makeNameKey(name);
    if (!key) return [];
    try {
      const snap = await get(ref(membershipDb, `${MEMBER_LOGIN_INDEX_PATH}/${key}`));
      if (!snap.exists()) return [];
      const value = snap.val() || {};
      return Object.keys(value).map((code) => ({
        ...(value[code] || {}),
        code: (value[code] && value[code].code) || code,
        __loginIndexOnly: true
      })).filter((m) => memberNameMatches(m, name));
    } catch (error) {
      console.warn("회원 로그인 인덱스 조회 실패:", error);
      return [];
    }
  }

  function mergeMemberCandidateForLogin(existing, incoming) {
    const prev = existing && typeof existing === "object" ? existing : {};
    const next = incoming && typeof incoming === "object" ? incoming : {};
    const merged = { ...prev, ...next };

    // 로그인 비밀번호 변경/검증에서 가장 중요한 값은 passwordHash다.
    // loginIndex에서 먼저 읽은 최신 passwordHash가 뒤쪽 members/nameIndex/전체검색 자료의
    // 오래된 passwordHash 또는 빈 값으로 덮이지 않도록 보존한다.
    const prevHash = String(prev.passwordHash || prev.passHash || prev.pwHash || prev.memberPasswordHash || "").trim();
    const nextHash = String(next.passwordHash || next.passHash || next.pwHash || next.memberPasswordHash || "").trim();
    if (prevHash) merged.passwordHash = prevHash;
    else if (nextHash) merged.passwordHash = nextHash;

    // 평문 호환 필드는 빈 값이 아닌 경우만 보강한다.
    ["password", "pass", "pw", "memberPassword", "loginPassword"].forEach((key) => {
      if (!merged[key] && next[key]) merged[key] = next[key];
      if (!merged[key] && prev[key]) merged[key] = prev[key];
    });

    merged.__sources = [
      ...(Array.isArray(prev.__sources) ? prev.__sources : (prev.__loginIndexOnly ? ["loginIndex"] : [])),
      ...(Array.isArray(next.__sources) ? next.__sources : (next.__loginIndexOnly ? ["loginIndex"] : []))
    ].filter(Boolean);
    return merged;
  }

  function setMemberCandidate(map, code, member) {
    const key = String(code || member?.code || "").trim();
    if (!key) return;
    const normalized = { ...(member || {}), code: key };
    map.set(key, map.has(key) ? mergeMemberCandidateForLogin(map.get(key), normalized) : normalized);
  }

  async function findMembersByName(name) {
    const key = makeNameKey(name);
    const membersByCode = new Map();

    // 보안 구조: 일반 로그인은 공개 가능한 최소 정보(loginIndex)를 먼저 사용한다.
    // 회원 전체 DB는 Rules에서 관리자 전용으로 잠겨도 이 경로로 로그인이 가능하다.
    const loginIndexMembers = await getLoginIndexMembersByName(name);
    for (const m of loginIndexMembers) {
      const code = String(m?.code || "").trim();
      if (!code) continue;
      const canonical = await getMemberRecordByCodeAnyRoot(code);
      if (canonical && canonical.member) {
        // loginIndex는 공개 로그인용이라 오래된 잘못된 코드가 남을 수 있다.
        // 회원관리 표시DB/joinCodes 또는 실제 members에서 확인한 이름이 입력 이름과 다르면
        // 같은 비밀번호라도 다른 회원이므로 비밀번호 변경 후보에서 제외한다.
        if (!memberNameMatches(canonical.member, name)) {
          console.warn("비밀번호 변경 후보 제외: loginIndex 이름/코드 불일치", code, m.name, canonical.member.name);
          continue;
        }
        setMemberCandidate(membersByCode, code, mergeMemberCandidateForLogin(m, { ...canonical.member, __sources: [canonical.membersPath || "canonical"] }));
      } else {
        setMemberCandidate(membersByCode, code, { ...m, __sources: ["loginIndex"] });
      }
    }

    // 1) 이름 인덱스가 있는 경우: 모든 호환 경로의 nameIndex를 확인
    const codes = await getNameIndexCodesAnyRoot(key);
    for (const code of codes) {
      const record = await getMemberRecordByCodeAnyRoot(code);
      // nameIndex에 오래된 코드가 남아 있으면 다른 이름 회원이 섞일 수 있다.
      // 비밀번호가 같은 다른 회원을 동명이인으로 오판하지 않도록 실제 회원 이름을 다시 완전일치 확인한다.
      if (record && record.member && memberNameMatches(record.member, name)) {
        setMemberCandidate(membersByCode, record.member.code || code, { ...record.member, __sources: [record.membersPath || "members"] });
      }
    }

    // 2) 인덱스가 없거나 잘못된 경우: 모든 회원 DB를 전체 검색
    const all = await getAllMembersFromAnyRoot();
    Object.keys(all).forEach((code) => {
      const m = all[code];
      if (memberNameMatches(m, name)) {
        setMemberCandidate(membersByCode, (m && m.code) || code, { ...m, code: (m && m.code) || code, __sources: ["allMembers"] });
      }
    });

    return Array.from(membersByCode.values());
  }

  function memberHasLoginPasswordData(member) {
    if (!member) return false;
    return !!(member.passwordHash || member.passHash || member.pwHash || member.memberPasswordHash ||
      member.password || member.pass || member.pw || member.memberPassword || member.loginPassword);
  }

  function enforceMemberInputModeHiddenUi() {
    // 로그인 버튼이 아니라 모바일 키보드의 Enter/이동/완료로 로그인해도
    // 회원 입력 모드 전용 숨김 UI가 다시 보이지 않도록 강제 정리한다.
    try {
      document.body.classList.remove("admin-mode", "member-manage-mode", "admin-entry-only");
      document.body.classList.add("member-mode");
      document.querySelectorAll("#memberPanel .member-hide-in-ui, #memberActionRow").forEach((el) => {
        el.classList.add("hidden");
        el.style.display = "none";
      });
      const panel = byId("memberPanel");
      if (panel) panel.classList.remove("hidden");
      byId("adminLoginPanel")?.classList.add("hidden");
      byId("adminPanel")?.classList.add("hidden");
      byId("memberManagePanel")?.classList.add("hidden");
      byId("memberTab")?.classList.add("active");
      byId("adminTab")?.classList.remove("active");
      byId("memberManageTab")?.classList.remove("active");
    } catch (error) {}
  }


  function getLoginDeviceId() {
    try {
      let id = localStorage.getItem(LOGIN_DEVICE_KEY);
      if (!id) {
        id = `dev_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 10)}`;
        localStorage.setItem(LOGIN_DEVICE_KEY, id);
      }
      return id;
    } catch (error) {
      return `dev_session_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 8)}`;
    }
  }

  function getLoginDeviceLabel() {
    const ua = navigator.userAgent || "";
    if (/Mobi|Android|iPhone|iPad|iPod/i.test(ua)) return "모바일";
    return "PC";
  }

  function formatSessionTime(value) {
    const time = Number(value || 0);
    if (!time) return "-";
    const d = new Date(time);
    const hh = String(d.getHours()).padStart(2, "0");
    const mm = String(d.getMinutes()).padStart(2, "0");
    return `${hh}:${mm}`;
  }

  function isFreshActiveSession(item, now = Date.now()) {
    return item && Number(item.lastSeen || item.loginAt || 0) > now - ACTIVE_SESSION_STALE_MS;
  }

  async function getFreshActiveSessionsByCode(code) {
    try {
      const snap = await get(ref(membershipDb, `${ACTIVE_SESSIONS_PATH}/${code}`));
      if (!snap.exists()) return [];
      const now = Date.now();
      const value = snap.val() || {};
      return Object.keys(value)
        .map((deviceId) => ({ ...(value[deviceId] || {}), deviceId }))
        .filter((item) => isFreshActiveSession(item, now));
    } catch (error) {
      console.warn("현재 로그인 세션 조회 실패 - 로그인은 계속 진행합니다:", error);
      return [];
    }
  }

  async function removeCurrentActiveSession() {
    const session = currentApprovedMemberSession;
    if (!session || !session.code || !session.deviceId) return;
    try {
      const snap = await get(ref(membershipDb, `${ACTIVE_SESSIONS_PATH}/${session.code}/${session.deviceId}`));
      const active = snap.exists() ? snap.val() : null;
      if (active && active.deviceId === session.deviceId) {
        await writeLoginLog("logout", session, { message: "접속 종료" });
        await update(ref(membershipDb), { [`${ACTIVE_SESSIONS_PATH}/${session.code}/${session.deviceId}`]: null });
      }
    } catch (error) {
      console.warn("현재 로그인 세션 제거 실패:", error);
    }
  }

  function stopActiveSessionWatchers() {
    if (activeSessionHeartbeatTimer) {
      clearInterval(activeSessionHeartbeatTimer);
      activeSessionHeartbeatTimer = null;
    }
    if (typeof activeSessionUnsubscribe === "function") {
      try { activeSessionUnsubscribe(); } catch (error) {}
      activeSessionUnsubscribe = null;
    }
  }

  async function forceLogoutByRemoteSession(message) {
    if (isProcessingRemoteLogout) return;
    isProcessingRemoteLogout = true;
    stopActiveSessionWatchers();
    try { await writeLoginLog("remote_logout", currentApprovedMemberSession, { message: message || "다른 기기 로그인" }); } catch (error) {}
    try {
      currentApprovedMemberSession = null;
      localStorage.removeItem(LOGIN_SESSION_KEY);
      sessionStorage.removeItem(LOGIN_SESSION_KEY);
    } catch (error) {}
    try {
      if (typeof window.__busSeatForceFullLogoutFromMembership === "function") {
        window.__busSeatForceFullLogoutFromMembership();
      }
    } catch (error) {}
    document.body.classList.add("membership-locked");
    document.body.classList.remove("admin-mode", "member-manage-mode", "member-mode", "admin-entry-only");
    const gate = byId("memberAuthGate");
    if (gate) {
      gate.classList.remove("is-hidden");
      gate.style.display = "flex";
    }
    const app = document.querySelector(".app");
    if (app) {
      app.style.visibility = "hidden";
      app.style.pointerEvents = "none";
    }
    clearMemberAuthInputValues();
    setMemberAuthViewMode("main");
    setAuthMessage(message || "다른 기기에서 로그인되어 현재 접속이 종료되었습니다.");
    setTimeout(() => { isProcessingRemoteLogout = false; }, 500);
  }

  async function registerActiveMemberSession(session) {
    if (!session || !session.code) return session;
    const deviceId = getLoginDeviceId();
    const deviceLabel = getLoginDeviceLabel();
    const now = Date.now();
    const isAdmin = session.adminAccess || session.role === "admin" || session.code === "ADMIN";
    const activeList = await getFreshActiveSessionsByCode(session.code);
    const otherFresh = activeList.filter((item) => item.deviceId && item.deviceId !== deviceId);

    if (!isAdmin && otherFresh.length > 0) {
      const otherText = otherFresh.map((item) => `${item.deviceLabel || "다른기기"} ${formatSessionTime(item.loginAt)}`).join(", ");
      const ok = confirm(`이미 다른 기기에서 로그인 중입니다.
(${otherText})

기존 접속을 종료하고 이 기기에서 로그인하시겠습니까?`);
      if (!ok) {
        setAuthMessage("기존 접속이 있어 로그인을 취소했습니다.");
        return null;
      }
      const clearUpdates = {};
      otherFresh.forEach((item) => {
        clearUpdates[`${ACTIVE_SESSIONS_PATH}/${session.code}/${item.deviceId}`] = null;
      });
      await writeLoginLog("duplicate_detected", session, { message: "다른 기기 접속 발견" });
      await update(ref(membershipDb), clearUpdates);
      for (const item of otherFresh) {
        await writeLoginLog("force_logout_old_device", item, {
          message: "새 기기 로그인으로 기존 접속 종료",
          byDeviceId: deviceId,
          byDeviceLabel: deviceLabel
        });
      }
    }

    const nextSession = {
      ...session,
      deviceId,
      deviceLabel,
      loginAt: session.loginAt || now,
      lastSeen: now
    };
    await update(ref(membershipDb), {
      [`${ACTIVE_SESSIONS_PATH}/${session.code}/${deviceId}`]: {
        code: nextSession.code,
        name: nextSession.name,
        role: nextSession.role || "member",
        adminAccess: !!nextSession.adminAccess,
        deviceId,
        deviceLabel,
        loginAt: nextSession.loginAt,
        lastSeen: now,
        userAgent: (navigator.userAgent || "").slice(0, 120)
      }
    });
    await writeLoginLog("login", nextSession, { message: "로그인 성공" });
    return nextSession;
  }

  function startActiveSessionWatch(session) {
    stopActiveSessionWatchers();
    if (!session || !session.code || !session.deviceId) return;
    const sessionPath = `${ACTIVE_SESSIONS_PATH}/${session.code}/${session.deviceId}`;
    const touch = () => {
      if (!currentApprovedMemberSession || currentApprovedMemberSession.deviceId !== session.deviceId) return;
      update(ref(membershipDb), { [`${sessionPath}/lastSeen`]: Date.now() }).catch(() => {});
    };
    activeSessionHeartbeatTimer = setInterval(touch, ACTIVE_SESSION_HEARTBEAT_MS);
    touch();
    activeSessionUnsubscribe = onValue(ref(membershipDb, sessionPath), (snap) => {
      if (!currentApprovedMemberSession || currentApprovedMemberSession.deviceId !== session.deviceId) return;
      if (!snap.exists()) {
        forceLogoutByRemoteSession("다른 기기에서 같은 아이디로 로그인하여 현재 접속이 종료되었습니다.");
      }
    });
  }

  function renderActiveLoginList(sessions) {
    const list = byId("activeLoginList");
    const count = byId("activeLoginCount");
    if (!list || !count) return;
    const now = Date.now();
    const fresh = sessions.filter((item) => isFreshActiveSession(item, now));
    count.textContent = `${fresh.length}명`;
    if (fresh.length === 0) {
      list.innerHTML = '<div class="active-login-empty">현재 로그인 회원이 없습니다.</div>';
      return;
    }
    fresh.sort((a, b) => String(a.name || "").localeCompare(String(b.name || ""), "ko") || Number(b.lastSeen || 0) - Number(a.lastSeen || 0));
    list.innerHTML = fresh.map((item) => {
      const staleMs = now - Number(item.lastSeen || 0);
      const staleText = staleMs > ACTIVE_SESSION_HEARTBEAT_MS * 3 ? '<span class="active-login-warning">확인중</span>' : '접속중';
      return `<div class="active-login-item">
        <div>
          <div class="active-login-name">${escapeHtml(item.name || "-")} / ${escapeHtml(item.code || "-")}</div>
          <div class="active-login-sub">로그인 ${formatSessionTime(item.loginAt)} · 최근 ${formatSessionTime(item.lastSeen)} · ${staleText}</div>
        </div>
        <div class="active-login-device">${escapeHtml(item.deviceLabel || "기기")}</div>
      </div>`;
    }).join("");
  }

  function startMemberManageActiveSessionList() {
    if (typeof memberManageActiveSessionUnsubscribe === "function") {
      try { memberManageActiveSessionUnsubscribe(); } catch (error) {}
      memberManageActiveSessionUnsubscribe = null;
    }
    memberManageActiveSessionUnsubscribe = onValue(ref(membershipDb, ACTIVE_SESSIONS_PATH), (snap) => {
      const sessions = [];
      const value = snap.exists() ? (snap.val() || {}) : {};
      Object.keys(value).forEach((code) => {
        const byDevice = value[code] || {};
        Object.keys(byDevice).forEach((deviceId) => {
          sessions.push({ ...(byDevice[deviceId] || {}), code, deviceId });
        });
      });
      renderActiveLoginList(sessions);
    }, (error) => {
      console.warn("현재 로그인 회원 목록 조회 실패:", error);
      const list = byId("activeLoginList");
      if (list) list.innerHTML = '<div class="active-login-empty">현재 로그인 목록을 불러오지 못했습니다.</div>';
    });
  }


  function makeLoginLogKey(time = Date.now()) {
    return `${time}_${Math.random().toString(36).slice(2, 8)}`;
  }

  function formatLogDateTime(value) {
    const time = Number(value || 0);
    if (!time) return "-";
    const d = new Date(time);
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    const dd = String(d.getDate()).padStart(2, "0");
    const hh = String(d.getHours()).padStart(2, "0");
    const mi = String(d.getMinutes()).padStart(2, "0");
    const ss = String(d.getSeconds()).padStart(2, "0");
    return `${mm}/${dd} ${hh}:${mi}:${ss}`;
  }

  function getLoginActionLabel(action) {
    const map = {
      login: "로그인",
      logout: "로그아웃",
      duplicate_detected: "중복감지",
      force_logout_old_device: "기존종료",
      remote_logout: "강제종료",
      session_removed: "세션삭제"
    };
    return map[action] || action || "기록";
  }

  async function writeLoginLog(action, session, extra = {}) {
    try {
      const now = Date.now();
      const source = session || currentApprovedMemberSession || {};
      const isAdminLog = !!(source.adminAccess || extra.adminAccess || source.role === "admin" || extra.role === "admin" || source.code === "ADMIN" || extra.code === "ADMIN");
      if (isAdminLog) return;
      const deviceId = source.deviceId || getLoginDeviceId();
      const deviceLabel = source.deviceLabel || getLoginDeviceLabel();
      const dedupKey = [
        action || "log",
        source.code || extra.code || "-",
        source.name || extra.name || "-",
        source.role || extra.role || "member",
        source.adminAccess || extra.adminAccess ? "admin" : "member",
        deviceId,
        extra.message || ""
      ].join("|");
      const last = window.__busSeatLastLoginLogDedup || {};
      if (last.key === dedupKey && now - Number(last.time || 0) < 3000) {
        return;
      }
      window.__busSeatLastLoginLogDedup = { key: dedupKey, time: now };

      const log = {
        action: action || "log",
        actionLabel: getLoginActionLabel(action),
        code: source.code || extra.code || "-",
        name: source.name || extra.name || "-",
        role: source.role || extra.role || "member",
        adminAccess: !!(source.adminAccess || extra.adminAccess),
        deviceId,
        deviceLabel,
        createdAt: now,
        message: extra.message || "",
        byDeviceId: extra.byDeviceId || "",
        byDeviceLabel: extra.byDeviceLabel || "",
        userAgent: (navigator.userAgent || "").slice(0, 120)
      };
      await update(ref(membershipDb), { [`${LOGIN_LOGS_PATH}/${makeLoginLogKey(now)}`]: log });
      cleanupOldLoginLogs().catch((cleanupError) => console.warn("로그 기록 자동 정리 실패:", cleanupError));
    } catch (error) {
      console.warn("로그인 기록 저장 실패:", error);
    }
  }

  function renderLoginLogList(logs) {
    const list = byId("loginLogList");
    const count = byId("loginLogCount");
    if (!list || !count) return;
    const rows = (Array.isArray(logs) ? logs.slice() : []).filter((item) => !(item && (item.adminAccess || item.role === "admin" || item.code === "ADMIN")));
    rows.sort((a, b) => Number(b.createdAt || 0) - Number(a.createdAt || 0));
    latestLoginLogs = rows;
    count.textContent = `${rows.length}건`;
    if (rows.length === 0) {
      list.innerHTML = '<div class="login-log-empty">로그인 기록이 없습니다.</div>';
      return;
    }
    list.innerHTML = rows.slice(0, 5000).map((item) => {
      const label = getLoginActionLabel(item.action || item.actionLabel);
      const msg = item.message ? ` · ${escapeHtml(item.message)}` : "";
      return `<div class="login-log-item">
        <div>
          <div class="login-log-name">${escapeHtml(item.name || "-")} / ${escapeHtml(item.code || "-")}</div>
          <div class="login-log-sub">${formatLogDateTime(item.createdAt)} · ${escapeHtml(item.deviceLabel || "기기")}${msg}</div>
        </div>
        <div class="login-log-badge">${escapeHtml(label)}</div>
      </div>`;
    }).join("");
  }

  function startMemberManageLoginLogList() {
    if (typeof memberManageLoginLogUnsubscribe === "function") {
      try { memberManageLoginLogUnsubscribe(); } catch (error) {}
      memberManageLoginLogUnsubscribe = null;
    }
    const logQuery = query(ref(membershipDb, LOGIN_LOGS_PATH), orderByChild("createdAt"), limitToLast(5000));
    memberManageLoginLogUnsubscribe = onValue(logQuery, (snap) => {
      const logs = [];
      const value = snap.exists() ? (snap.val() || {}) : {};
      Object.keys(value).forEach((key) => logs.push({ ...(value[key] || {}), key }));
      renderLoginLogList(logs);
    }, (error) => {
      console.warn("로그인 기록 조회 실패:", error);
      const list = byId("loginLogList");
      if (list) list.innerHTML = '<div class="login-log-empty">로그인 기록을 불러오지 못했습니다.</div>';
    });
  }


  async function loadLoginLogRetentionDays() {
    try {
      const snap = await get(ref(membershipDb, `${LOGIN_LOG_SETTINGS_PATH}/retentionDays`));
      const days = Number(snap.exists() ? snap.val() : DEFAULT_LOGIN_LOG_RETENTION_DAYS);
      const safeDays = Number.isFinite(days) && days > 0 ? Math.min(Math.max(Math.floor(days), 1), 365) : DEFAULT_LOGIN_LOG_RETENTION_DAYS;
      const input = byId("loginLogRetentionDaysInput");
      if (input) input.value = String(safeDays);
      return safeDays;
    } catch (error) {
      console.warn("로그 저장기간 조회 실패:", error);
      return DEFAULT_LOGIN_LOG_RETENTION_DAYS;
    }
  }

  async function saveLoginLogRetentionDays() {
    const input = byId("loginLogRetentionDaysInput");
    const raw = Number(input?.value || DEFAULT_LOGIN_LOG_RETENTION_DAYS);
    const days = Number.isFinite(raw) && raw > 0 ? Math.min(Math.max(Math.floor(raw), 1), 365) : DEFAULT_LOGIN_LOG_RETENTION_DAYS;
    if (input) input.value = String(days);
    await update(ref(membershipDb), {
      [`${LOGIN_LOG_SETTINGS_PATH}/retentionDays`]: days,
      [`${LOGIN_LOG_SETTINGS_PATH}/updatedAt`]: Date.now()
    });
    await cleanupOldLoginLogs(days);
    alert(`로그 기록 저장기간을 ${days}일로 저장했습니다.`);
  }

  async function cleanupOldLoginLogs(daysOverride) {
    try {
      const days = Number(daysOverride || await loadLoginLogRetentionDays() || DEFAULT_LOGIN_LOG_RETENTION_DAYS);
      const cutoff = Date.now() - days * 24 * 60 * 60 * 1000;
      const snap = await get(ref(membershipDb, LOGIN_LOGS_PATH));
      if (!snap.exists()) return 0;
      const value = snap.val() || {};
      const updates = {};
      let removed = 0;
      Object.keys(value).forEach((key) => {
        const item = value[key] || {};
        const createdAt = Number(item.createdAt || 0);
        if (createdAt && createdAt < cutoff) {
          updates[`${LOGIN_LOGS_PATH}/${key}`] = null;
          removed += 1;
        }
      });
      if (removed > 0) await update(ref(membershipDb), updates);
      return removed;
    } catch (error) {
      console.warn("오래된 로그인 기록 자동 삭제 실패:", error);
      return 0;
    }
  }

  function formatLogStoryDateTime(value) {
    const time = Number(value || 0);
    if (!time) return "0000.00.00_00:00:00";
    const d = new Date(time);
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    const dd = String(d.getDate()).padStart(2, "0");
    const hh = String(d.getHours()).padStart(2, "0");
    const mi = String(d.getMinutes()).padStart(2, "0");
    const ss = String(d.getSeconds()).padStart(2, "0");
    return `${yyyy}.${mm}.${dd}_${hh}:${mi}:${ss}`;
  }

  function getLoginStoryActionText(item) {
    const action = String(item?.action || "");
    const message = item?.message ? ` (${item.message})` : "";
    const map = {
      login: "로그인했습니다",
      logout: "로그아웃했습니다",
      duplicate_detected: "다른 기기에서 같은 아이디로 로그인하려는 중복 로그인이 감지되었습니다",
      force_logout_old_device: "새 로그인 때문에 기존 접속 기기가 종료 처리되었습니다",
      remote_logout: "다른 기기의 로그인으로 현재 접속이 강제 종료되었습니다",
      session_removed: "로그인 세션이 삭제되었습니다"
    };
    return `${map[action] || getLoginActionLabel(action) || "기록되었습니다"}${message}`;
  }

  function makeLoginLogStoryText(logs) {
    const rows = (Array.isArray(logs) ? logs.slice() : []).filter((item) => !(item && (item.adminAccess || item.role === "admin" || item.code === "ADMIN")));
    rows.sort((a, b) => Number(a.createdAt || 0) - Number(b.createdAt || 0));
    if (rows.length === 0) return "로그인 기록이 없습니다.";

    return rows.map((item, index) => {
      const dt = formatLogStoryDateTime(item.createdAt);
      const name = String(item.name || "이름없음").trim();
      const device = String(item.deviceLabel || "기기").includes("모바일") ? "모바일" : "PC";
      const roleCode = item.adminAccess || item.role === "admin" ? "Admin" : "Member";
      const roleText = item.adminAccess || item.role === "admin" ? "관리자" : "회원";
      return `${index + 1}. ${dt} ${name} ${device.padEnd(5, " ")} ${roleCode}, ${roleText}`;
    }).join("\r\n");
  }

  async function downloadLoginLogFile() {
    let logs = [];
    try {
      const input = byId("loginLogRetentionDaysInput");
      const rawDays = Number(input?.value || DEFAULT_LOGIN_LOG_RETENTION_DAYS);
      const days = Number.isFinite(rawDays) && rawDays > 0 ? Math.min(Math.max(Math.floor(rawDays), 1), 365) : DEFAULT_LOGIN_LOG_RETENTION_DAYS;
      const cutoff = Date.now() - days * 24 * 60 * 60 * 1000;
      const snap = await get(ref(membershipDb, LOGIN_LOGS_PATH));
      const value = snap.exists() ? (snap.val() || {}) : {};
      Object.keys(value).forEach((key) => {
        const item = value[key] || {};
        const createdAt = Number(item.createdAt || 0);
        if (createdAt && createdAt >= cutoff) logs.push({ ...item, key });
      });
    } catch (error) {
      console.error("로그파일 저장용 전체 기록 조회 실패:", error);
      logs = Array.isArray(latestLoginLogs) ? latestLoginLogs : [];
    }
    const storyText = makeLoginLogStoryText(logs);
    const blob = new Blob([storyText], { type: "text/plain;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const stamp = new Date().toISOString().replace(/[:.]/g, "-").slice(0, 19);
    a.href = url;
    a.download = `busseat-log-story-${stamp}.txt`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  async function loginMember() {
    const name = normalizeName(byId("memberLoginNameInput")?.value);
    const password = normalizePasswordInput(byId("memberLoginPasswordInput")?.value);

    // 관리자 로그인: 아이디를 비워두고 비밀번호 칸에 관리자 비밀번호만 입력한 뒤 [로그인]을 누르면 진입 가능
    // 일반 회원은 기존처럼 이름 + 개인 비밀번호가 모두 필요함.
    if (!name && password) {
      if (await isBusSeatAdminPassword(password)) {
        const adminSession = {
          code: "ADMIN",
          name: "관리자",
          role: "admin",
          adminAccess: true,
          loginAt: Date.now()
        };
        const registeredAdminSession = await registerActiveMemberSession(adminSession);
        if (!registeredAdminSession) return;
        currentApprovedMemberSession = registeredAdminSession;
        try {
          // 보안 수정: 로그인 세션은 현재 탭(sessionStorage)에만 저장한다.
          // localStorage에 남기면 로그인 화면에서 새로고침 시 자동 진입되는 문제가 생긴다.
          localStorage.removeItem(LOGIN_SESSION_KEY);
          sessionStorage.setItem(LOGIN_SESSION_KEY, JSON.stringify(registeredAdminSession));
        } catch (e) {}
        unlockApp(registeredAdminSession);
        startActiveSessionWatch(registeredAdminSession);
        if (typeof window.__busSeatEnterAdminFromMembership === "function") {
          window.__busSeatEnterAdminFromMembership();
        } else if (typeof window.__busSeatSwitchMode === "function") {
          window.__busSeatSwitchMode("member");
        }
        setAuthMessage("관리자 비밀번호로 로그인되었습니다. 회원 입력 모드로 진입했습니다.", true);
        return;
      }
      setAuthMessage("올바른 비밀번호 회원은 이름도 입력하세요.");
      return;
    }

    if (!name || !password) {
      setAuthMessage("아이디와 비밀번호를 입력하세요.");
      return;
    }
    if (!/^[가-힣]/.test(name)) {
      setAuthMessage("아이디는 한글 이름으로 시작해야 합니다.");
      return;
    }

    setAuthMessage("로그인 확인중입니다...");

    const members = await findMembersByName(name);
    if (members.length === 0) {
      setAuthMessage("가입자 정보가 없습니다 회원가입후 이용해주세요.");
      return;
    }

    const passwordHash = await sha256Hex(password);
    const matched = members.find((m) => memberPasswordMatches(m, password, passwordHash));

    if (!matched) {
      const hasNoPasswordData = members.every((m) => !memberHasLoginPasswordData(m));
      const joinOnly = members.some((m) => m && m.__joinCodesOnly);
      setAuthMessage(hasNoPasswordData
        ? (joinOnly
          ? "DB 확인 결과: 회원관리 목록(memberList/joinCodes)에만 회원이 있고 로그인 비밀번호(passwordHash)가 없습니다. 기존 회원 JSON 복구 또는 비밀번호 재설정이 필요합니다."
          : "회원 이름은 찾았지만 로그인 비밀번호 정보가 없습니다. 회원관리 JSON 복구 또는 비밀번호 재설정이 필요합니다.")
        : "비밀번호가 맞지 않습니다.");
      return;
    }

    const status = String(matched.status || "").toLowerCase();
    if (status === "pending" || (!matched.approved && !isMemberAllowedToLogin(matched))) {
      setAuthMessage(`관리자 승인 대기중입니다. 회원코드: ${matched.code}`);
      return;
    }
    if (status === "blocked") {
      setAuthMessage("접근 차단된 회원입니다. 관리자에게 문의하세요.");
      return;
    }
    if (status === "withdrawn") {
      setAuthMessage("탈퇴 처리된 회원입니다.");
      return;
    }
    if (!isMemberAllowedToLogin(matched)) {
      setAuthMessage("사용 가능한 회원 상태가 아닙니다.");
      return;
    }

    const session = {
      code: matched.code,
      name: matched.name,
      role: matched.role || "member",
      adminAccess: !!matched.adminAccess,
      loginAt: Date.now()
    };
    const registeredSession = await registerActiveMemberSession(session);
    if (!registeredSession) return;
    currentApprovedMemberSession = registeredSession;
    try {
      // 보안 수정: 로그인 세션은 현재 탭(sessionStorage)에만 저장한다.
      // localStorage에 남기면 로그인 화면에서 새로고침 시 자동 진입되는 문제가 생긴다.
      localStorage.removeItem(LOGIN_SESSION_KEY);
      sessionStorage.setItem(LOGIN_SESSION_KEY, JSON.stringify(registeredSession));
    } catch (e) {}

    saveMemberLoginName(matched.name || name);
    unlockApp(registeredSession);
    startActiveSessionWatch(registeredSession);
    try {
      if (typeof window.__busSeatSwitchMode === "function") {
        window.__busSeatSwitchMode("member");
      }
    } catch (error) {}
    enforceMemberInputModeHiddenUi();
    setTimeout(enforceMemberInputModeHiddenUi, 0);
    setTimeout(enforceMemberInputModeHiddenUi, 250);
  }

  async function joinMember() {

    }

      setAuthMessage("전화번호는 숫자만 입력하세요. 저장 시 010 1234 5678 형식으로 자동 정리됩니다.");

  async function changeMemberPassword() {
    const submitBtn = byId("memberChangePasswordSubmitBtn");
    const resultPrefix = "회원 비밀번호 변경";
    const setStep = (message, ok = false) => {
      setAuthMessage(message, ok);
      if (submitBtn) submitBtn.textContent = ok ? "완료" : "변경중";
    };
    const finishButton = () => {
      if (submitBtn) {
        submitBtn.disabled = false;
        submitBtn.textContent = "변경";
      }
    };
    const failChange = (message) => {
      const finalMessage = `${resultPrefix} 실패: ${message}`;
      setAuthMessage(finalMessage);
      try { alert(finalMessage); } catch (e) {}
    };
    const successChange = (message) => {
      const finalMessage = `${resultPrefix} 성공: ${message}`;
      setAuthMessage(finalMessage, true);
      try { alert(finalMessage); } catch (e) {}
    };

    if (submitBtn?.disabled) {
      setAuthMessage(`${resultPrefix} 진행중입니다. 잠시만 기다려주세요.`);
      return;
    }
    if (submitBtn) {
      submitBtn.disabled = true;
      submitBtn.textContent = "변경중";
    }

    try {
      const rawName = String(byId("memberChangeNameInput")?.value || "");
      const oldPassword = normalizePasswordInput(byId("memberChangeOldPasswordInput")?.value);
      const newPassword = normalizePasswordInput(byId("memberChangeNewPasswordInput")?.value);
      const confirmPassword = normalizePasswordInput(byId("memberChangeConfirmPasswordInput")?.value);

      const spaceError = validateNoWhitespaceFields([
        { label: "아이디", value: rawName },
        { label: "기존비번", value: oldPassword },
        { label: "변경비번", value: newPassword },
        { label: "비번확인", value: confirmPassword }
      ]);
      if (spaceError) {
        failChange(spaceError);
        return;
      }

      const name = normalizeName(rawName);
      if (!name || !oldPassword || !newPassword || !confirmPassword) {
        failChange("아이디, 기존비번, 변경비번, 비번확인을 모두 입력하세요.");
        return;
      }
      if (!/^[가-힣]{2,}$/.test(name)) {
        failChange("아이디는 띄어쓰기 없이 한글 이름으로 입력하세요.");
        return;
      }
      if (newPassword.length < 4) {
        failChange("변경 비밀번호는 4자리 이상 입력하세요.");
        return;
      }
      if (newPassword !== confirmPassword) {
        failChange("변경 비밀번호와 비번확인이 서로 다릅니다.");
        return;
      }
      if (oldPassword === newPassword) {
        failChange("기존 비밀번호와 다른 비밀번호를 입력하세요.");
        return;
      }

      setStep("1/5 회원 정보를 확인중입니다...");
      const members = (await findMembersByName(name)).filter((m) => memberNameMatches(m, name));
      if (!members.length) {
        failChange("등록된 회원이 없습니다. 회원가입을 먼저 진행하세요.");
        return;
      }

      setStep("2/5 기존 비밀번호를 확인중입니다...");
      const oldHash = await sha256Hex(oldPassword);
      const matches = members.filter((m) => memberPasswordMatches(m, oldPassword, oldHash));
      if (!matches.length) {
        const hasNoPasswordData = members.every((m) => !memberHasLoginPasswordData(m));
        failChange(hasNoPasswordData
          ? "회원 이름은 찾았지만 기존 비밀번호 정보가 없어 비밀번호 변경을 할 수 없습니다. 회원관리 비번초기화 후 다시 시도하세요."
          : "기존 비밀번호가 맞지 않습니다.");
        return;
      }

      // loginIndex / members / nameIndex / 전체검색에서 같은 회원이 여러 코드로 중복 검색될 수 있다.
      // 1차: code 기준 병합, 2차: uid/전화번호/생년/이름 같은 실제 신원 기준 병합.
      const mergePasswordMatchRecord = (previous, member, code) => {
        const prev = previous && typeof previous === "object" ? previous : {};
        const next = member && typeof member === "object" ? member : {};
        const merged = mergeMemberCandidateForLogin(prev, { ...next, code: code || next.code || prev.code });
        merged.__matchedCodes = Array.from(new Set([
          ...(Array.isArray(prev.__matchedCodes) ? prev.__matchedCodes : (prev.code ? [prev.code] : [])),
          ...(Array.isArray(next.__matchedCodes) ? next.__matchedCodes : []),
          code,
          next.code
        ].map((v) => String(v || "").trim()).filter(Boolean)));
        return merged;
      };

      const getPasswordMatchIdentityKey = (member) => {
        const uid = String(member?.uid || member?.userUid || member?.authUid || "").trim();
        if (uid) return `uid:${uid}`;
        const phoneDigits = String(member?.phoneDigits || member?.phone || member?.tel || "").replace(/\D/g, "");
        if (phoneDigits.length >= 7) return `phone:${phoneDigits}`;
        const phoneLast4 = getMemberPhoneLast4(member);
        const birth = String(member?.birth || member?.birthYear || member?.year || member?.birthInput || "").replace(/\D/g, "");
        const dong = normalizeName(member?.dong || member?.addressDong || member?.area || member?.address || "");
        const memberName = normalizeName(member?.name || name);
        if (phoneLast4 && birth) return `last4birth:${memberName}:${phoneLast4}:${birth}`;
        if (phoneLast4 && dong) return `last4dong:${memberName}:${phoneLast4}:${dong}`;
        if (phoneLast4) return `last4:${memberName}:${phoneLast4}`;
        return "";
      };

      const uniqueMatchesByCode = new Map();
      matches.forEach((member) => {
        const matchCode = String(member?.code || member?.memberCode || member?.joinCode || member?.id || "").trim();
        if (!matchCode) return;
        uniqueMatchesByCode.set(matchCode, mergePasswordMatchRecord(uniqueMatchesByCode.get(matchCode), member, matchCode));
      });

      let uniqueMatches = Array.from(uniqueMatchesByCode.values());
      if (!uniqueMatches.length) {
        failChange("회원코드를 확인하지 못해 비밀번호를 변경할 수 없습니다. 관리자에게 문의하세요.");
        return;
      }

      if (uniqueMatches.length > 1) {
        const byIdentity = new Map();
        uniqueMatches.forEach((member) => {
          const identityKey = getPasswordMatchIdentityKey(member);
          const fallbackKey = identityKey || `code:${String(member.code || "").trim()}`;
          byIdentity.set(fallbackKey, mergePasswordMatchRecord(byIdentity.get(fallbackKey), member, String(member.code || "").trim()));
        });
        const identityMatches = Array.from(byIdentity.values());
        if (identityMatches.length === 1) {
          uniqueMatches = identityMatches;
        } else {
          const approvedActive = identityMatches.filter((member) => {
            const itemStatus = String(member.status || "").toLowerCase();
            return member.approved === true && ["active", "approved", "member", "admin", ""].includes(itemStatus);
          });
          if (approvedActive.length === 1) {
            uniqueMatches = approvedActive;
          } else {
            const codesText = identityMatches.map((member) => String(member.code || "").trim()).filter(Boolean).join(", ");
            failChange(`같은 이름과 기존 비밀번호로 확인되는 회원이 여러 명입니다.${codesText ? " 코드: " + codesText : ""} 관리자 비번초기화 후 다시 시도하세요.`);
            return;
          }
        }
      }

      const foundMember = uniqueMatches[0];
      const status = String(foundMember.status || "").toLowerCase();
      if (status === "withdrawn") {
        failChange("탈퇴 처리된 회원은 비밀번호를 변경할 수 없습니다.");
        return;
      }
      if (status === "blocked") {
        failChange("차단된 회원은 비밀번호를 변경할 수 없습니다. 관리자에게 문의하세요.");
        return;
      }

      const code = String(foundMember.code || "").trim();
      if (!code) {
        failChange("회원코드를 찾지 못해 비밀번호를 변경할 수 없습니다. 관리자에게 문의하세요.");
        return;
      }

      setStep("3/5 새 비밀번호를 저장중입니다...");
      const now = Date.now();
      const newHash = await sha256Hex(newPassword);
      const nameKey = makeNameKey(name);
      const memberForLoginIndex = {
        ...foundMember,
        code,
        name,
        nameKey,
        passwordHash: newHash,
        approved: foundMember.approved !== false,
        status: String(foundMember.status || "active"),
        role: String(foundMember.role || (foundMember.adminAccess ? "admin" : "member")),
        adminAccess: !!foundMember.adminAccess,
        updatedAt: now,
        passwordChangedAt: now
      };

      // 정상 작동하는 회원관리 비번초기화와 같은 핵심 경로만 갱신한다.
      // loginIndex는 로그인 검증 기준이고, members는 회원 원본 DB, nameIndex는 이름 검색 보조 인덱스다.
      const updates = {};
      updates[`${MEMBERS_ROOT}/members/${code}/passwordHash`] = newHash;
      updates[`${MEMBERS_ROOT}/members/${code}/updatedAt`] = now;
      updates[`${MEMBERS_ROOT}/members/${code}/passwordChangedAt`] = now;
      updates[`${MEMBER_LOGIN_INDEX_PATH}/${nameKey}/${code}`] = makeMemberLoginIndexRecord(memberForLoginIndex);
      updates[`${MEMBERS_ROOT}/nameIndex/${nameKey}/${code}`] = true;
      try {
        await update(ref(membershipDb), updates);
      } catch (saveError) {
        console.error("회원 비밀번호 저장 실패:", saveError);
        failChange(`저장 중 오류가 발생했습니다. ${saveError?.code || saveError?.message || saveError}`);
        return;
      }

      setStep("4/5 저장 결과를 확인중입니다...");
      const loginSnap = await get(ref(membershipDb, `${MEMBER_LOGIN_INDEX_PATH}/${nameKey}/${code}/passwordHash`));
      const memberSnap = await get(ref(membershipDb, `${MEMBERS_ROOT}/members/${code}/passwordHash`));
      const savedLoginHash = loginSnap.exists() ? String(loginSnap.val() || "") : "";
      const savedMemberHash = memberSnap.exists() ? String(memberSnap.val() || "") : "";
      if (savedLoginHash !== newHash || savedMemberHash !== newHash) {
        const failed = [];
        if (savedLoginHash !== newHash) failed.push("loginIndex");
        if (savedMemberHash !== newHash) failed.push("members");
        failChange(`저장 확인 실패: ${failed.join(", ")} 경로가 새 비밀번호로 저장되지 않았습니다.`);
        return;
      }

      setStep("5/5 새 비밀번호로 로그인 검증중입니다...");
      const verifiedMembers = await findMembersByName(name);
      const verified = verifiedMembers.some((m) => String(m.code || "") === code && memberPasswordMatches(m, newPassword, newHash));
      if (!verified) {
        failChange("저장은 되었지만 로그인 검증에 실패했습니다. 새로고침 후 다시 로그인해 보세요.");
        return;
      }

      byId("memberChangeOldPasswordInput").value = "";
      byId("memberChangeNewPasswordInput").value = "";
      byId("memberChangeConfirmPasswordInput").value = "";
      byId("memberPasswordChangePanel")?.classList.remove("is-open");
      setMemberAuthViewMode("main");
      saveMemberLoginName(name);
      const loginNameInput = byId("memberLoginNameInput");
      if (loginNameInput) loginNameInput.value = name;
      setStep(`${resultPrefix} 성공: 비밀번호가 변경되었습니다. 새 비밀번호로 로그인하세요.`, true);
      successChange("비밀번호가 변경되었습니다. 새 비밀번호로 로그인하세요.");
      setTimeout(finishButton, 800);
    } catch (error) {
      console.error("회원 비밀번호 변경 오류:", error);
      failChange(`예상하지 못한 오류가 발생했습니다. ${error?.code || error?.message || error}`);
    } finally {
      if (submitBtn && submitBtn.textContent !== "완료") finishButton();
    }
  }

  async function restoreSessionIfValid() {
    // 로그아웃 버튼을 누르기 전에는 로그인 상태를 유지한다.
    // 새로고침/화면 이동 후에도 저장된 세션이 있으면 바로 회원 입력 화면으로 복귀한다.
    let saved = null;
    try {
      // 보안 수정: localStorage 세션은 사용하지 않는다.
      // 이전 버전에서 남은 localStorage 값은 즉시 삭제하여 새로고침 자동진입을 차단한다.
      localStorage.removeItem(LOGIN_SESSION_KEY);
      saved = sessionStorage.getItem(LOGIN_SESSION_KEY);
    } catch (e) {}

    const isAdminEntryRefresh = (() => {
      try {
        return sessionStorage.getItem("bus-seat-admin-entry-refresh-v1") === "1" ||
          sessionStorage.getItem("bus-seat-admin-refresh-mode-v1") === "adminEntry" ||
          localStorage.getItem("bus-seat-admin-entry-persist-v1") === "1";
      } catch (error) { return false; }
    })();

    if (saved) {
      try {
        const session = JSON.parse(saved);
        if (session && session.code && session.name) {
          currentApprovedMemberSession = session;
          unlockApp(session);
          if (session.deviceId) startActiveSessionWatch(session);
          if (isAdminEntryRefresh && (session.adminAccess || session.role === "admin" || session.code === "ADMIN")) {
            if (typeof window.__busSeatShowAdminEntryAfterLogoff === "function") {
              window.__busSeatShowAdminEntryAfterLogoff();
            }
            setAuthMessage("관리자 로그오프 상태가 유지되었습니다.", true);
            return;
          }
          if (session.adminAccess || session.role === "admin" || session.code === "ADMIN") {
            if (typeof window.__busSeatEnterAdminFromMembership === "function") {
              let restoreMode = "member";
              try {
                const savedMode = sessionStorage.getItem("bus-seat-admin-refresh-mode-v1");
                restoreMode = (savedMode === "admin" || savedMode === "memberManage") ? savedMode : "member";
              } catch (error) {}
              window.__busSeatEnterAdminFromMembership(restoreMode);
            } else if (typeof window.__busSeatSwitchMode === "function") {
              window.__busSeatSwitchMode("member");
            }
          } else if (typeof window.__busSeatSwitchMode === "function") {
            window.__busSeatSwitchMode("member");
          }
          if (!(session.adminAccess || session.role === "admin" || session.code === "ADMIN")) {
            enforceMemberInputModeHiddenUi();
            setTimeout(enforceMemberInputModeHiddenUi, 0);
          }
          setAuthMessage("로그인 상태가 유지되었습니다.", true);
          return;
        }
      } catch (e) {
        try { localStorage.removeItem(LOGIN_SESSION_KEY); sessionStorage.removeItem(LOGIN_SESSION_KEY); } catch (_) {}
      }
    }

    if (isAdminEntryRefresh) {
      // 혹시 회원 세션이 없어도 관리자 로그오프 후 새로고침에서는 회원 로그인 화면으로 보내지 않는다.
      try {
        sessionStorage.setItem("bus-seat-admin-entry-refresh-v1", "1");
        sessionStorage.setItem("bus-seat-admin-refresh-mode-v1", "adminEntry");
        localStorage.setItem("bus-seat-admin-entry-persist-v1", "1");
        document.documentElement.classList.add("restore-admin-session");
      } catch (_) {}
      document.body.classList.remove("membership-locked");
      byId("memberAuthGate")?.classList.add("is-hidden");
      if (typeof window.__busSeatShowAdminEntryAfterLogoff === "function") {
        window.__busSeatShowAdminEntryAfterLogoff();
      }
      setAuthMessage("관리자 로그오프 상태가 유지되었습니다.", true);
      return;
    }

    try { document.documentElement.classList.remove("restore-admin-session"); } catch (_) {}
    document.body.classList.add("membership-locked");
    const gate = byId("memberAuthGate");
    if (gate) {
      gate.classList.remove("is-hidden");
      gate.style.display = "flex";
    }
    const app = document.querySelector(".app");
    if (app) {
      app.style.visibility = "hidden";
      app.style.pointerEvents = "none";
    }
    clearMemberAuthInputValues();
    const nameInput = byId("memberLoginNameInput");
    const passwordInput = byId("memberLoginPasswordInput");
    if (nameInput) nameInput.placeholder = "이  름";
    if (passwordInput) passwordInput.placeholder = "비밀번호 입력";
    setMemberAuthViewMode("main");
    setAuthMessage("아이디와 비밀번호를 입력하세요.");
  }

  async function isBusSeatAdminPassword(inputPassword) {
    const normalizedInput = String(inputPassword || "").trim();
    if (!normalizedInput) return false;
    const inputHash = await sha256Hex(normalizedInput);

    // 핵심 수정: 회원 로그인 화면의 관리자 로그인은 반드시 Firebase busSeatApp 최신 관리자 비밀번호를 먼저 확인한다.
    // 이렇게 해야 다른 기기/관리자모드에서 변경한 bus-seat 관리자 비밀번호와 즉시 연동된다.
    try {
      const rootSnap = await get(ref(membershipDb, "busSeatApp"));
      const root = rootSnap.exists() ? (rootSnap.val() || {}) : {};
      const remoteHash = String(root.adminPasswordHash || "").trim();
      const remotePlain = String(root.adminPassword || "").trim();
      if (remoteHash && inputHash === remoteHash) return true;
      if (remotePlain && normalizedInput === remotePlain) return true;
    } catch (error) {
      console.warn("bus-seat 관리자 비밀번호 원격 확인 오류:", error);
    }

    // 보조: 현재 bus-seat 앱 내부 검증 함수 확인
    try {
      if (typeof window.__busSeatVerifyAdminPassword === "function") {
        const ok = await window.__busSeatVerifyAdminPassword(normalizedInput);
        if (ok) return true;
      }
    } catch (error) {
      console.warn("bus-seat 내부 관리자 비밀번호 확인 오류:", error);
    }

    // 보조: 기존 bus-seat 로컬 저장 해시 확인
    try {
      const localHash = String(localStorage.getItem("bus-seat-admin-password-hash-v1") || "").trim();
      if (localHash && inputHash === localHash) return true;
    } catch (error) {}

    // 최초 설치 기본값
    return normalizedInput === "1234";
  }

  function formatDateTime(ms) {
    if (!ms) return "-";
    try {
      const d = new Date(Number(ms));
      const yy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      const hh = String(d.getHours()).padStart(2, "0");
      const mi = String(d.getMinutes()).padStart(2, "0");
      return `${yy}-${mm}-${dd} ${hh}:${mi}`;
    } catch (error) {
      return "-";
    }
  }
