  window.__forceLoadMemberManageList = forceLoadMemberManageList;

  // 회원관리 화면 실시간 감시: PC/모바일 모두 DB 변경 즉시 목록 자동 갱신
  // 새로고침 버튼 없이도 가입대기/승인/차단/탈퇴/삭제 변경을 자동 반영한다.
  const MEMBER_MANAGE_REALTIME_PATHS = [
    `${MANAGE_MEMBERS_ROOT}/members`,
    `${MANAGE_MEMBERS_ROOT}/pending`,
    MANAGE_JOIN_CODES_PATH,
    "busSeatApp/membership/members",
    "busSeatApp/membership/pending",
    "membership/members",
    "membership/pending",
    "members",
    "pending",
    "busSeatApp/members",
    "busSeatApp/pending"
  ];
  let memberManageRealtimeStarted = false;
  let memberManageRealtimeTimer = null;
  let memberManageRealtimeUnsubs = [];

  function isMemberManagePanelVisible() {
    const panel = q('#memberManagePanel');
    if (!panel) return false;
    // 모바일에서는 전체화면/복구 CSS 때문에 offsetParent가 null로 나오는 경우가 있어
    // hidden 클래스와 현재 모드 저장값을 기준으로 회원관리 화면 여부를 판단한다.
    if (panel.classList.contains('hidden')) return false;
    try {
      if (document.body && document.body.classList && document.body.classList.contains('member-manage-fullscreen')) return true;
      const savedMode = sessionStorage.getItem('bus-seat-admin-refresh-mode-v1');
      if (savedMode === 'memberManage') return true;
    } catch (error) {}
    return true;
  }

  function scheduleMemberManageRealtimeReload(snapshotOrEvent) {
    // 회원관리 화면이 열려 있을 때 DB 변경 즉시 자동 렌더링.
    // 리스너 최초 연결 시에도 한 번 들어오므로 디바운스로 중복 렌더를 막는다.
    if (!isMemberManagePanelVisible()) return;
    clearTimeout(memberManageRealtimeTimer);
    memberManageRealtimeTimer = setTimeout(() => {
      forceLoadMemberManageList().catch((error) => {
        console.error('회원관리 실시간 자동갱신 오류:', error);
      });
    }, 120);
  }

  function startMemberManageRealtimeWatch() {
    if (memberManageRealtimeStarted) {
      scheduleMemberManageRealtimeReload();
      return;
    }
    memberManageRealtimeStarted = true;
    memberManageRealtimeUnsubs = MEMBER_MANAGE_REALTIME_PATHS.map((path) => {
      try {
        return onValue(ref(manageDb, path), scheduleMemberManageRealtimeReload, (error) => {
          console.warn(`회원관리 실시간 감시 실패: ${path}`, error);
        });
      } catch (error) {
        console.warn(`회원관리 실시간 감시 연결 오류: ${path}`, error);
        return null;
      }
    }).filter(Boolean);
    scheduleMemberManageRealtimeReload();
  }

  function stopMemberManageRealtimeWatch() {
    clearTimeout(memberManageRealtimeTimer);
    memberManageRealtimeTimer = null;
    memberManageRealtimeUnsubs.forEach((unsub) => {
      try { if (typeof unsub === 'function') unsub(); } catch (error) {}
    });
    memberManageRealtimeUnsubs = [];
    memberManageRealtimeStarted = false;
  }

  window.__startMemberManageRealtimeWatch = startMemberManageRealtimeWatch;
  window.__stopMemberManageRealtimeWatch = stopMemberManageRealtimeWatch;

  // 탭 클릭 외에도 관리자 로그인 복구/모바일 뒤로가기/스크립트 전환으로 회원관리 화면이 열릴 수 있어
  // DOM 상태 변화를 감시해서 리스너가 누락되지 않게 한다.
  document.addEventListener('DOMContentLoaded', () => {
    const panel = q('#memberManagePanel');
    if (panel) {
      const observer = new MutationObserver(() => {
        if (isMemberManagePanelVisible()) startMemberManageRealtimeWatch();
      });
      observer.observe(panel, { attributes: true, attributeFilter: ['class', 'style'] });
    }
    if (isMemberManagePanelVisible()) startMemberManageRealtimeWatch();
  });

  document.addEventListener('click', (event) => {
    const manageTab = event.target.closest('#memberManageTab');
    if (manageTab) {
      startMemberManageRealtimeWatch();
      setTimeout(forceLoadMemberManageList, 180);
      return;
    }
    const refresh = event.target.closest('#memberManagePanel #memberApprovalRefreshBtn');
    if (refresh) {
      event.preventDefault();
      forceLoadMemberManageList();
      return;
    }
    const memberManageMemberListBtn = event.target.closest('#memberManagePanel #memberManageMemberListBtn');
    if (memberManageMemberListBtn) {
      event.preventDefault();
      window.location.href = "https://coretechms.github.io/memble-list/";
      return;
    }
    const adminGroupToggle = event.target.closest('#memberManagePanel #memberManageAdminToggleBtn');
    if (adminGroupToggle) {
      event.preventDefault();
      const panel = document.getElementById('memberManageAdminGroupPanel');
      if (panel) {
        const willOpen = panel.hasAttribute('hidden');
        if (willOpen) panel.removeAttribute('hidden');
        else panel.setAttribute('hidden', '');
        adminGroupToggle.classList.toggle('is-open', willOpen);
        adminGroupToggle.setAttribute('aria-expanded', willOpen ? 'true' : 'false');
        const managePanel = document.getElementById('memberManagePanel');
        if (managePanel) managePanel.classList.toggle('member-admin-group-open', willOpen);
      }
      return;
    }
    const memberBackup = event.target.closest('#memberManagePanel #memberJsonBackupBtn');
    if (memberBackup) {
      event.preventDefault();
      handleMemberJsonBackup();
      return;
    }
    const memberRestore = event.target.closest('#memberManagePanel #memberJsonRestoreBtn');
    if (memberRestore) {
      event.preventDefault();
      handleMemberJsonRestoreClick();
      return;
    }
    const selectedMemberCardForPasswordReset = event.target.closest('#memberManagePanel .member-approval-card');
    if (selectedMemberCardForPasswordReset && !event.target.closest('button')) {
      document.querySelectorAll('#memberManagePanel .member-approval-card.password-reset-selected').forEach((card) => {
        if (card !== selectedMemberCardForPasswordReset) card.classList.remove('password-reset-selected');
      });
      selectedMemberCardForPasswordReset.classList.add('password-reset-selected');
      return;
    }
    const memberPasswordReset = event.target.closest('#memberManagePanel #memberPasswordResetBtn');
    if (memberPasswordReset) {
      event.preventDefault();
      resetApprovedMemberPasswordsToDefault().catch((error) => {
        console.error('회원비밀번호 초기화 오류:', error);
        alert(`회원비밀번호 초기화 오류: ${error?.code || error?.message || error}`);
      });
      return;
    }
    const memberOrphanRepair = event.target.closest('#memberManagePanel #memberOrphanRepairBtn');
    if (memberOrphanRepair) {
      event.preventDefault();
      repairOrphanJoinCodesToLoginDb().catch((error) => {
        console.error('고아코드 복구 오류:', error);
        alert(`고아코드 복구 오류: ${error?.code || error?.message || error}`);
      });
      return;
    }
    const memberIndexCleanup = event.target.closest('#memberManagePanel #memberIndexCleanupBtn');
    if (memberIndexCleanup) {
      event.preventDefault();
      cleanupContaminatedMemberIndexes().catch((error) => {
        console.error('인덱스 정리 오류:', error);
        alert(`인덱스 정리 오류: ${error?.code || error?.message || error}`);
      });
      return;
    }
    const memberLoginAudit = event.target.closest('#memberManagePanel #memberLoginAuditBtn');
    if (memberLoginAudit) {
      event.preventDefault();
      auditMemberDefaultLoginPasswords().catch((error) => {
        console.error('회원 로그인점검 오류:', error);
        alert(`회원 로그인점검 오류: ${error?.code || error?.message || error}`);
      });
      return;
    }
    const memberDbCleanup = event.target.closest('#memberManagePanel #memberDbCleanupBtn');
    if (memberDbCleanup) {
      event.preventDefault();
      cleanupOrphanMemberDb().catch((error) => {
        console.error('회원 DB 점검 오류:', error);
        alert(`회원 DB 점검 오류: ${error?.code || error?.message || error}`);
      });
      return;
    }
    const actionBtn = event.target.closest('#memberManagePanel button[data-forced-member-action], #memberManagePanel button[data-member-action]');
    if (actionBtn) {
      event.preventDefault();
      const action = actionBtn.getAttribute('data-forced-member-action') || actionBtn.getAttribute('data-member-action');
      const code = actionBtn.getAttribute('data-code');
      if (!code) return;
      if (action === 'withdraw' && !confirm('이 회원을 탈퇴 처리하고 비밀번호 해시를 삭제할까요?')) return;
      if (action === 'delete' && !confirm('이 회원자료를 모든 회원 DB에서 완전히 삭제할까요?\n삭제 후 같은 이름/전화번호로 재가입할 수 있습니다.')) return;
      if (action === 'block' && !confirm('이 회원의 앱 접근을 차단할까요?')) return;
      forceUpdateMember(code, action).catch((error) => {
        console.error('회원 처리 오류:', error);
        alert(`회원 처리 오류: ${error?.code || error?.message || error}`);
      });
    }
  }, true);

  // 회원관리 탭이 이미 열려 있거나 관리자 모드에서 패널이 보이면 자동 표시한다.
  setInterval(() => {
    const panel = q('#memberManagePanel');
    const list = listNode();
    if (!panel || !list) return;
    const panelVisible = !panel.classList.contains('hidden') && panel.offsetParent !== null;
    const needsLoad = /회원관리 탭|관리자 로그인|불러옵니다|사용할 수 있습니다/.test(list.textContent || '');
    if (panelVisible) startMemberManageRealtimeWatch();
    if (panelVisible && needsLoad && !window.__memberManageAutoLoading) {
      window.__memberManageAutoLoading = true;
      forceLoadMemberManageList().finally(() => setTimeout(() => { window.__memberManageAutoLoading = false; }, 1000));
    }
  }, 1000);
</script>

(function(){
  var MODE_KEY = "bus-seat-admin-refresh-mode-v1";
  var ENTRY_KEY = "bus-seat-admin-entry-refresh-v1";
  var ENTRY_PERSIST_KEY = "bus-seat-admin-entry-persist-v1";

  function $(id){ return document.getElementById(id); }

  function panelVisible(el){
    return !!el && !el.classList.contains("hidden") && el.offsetParent !== null;
  }

  function rememberMemberManageMode(){
    try{
      sessionStorage.setItem(MODE_KEY, "memberManage");
      sessionStorage.removeItem(ENTRY_KEY);
      localStorage.removeItem(ENTRY_PERSIST_KEY);
      document.documentElement.classList.add("restore-admin-session");
    }catch(e){}
  }

  function isMemberManageModeSaved(){
    try{ return sessionStorage.getItem(MODE_KEY) === "memberManage"; }
    catch(e){ return false; }
  }

  function isMemberManageVisible(){
    var panel = $("memberManagePanel");
    var tab = $("memberManageTab");
    return panelVisible(panel) || !!(tab && tab.classList.contains("active"));
  }

  function restoreMemberManageScreen(){
    try{
      rememberMemberManageMode();
      document.body.classList.remove("membership-locked", "admin-entry-only", "member-mode", "approval-admin-mode");
      document.body.classList.add("admin-mode", "member-manage-mode");

      if(app){ app.style.visibility = "visible"; app.style.pointerEvents = "auto"; }

      $("memberPanel")?.classList.add("hidden");
      $("adminLoginPanel")?.classList.add("hidden");
      $("adminPanel")?.classList.add("hidden");
      $("memberManagePanel")?.classList.remove("hidden");

      $("memberTab")?.classList.remove("active");
      $("adminTab")?.classList.remove("active");
      $("memberManageTab")?.classList.add("active");
    }catch(e){}
  }

  function loadMemberManageListWithRetry(attempt){
    attempt = attempt || 0;
    var fn = window.__forceLoadMemberManageList || window.__loadMembershipApprovalMembers;
    if(typeof fn === "function"){
      try{
        Promise.resolve(fn()).catch(function(error){
          console.error("회원관리 F5 목록 복구 오류:", error);

<script id="member-log-mobile-back-flow-patch">

(function(){
  if (window.__memberLogMobileBackFlowPatchApplied) return;
  window.__memberLogMobileBackFlowPatchApplied = true;

  function isHidden(el){
    return !el || el.classList.contains("hidden") || el.offsetParent === null;
  }

  function currentScreen(){
    var loginPanel = document.getElementById("loginManagePanel");
    var managePanel = document.getElementById("memberManagePanel");
    if (!isHidden(loginPanel)) return "loginManage";
    if (!isHidden(managePanel) || document.body.classList.contains("member-manage-mode")) return "memberManage";
    return "member";
  }

  function showMemberScreen(){
    try {
      if (typeof window.__busSeatSwitchMode === "function") {

    try {
      document.body.classList.remove("member-manage-mode", "admin-entry-only");

  }

  function showMemberManageScreen(){
    try {
      if (typeof window.__busSeatSwitchMode === "function") {
        window.__busSeatSwitchMode("memberManage");
      }
    } catch (error) {}
    try {
      document.body.classList.add("member-manage-mode");
      document.body.classList.remove("member-mode", "admin-entry-only");
      document.getElementById("loginManagePanel")?.classList.add("hidden");
      document.getElementById("memberManagePanel")?.classList.remove("hidden");

      document.getElementById("adminLoginPanel")?.classList.add("hidden");
      document.getElementById("adminPanel")?.classList.add("hidden");
      document.getElementById("memberTab")?.classList.remove("active");

      document.getElementById("memberManageTab")?.classList.add("active");
      try { sessionStorage.setItem("bus-seat-admin-refresh-mode-v1", "memberManage"); } catch (error) {}
    } catch (error) {}
  }

  function showLoginManageScreen(){
    showMemberManageScreen();
    try {
      document.getElementById("memberManagePanel")?.classList.add("hidden");
      document.getElementById("loginManagePanel")?.classList.remove("hidden");
    } catch (error) {}
  }

  function replaceWithMemberBase(){
    try {
      if (!history.state || !history.state.busSeatBackFlowBase) {
        history.replaceState({ busSeatScreen: "member", busSeatBackFlowBase: true }, "", location.href);
      }
    } catch (error) {}
  }

  function pushScreenState(screen){
    try {
      var state = history.state || {};
      if (state.busSeatScreen === screen && state.busSeatBackFlowPatch) return;
      history.pushState({ busSeatScreen: screen, busSeatBackFlowPatch: true }, "", location.href);
    } catch (error) {}
  }

  function syncHistoryToScreen(){
    var screen = currentScreen();
    if (screen === "member") {
      replaceWithMemberBase();
      return;
    }
    replaceWithMemberBase();
    if (screen === "memberManage") {
      pushScreenState("memberManage");
      return;
    }
    if (screen === "loginManage") {
      try {
        if (!history.state || history.state.busSeatScreen !== "memberManage") pushScreenState("memberManage");
      } catch (error) { pushScreenState("memberManage"); }
      pushScreenState("loginManage");
    }
  }

  window.addEventListener("popstate", function(event){
    var state = event.state || {};
    if (state.busSeatScreen === "loginManage") {
      showLoginManageScreen();
      return;
    }
    if (state.busSeatScreen === "memberManage") {
      showMemberManageScreen();
      return;
    }
    if (currentScreen() === "loginManage") {
      showMemberManageScreen();
      try { history.replaceState({ busSeatScreen: "memberManage", busSeatBackFlowPatch: true }, "", location.href); } catch (error) {}
      return;
    }
    if (currentScreen() === "memberManage") {
      showMemberScreen();
      try { history.replaceState({ busSeatScreen: "member", busSeatBackFlowBase: true }, "", location.href); } catch (error) {}
      return;
    }
    showMemberScreen();
  }, true);

  document.addEventListener("click", function(event){
    var manageBtn = event.target && event.target.closest ? event.target.closest("#memberManageTab") : null;
    var logBtn = event.target && event.target.closest ? event.target.closest("#memberLoginManageBtn") : null;
    var logBackBtn = event.target && event.target.closest ? event.target.closest("#loginManageBackBtn") : null;
    var manageCloseBtn = event.target && event.target.closest ? event.target.closest("#memberManageCloseBtn") : null;

    if (manageBtn) {
      setTimeout(function(){ replaceWithMemberBase(); pushScreenState("memberManage"); }, 0);
      return;
    }
    if (logBtn) {
      setTimeout(function(){
        replaceWithMemberBase();
        try {
          if (!history.state || history.state.busSeatScreen !== "memberManage") pushScreenState("memberManage");
        } catch (error) { pushScreenState("memberManage"); }
        pushScreenState("loginManage");
      }, 0);
      return;
    }
    if (logBackBtn) {
      setTimeout(function(){ showMemberManageScreen(); try { history.replaceState({ busSeatScreen: "memberManage", busSeatBackFlowPatch: true }, "", location.href); } catch (error) {} }, 0);
      return;
    }
    if (manageCloseBtn) {
      setTimeout(function(){ showMemberScreen(); try { history.replaceState({ busSeatScreen: "member", busSeatBackFlowBase: true }, "", location.href); } catch (error) {} }, 0);
    }
  }, true);

  window.addEventListener("pageshow", function(){ setTimeout(syncHistoryToScreen, 80); });
  document.addEventListener("DOMContentLoaded", function(){ setTimeout(syncHistoryToScreen, 120); });
})();
</script>

<script type="module" id="member-manage-pending-blink-realtime-restore-script">
/* 요청 수정: 신규 가입 승인대기 인원이 있으면 회원관리 버튼 깜빡임을 항상 복구
   - 기존 CSS/member-manage-pending-blink는 그대로 사용
   - 회원관리 화면을 열기 전에도 pending DB를 직접 감시해서 탭 상태만 갱신
   - 다른 화면/버튼/회원처리 로직은 변경하지 않음 */
(function(){
  if (window.__memberManagePendingBlinkRealtimeRestoreApplied) return;
  window.__memberManagePendingBlinkRealtimeRestoreApplied = true;

  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyBH3866EIMkhI--ms4xAZ7k7XS9sQFvgwQ",
    authDomain: "bus-seat-eb86c.firebaseapp.com",
    databaseURL: "https://bus-seat-eb86c-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "bus-seat-eb86c",
    storageBucket: "bus-seat-eb86c.firebasestorage.app",
    messagingSenderId: "132111967366",
    appId: "1:132111967366:web:e034a00f8c8cc4aa441d07"
  };

  const WATCH_PATHS = [
    "membershipSecure/pending",
    "membershipSecure/members",
    "busSeatApp/membership/pending",
    "busSeatApp/membership/members",
    "membership/pending",
    "membership/members",
    "pending",
    "members",
    "busSeatApp/pending",
    "busSeatApp/members"
  ];

  function setBlink(count){
    const tab = document.getElementById("memberManageTab");
    if (!tab) return;
    const pendingCount = Number(count || 0);
    tab.classList.toggle("member-manage-pending-blink", pendingCount > 0);
    tab.setAttribute("data-pending-count", String(pendingCount));
  }

  function isPendingRecord(record){
    if (!record || typeof record !== "object") return false;
    const status = String(record.status || "").trim();
    if (status === "pending") return true;
    if (status === "blocked" || status === "withdrawn" || status === "rejected" || status === "deleted" || status === "active") return false;
    return record.approved === false && !record.passwordHash;
  }

  function collectPendingCodesFromObject(data, path, out){
    if (!data || typeof data !== "object") return;
    const isPendingPath = /\/pending$/.test(path);
    Object.keys(data).forEach((code) => {
      const record = data[code];
      if (isPendingPath) {
        if (record && typeof record === "object") {
          const status = String(record.status || "pending").trim();
          if (status !== "blocked" && status !== "withdrawn" && status !== "rejected" && status !== "deleted" && status !== "active") {
            out.add(String(code));
          }
        } else {
          out.add(String(code));
        }
        return;
      }
      if (isPendingRecord(record)) out.add(String(code));
    });
  }

  async function refreshPendingBlink(){
    try {
      const firebaseApp = await import("https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js");
      const firebaseDb = await import("https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js");
      const app = firebaseApp.getApps().length ? firebaseApp.getApp() : firebaseApp.initializeApp(FIREBASE_CONFIG);
      const db = firebaseDb.getDatabase(app);
      const pendingCodes = new Set();
      await Promise.all(WATCH_PATHS.map(async (path) => {
        try {
          const snap = await firebaseDb.get(firebaseDb.ref(db, path));
          if (snap && snap.exists()) collectPendingCodesFromObject(snap.val() || {}, path, pendingCodes);
        } catch (error) {}
      }));
      setBlink(pendingCodes.size);
    } catch (error) {}
  }

  function startRealtimeWatch(){
    if (window.__memberManagePendingBlinkRealtimeStarted) return;
    window.__memberManagePendingBlinkRealtimeStarted = true;
    import("https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js").then((firebaseApp) => {
      return import("https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js").then((firebaseDb) => ({ firebaseApp, firebaseDb }));
    }).then(({ firebaseApp, firebaseDb }) => {
      const app = firebaseApp.getApps().length ? firebaseApp.getApp() : firebaseApp.initializeApp(FIREBASE_CONFIG);
      const db = firebaseDb.getDatabase(app);
      let timer = null;
      const schedule = () => {
        clearTimeout(timer);
        timer = setTimeout(refreshPendingBlink, 150);
      };
      WATCH_PATHS.forEach((path) => {
        try {
          firebaseDb.onValue(firebaseDb.ref(db, path), schedule, () => {});
        } catch (error) {}
      });
      schedule();
    }).catch(() => {
      refreshPendingBlink();
    });
  }

  document.addEventListener("DOMContentLoaded", function(){
    refreshPendingBlink();
    startRealtimeWatch();
    setTimeout(refreshPendingBlink, 600);
    setTimeout(refreshPendingBlink, 1600);
  });
  window.addEventListener("pageshow", function(){
    refreshPendingBlink();
    startRealtimeWatch();
  });
  document.addEventListener("click", function(event){
    const target = event.target && event.target.closest ? event.target.closest("#memberManageTab,#memberApprovalRefreshBtn,#memberJoinSubmitBtn") : null;
    if (target) setTimeout(refreshPendingBlink, 250);
  }, true);
})();
</script>

  }, true);

  function wrapSwitchModeIfReady(){
    if (typeof window.__busSeatSwitchMode !== "function" || window.__busSeatSwitchMode.__memberManageBackWrapped) return;
    var originalSwitchMode = window.__busSeatSwitchMode;
    var wrapped = function(nextMode){
      var result = originalSwitchMode.apply(this, arguments);
      if (nextMode === "memberManage") pushMemberManageState();
      if (nextMode === "member") {
        try { history.replaceState(MEMBER_STATE, "", location.href); } catch (error) {}
      }
      return result;
    };
    wrapped.__memberManageBackWrapped = true;
    window.__busSeatSwitchMode = wrapped;
  }

  document.addEventListener("DOMContentLoaded", function(){
    ensureMemberBaseState();
    wrapSwitchModeIfReady();
    setTimeout(wrapSwitchModeIfReady, 300);
    setTimeout(function(){ if (isMemberManageScreen()) pushMemberManageState(); }, 500);
  });
  window.addEventListener("pageshow", function(){
    ensureMemberBaseState();
    wrapSwitchModeIfReady();
    setTimeout(function(){ if (isMemberManageScreen()) pushMemberManageState(); }, 150);
  });
})();
</script>


<script id="mobile-login-back-exit-once-patch">
/* 요청 수정: 모바일 로그인 화면 뒤로가기 2회 시 모든 내부 history 정리 후 앱 종료.
   원인: 앱 내부 화면전환 history + 브라우저/웹뷰 history 가 누적되어
   뒤로가기를 여러 번 눌러야 종료되는 현상 발생.
   처리:
   1차 뒤로가기 → 내부 history 를 로그인 기준으로 정리
   2차 뒤로가기 → 남은 history 를 한 번에 제거 후 앱 종료 시도 */
(function(){
  if (window.__mobileLoginBackExitDoublePatchApplied) return;
  window.__mobileLoginBackExitDoublePatchApplied = true;

  var LOGIN_STATE = { busSeatScreen: "memberLogin", busSeatLoginExitBase: true };
  var lastBackPressedAt = 0;
  var EXIT_INTERVAL = 2200;
  var exitingNow = false;

  function isLoginGateVisible(){
    try {
      var gate = document.getElementById("memberAuthGate");
      if (!document.body || !document.body.classList.contains("membership-locked")) return false;
      if (!gate || gate.classList.contains("is-hidden")) return false;
      var style = window.getComputedStyle ? window.getComputedStyle(gate) : null;
      return !(style && (style.display === "none" || style.visibility === "hidden"));
    } catch (error) {
      return false;
    }
  }

  function setLoginBaseState(){
    if (!isLoginGateVisible()) return;
    try {
      history.replaceState(LOGIN_STATE, "", location.href);
    } catch (error) {}
  }

  function showExitToast(){
    try {
      if (window.__loginExitToastEl) {
        window.__loginExitToastEl.remove();
      }

      var toast = document.createElement("div");
      toast.textContent = "한번 더 뒤로가기 하면 앱을 종료합니다.";
      toast.style.position = "fixed";
      toast.style.left = "50%";
      toast.style.bottom = "34px";
      toast.style.transform = "translateX(-50%)";
      toast.style.background = "rgba(17,24,39,.92)";
      toast.style.color = "#fff";
      toast.style.padding = "10px 16px";
      toast.style.borderRadius = "999px";
      toast.style.fontSize = "13px";
      toast.style.fontWeight = "700";
      toast.style.zIndex = "2147483647";
      toast.style.boxShadow = "0 4px 18px rgba(0,0,0,.28)";
      document.body.appendChild(toast);

      window.__loginExitToastEl = toast;

      setTimeout(function(){
        try {
          if (toast.parentNode) toast.parentNode.removeChild(toast);
        } catch (e) {}
      }, 1800);
    } catch (error) {}
  }

  function closeApplicationNow(){
    if (exitingNow) return;
    exitingNow = true;

    try {
      var totalSteps = Math.max(1, Math.min((history.length || 1) - 1, 50));
      history.go(-totalSteps);
    } catch (error) {
      try { history.back(); } catch (e) {}
    }

    try {
      if (navigator.app && typeof navigator.app.exitApp === "function") {
        navigator.app.exitApp();
      }
    } catch (error) {}

    try {
      if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.App) {
        window.Capacitor.Plugins.App.exitApp();
      }
    } catch (error) {}

    setTimeout(function(){
      exitingNow = false;
    }, 1800);
  }

  function handleLoginBackPressed(event){
    if (!isLoginGateVisible()) return;

    if (event && event.stopImmediatePropagation) event.stopImmediatePropagation();
    else if (event && event.stopPropagation) event.stopPropagation();

    var now = Date.now();

    if ((now - lastBackPressedAt) < EXIT_INTERVAL) {
      closeApplicationNow();
      return;
    }

    lastBackPressedAt = now;
    setLoginBaseState();
    showExitToast();

    try {
      history.pushState(LOGIN_STATE, "", location.href);
    } catch (error) {}
  }

  window.addEventListener("popstate", handleLoginBackPressed, true);

  document.addEventListener("DOMContentLoaded", function(){
    setTimeout(setLoginBaseState, 0);
    setTimeout(setLoginBaseState, 300);
  });

  window.addEventListener("pageshow", function(){
    setTimeout(setLoginBaseState, 0);
    setTimeout(setLoginBaseState, 300);
  });

  if (window.MutationObserver) {
    document.addEventListener("DOMContentLoaded", function(){
      try {
        var gate = document.getElementById("memberAuthGate");
        if (!gate || !document.body) return;

        new MutationObserver(function(){
          setTimeout(setLoginBaseState, 0);
        }).observe(document.body, {
          attributes:true,
          attributeFilter:["class"]
        });

        new MutationObserver(function(){
          setTimeout(setLoginBaseState, 0);
        }).observe(gate, {
          attributes:true,
          attributeFilter:["class","style"]
        });
      } catch (error) {}
    });
  }
})();
</script>
