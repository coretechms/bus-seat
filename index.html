  async function loadApprovalMembers() {
    const listEl = byId("memberApprovalList");
    if (!listEl) return;
    listEl.innerHTML = '<div class="member-approval-empty">회원 목록 불러오는 중...</div>';
    const all = await getAllMembersFromAnyRoot();
    const members = Object.values(all).sort((a, b) => {
      // 회원관리 정렬:
      // 1) 신규/가입대기 회원을 항상 상단에 표시
      // 2) 승인완료(active + approved) 회원은 하단으로 이동
      // 3) 같은 그룹 안에서는 신규순(createdAt 최신순), 생성일이 없으면 회원번호순
      function approvalSortRank(member) {
        const status = String(member?.status || "");
        const approved = !!member?.approved;
        if (status === "pending" || (!approved && status !== "blocked" && status !== "withdrawn" && status !== "rejected")) return 0;
        if (status === "blocked") return 1;
        if (status === "withdrawn") return 2;
        if (status === "rejected") return 3;
        if (status === "active" && approved) return 4;
        return 5;
      }
      const rankDiff = approvalSortRank(a) - approvalSortRank(b);
      if (rankDiff) return rankDiff;
      const createdDiff = Number(b.createdAt || 0) - Number(a.createdAt || 0);
      if (createdDiff) return createdDiff;
      return String(a.name || a.code || "").localeCompare(String(b.name || b.code || ""), "ko");
    });
    if (members.length === 0) {
      updateMemberManageTabPendingBlink(0);
      listEl.innerHTML = '<div class="member-approval-empty">회원 데이터가 없습니다.</div>';
      return;
    }
    const pendingCount = members.filter((m) => String(m?.status || "") === "pending" || !m?.approved).length;
    updateMemberManageTabPendingBlink(pendingCount);
    const approvedNamesForDuplicateJoin = new Set();
    members.forEach((m) => {
      const name = String(m?.name || "").replace(/\s+/g, "").trim();
      if (name && m?.approved && m?.status === "active") approvedNamesForDuplicateJoin.add(name);
    });
    listEl.innerHTML = members.map((m) => {
      const adminText = m.adminAccess ? "관리자" : "회원";
      const approvedCardClass = (m.approved && m.status === "active") ? " approved-member" : "";
      const duplicateJoin = !!(String(m?.name || "").replace(/\s+/g, "").trim() && approvedNamesForDuplicateJoin.has(String(m?.name || "").replace(/\s+/g, "").trim()) && (m.status === "pending" || !m.approved));
      const resultText = joinResultLabel(m);

  async function updateMemberApprovalStatus(code, action) {
    const record = await getMemberRecordByCodeAnyRoot(code);
    if (!record || !record.member) {
      setAuthMessage("해당 회원을 찾을 수 없습니다.");
      return;
    }
    const memberRootForUpdate = record.rootPath || MEMBERS_ROOT;
    const memberMembersPathForUpdate = record.membersPath || record.member?.__membersPath || `${memberRootForUpdate}/members`;
    const memberNameIndexPathForUpdate = record.nameIndexPath || record.member?.__nameIndexPath || `${memberRootForUpdate}/nameIndex`;
    const memberPendingPathForUpdate = record.pendingPath || record.member?.__pendingPath || `${memberRootForUpdate}/pending`;
    const member = record.member;
    const now = Date.now();
    const updates = {};
    if (action === "approve") {
      Object.assign(member, {
        approved: true,
        status: "active",
        role: member.role === "admin" ? "admin" : "member",
        apps: { busSeat: true, tripSchedule: true, memberList: false, busRute: true },
        phoneLast4: getMemberPhoneLast4(member),
        approvedAt: member.approvedAt || now,
        approvedBy: "membership-admin",
        updatedAt: now
      });
      await ensureMemberPasswordHashForLogin(member);
      updates[`${memberPendingPathForUpdate}/${code}`] = null;
      updates[`${MEMBERS_ROOT}/pending/${code}`] = null;
      updates[`${MEMBER_LIST_DELETED_JOIN_CODES_PATH}/${code}`] = null;
    } else if (action === "block") {
      Object.assign(member, {
        approved: false,
        status: "blocked",
        apps: { busSeat: false, tripSchedule: false, memberList: false, busRute: false },
        adminAccess: false,
        updatedAt: now
      });
    } else if (action === "toggle-admin") {
      const nextAdmin = !member.adminAccess;
      Object.assign(member, {
        approved: true,
        status: "active",
        role: nextAdmin ? "admin" : "member",
        adminAccess: nextAdmin,
        apps: { ...(member.apps || {}), busSeat: true, tripSchedule: true, busRute: true, memberList: nextAdmin },
        updatedAt: now
      });
      updates[`${memberPendingPathForUpdate}/${code}`] = null;
    } else if (action === "withdraw") {
      Object.assign(member, {
        approved: false,
        status: "withdrawn",
        role: "withdrawn",
        adminAccess: false,
        passwordHash: null,
        apps: { busSeat: false, tripSchedule: false, memberList: false, busRute: false },
        withdrawnAt: now,
        withdrawnBy: "membership-admin",
        updatedAt: now
      });
      updates[`${memberPendingPathForUpdate}/${code}`] = null;
    } else if (action === "delete") {
      const deleteNameKeys = [
        member?.name,
        member?.nameKey,
        member?.memberName,
        member?.userName,
        member?.displayName
      ].map((v) => String(v || "").replace(/\s+/g, "").trim()).filter(Boolean);

      // 삭제 회원은 차후 같은 이름/전화번호로 재가입할 수 있어야 하므로
      // tombstone(삭제기록)을 남기지 않고 회원 관련 경로 전체에서 제거한다.
      MEMBER_DB_PATH_CANDIDATES.forEach((cfg) => {
        updates[`${cfg.membersPath}/${code}`] = null;
        updates[`${cfg.pendingPath}/${code}`] = null;
        deleteNameKeys.forEach((nameKey) => {
          updates[`${cfg.nameIndexPath}/${nameKey}/${code}`] = null;
          updates[`${cfg.nameIndexPath}/${nameKey.toLowerCase()}/${code}`] = null;
        });
      });
      deleteNameKeys.forEach((nameKey) => {
        updates[`${MEMBER_LOGIN_INDEX_PATH}/${nameKey}/${code}`] = null;
        updates[`${MEMBER_LOGIN_INDEX_PATH}/${nameKey.toLowerCase()}/${code}`] = null;
      });
      updates[`${MEMBER_LIST_JOIN_CODES_PATH}/${code}`] = null;
      updates[`${MEMBER_LIST_DELETED_JOIN_CODES_PATH}/${code}`] = null;
      updates[`${ACTIVE_SESSIONS_PATH}/${code}`] = null;
      await update(ref(membershipDb), updates);
      setAuthMessage(`${member.name || code} / ${code} 완전 삭제 완료`, true);
      await loadApprovalMembers();
      return;
    }
    updates[`${memberMembersPathForUpdate}/${code}`] = member;
    updates[`${MEMBER_LIST_JOIN_CODES_PATH}/${code}`] = {
      code: member.code,
      name: member.name,
      gender: member.gender || "",
      // 생년월일은 멤버리스트 주민번호 칸으로만 사용한다.
      birthYear: "",
      birthDate: member.birthDate || member.rrn || member.birthYear || "",
      rrn: member.rrn || member.birthDate || member.birthYear || "",
      passwordHash: member.passwordHash || "",
      phone: member.phone || "",
      phoneDigits: member.phoneDigits || "",
      phoneLast4: member.phoneLast4 || "",
      dong: member.dong || "",
      status: member.status || "pending",
      approved: !!member.approved,
      role: member.role || "member",
      adminAccess: !!member.adminAccess,
      memberType: member.memberType || "",
      createdAt: member.createdAt || now,
      updatedAt: now
    };
    const nameKey = makeNameKey(member.name);
    const plainNameKey = normalizeName(member.name);
    const loginIndexRecord = makeMemberLoginIndexRecord(member);
    const loginIndexKeys = Array.from(new Set([nameKey, plainNameKey].filter(Boolean)));
    loginIndexKeys.forEach((key) => {
      const loginIndexPath = `${MEMBER_LOGIN_INDEX_PATH}/${key}/${code}`;
      if (member.status === "active" && member.approved && member.passwordHash) {
        updates[loginIndexPath] = loginIndexRecord;
      } else {
        updates[loginIndexPath] = null;
      }
      updates[`${memberNameIndexPathForUpdate}/${key}/${code}`] = (member.status === "active" && member.approved) ? true : null;
    });
    // 모바일/새 기기는 members 전체조회가 막혀도 loginIndex만으로 로그인해야 하므로
    // 승인완료 회원은 항상 표준 경로(membershipSecure)에 로그인 본체와 인덱스를 함께 보강한다.
    addCanonicalLoginPathUpdates(updates, member, code);
    await update(ref(membershipDb), updates);
    await mergeMemberIntoMemberListMain(member);
    setAuthMessage(`${member.name} / ${code} 처리 완료`, true);
    await loadApprovalMembers();
  }

    let isComposing = false;
    el.addEventListener("compositionstart", () => { isComposing = true; });
    el.addEventListener("compositionend", () => { isComposing = false; });
    el.addEventListener("input", () => {
      if (isComposing) return;
      // 입력은 자유롭게 허용한다. 앞 글자 한글 조건은 loginMember/joinMember에서 검증한다.
    });
    el.addEventListener("focus", () => {
      el.setAttribute("lang", "ko");
      el.setAttribute("inputmode", "text");
      el.setAttribute("autocapitalize", "off");
      el.setAttribute("autocorrect", "off");
      el.setAttribute("spellcheck", "false");
    });
  }

    (function setupMemberSignupKeyboardNavigation() {
      const joinFieldIds = [
        "memberJoinNameInput",
        "memberJoinPasswordInput",
        "memberJoinGenderInput",
        "memberJoinBirthInput",
        "memberJoinPhoneInput",
        "memberJoinDongInput"
      ];

      const isForwardKey = (event) => {
        const key = String(event.key || "");
        return key === "Enter" || key === "NumpadEnter" || key === "Go" || key === "Next" || key === "Done";
      };

      const scrollJoinFieldIntoView = (element) => {
        if (!element) return;
        const run = () => {
          try {
            element.scrollIntoView({ behavior: "smooth", block: "center", inline: "nearest" });
          } catch (error) {
            element.scrollIntoView(false);
          }
        };
        window.setTimeout(run, 60);
        window.setTimeout(run, 280);
      };

      joinFieldIds.forEach((id, index) => {
        const field = byId(id);
        if (!field) return;

        field.addEventListener("focus", () => scrollJoinFieldIntoView(field));
        field.addEventListener("click", () => scrollJoinFieldIntoView(field));

        field.addEventListener("keydown", (event) => {
          if (!isForwardKey(event)) return;
          event.preventDefault();
          event.stopPropagation();

          const nextField = byId(joinFieldIds[index + 1]);
          if (nextField) {
            nextField.focus({ preventScroll: true });
            scrollJoinFieldIntoView(nextField);
            return;
          }

          field.blur();
          byId("memberJoinSubmitBtn")?.focus({ preventScroll: true });
        });
      });
    })();

    ["memberLoginNameInput", "memberLoginPasswordInput"].forEach((id) => {
      const loginInput = byId(id);
      if (!loginInput) return;
      const runKeyboardLogin = (event) => {
        const key = String(event.key || "");
        if (key === "Enter" || key === "NumpadEnter" || key === "Go" || key === "Done") {
          event.preventDefault();
          loginMember().catch((error) => {
            console.error("회원 로그인 오류:", error);

          });
        }
      };
      loginInput.addEventListener("keydown", runKeyboardLogin);
      loginInput.addEventListener("keyup", runKeyboardLogin);
    });
    /* PATCH: 비밀번호 변경 화면 Enter/이동 키 순차 포커스 + 모바일 키보드 가림 방지 */
    (function setupMemberPasswordChangeKeyboardNavigation() {
      const changeFieldIds = [
        "memberChangeNameInput",
        "memberChangeOldPasswordInput",
        "memberChangeNewPasswordInput",
        "memberChangeConfirmPasswordInput"
      ];

      const isForwardKey = (event) => {
        const key = String(event.key || "");
        return key === "Enter" || key === "NumpadEnter" || key === "Go" || key === "Next" || key === "Done";
      };

      const scrollChangeFieldIntoView = (element) => {
        if (!element) return;
        const run = () => {
          try {
            element.scrollIntoView({ behavior: "smooth", block: "center", inline: "nearest" });
          } catch (error) {
            element.scrollIntoView(false);
          }
        };
        window.setTimeout(run, 60);
        window.setTimeout(run, 280);
      };

      changeFieldIds.forEach((id, index) => {
        const field = byId(id);
        if (!field) return;

        field.addEventListener("focus", () => scrollChangeFieldIntoView(field));
        field.addEventListener("click", () => scrollChangeFieldIntoView(field));

        field.addEventListener("keydown", (event) => {
          if (!isForwardKey(event)) return;
          event.preventDefault();
          event.stopPropagation();

          const nextField = byId(changeFieldIds[index + 1]);
          if (nextField) {
            nextField.focus({ preventScroll: true });
            scrollChangeFieldIntoView(nextField);
            return;
          }

          field.blur();
          const submitBtn = byId("memberChangePasswordSubmitBtn");
          submitBtn?.focus({ preventScroll: true });
          changeMemberPassword().catch((error) => {
            console.error("회원 비밀번호 변경 오류:", error);
            setAuthMessage("비밀번호 변경 오류: Firebase 연결 또는 저장 규칙을 확인하세요.");
          });
        });
      });
    })();
  }

  document.addEventListener("visibilitychange", () => {

  if (document.readyState === "loading") {

<script type="module" id="bus-seat-member-manage-forced-render-script">

  /* 로그인 복구형 회원 JSON 백업/복구 대상 경로
     - 회원관리 표시용 joinCodes만 백업하면 로그인 복구가 불가능하므로

  const MEMBERSHIP_ROOT_PATHS_FOR_BACKUP = [

  function q(sel) { return document.querySelector(sel); }
  function esc(value) {

  function normalizeRecord(code, raw) {
    const m = raw && typeof raw === "object" ? raw : {};
    return {
      code: String(m.code || code || ""),
      name: String(m.name || m.displayName || ""),

    if (status === "withdrawn") return "탈퇴";

    if (status === "pending") return "가입대기";
    return status || (m?.approved ? "승인" : "가입대기");
  }
  function addMemberMapRecord(map, code, raw, defaults = {}) {
    if (!code) return;
    const normalized = normalizeRecord(code, { ...(defaults || {}), ...(raw || {}) });
    const prev = map.get(String(code));
    if (!prev) {
      map.set(String(code), normalized);
      return;
    }
    // 여러 경로에서 같은 회원이 발견되면, 비어 있는 값만 보강한다.
    map.set(String(code), {
      ...prev,
      ...Object.fromEntries(Object.entries(normalized).filter(([, v]) => v !== "" && v !== 0 && v !== false && v != null)),
      approved: prev.approved || normalized.approved,
      adminAccess: prev.adminAccess || normalized.adminAccess,
      raw: { ...(prev.raw || {}), ...(normalized.raw || {}) }
    });
  }

  async function readAllMembers() {
    const [
      membersSnap,
      pendingSnap,
      joinCodesSnap,
      rootMembershipSnap,
      rootMembersSnap,
      legacySecureMembersSnap,
      legacySecurePendingSnap,
      membershipPendingSnap,
      rootPendingSnap,
      busSeatRootPendingSnap,
      busSeatRootMembersSnap
    ] = await Promise.all([
      get(ref(manageDb, `${MANAGE_MEMBERS_ROOT}/members`)).catch(() => null),
      get(ref(manageDb, `${MANAGE_MEMBERS_ROOT}/pending`)).catch(() => null),
      get(ref(manageDb, MANAGE_JOIN_CODES_PATH)).catch(() => null),
      get(ref(manageDb, "membership/members")).catch(() => null),
      get(ref(manageDb, "members")).catch(() => null),
      get(ref(manageDb, "busSeatApp/membership/members")).catch(() => null),
      get(ref(manageDb, "busSeatApp/membership/pending")).catch(() => null),
      get(ref(manageDb, "membership/pending")).catch(() => null),
      get(ref(manageDb, "pending")).catch(() => null),
      get(ref(manageDb, "busSeatApp/pending")).catch(() => null),
      get(ref(manageDb, "busSeatApp/members")).catch(() => null)
    ]);
    const map = new Map();

    // 1순위: 현재 보안 분리 회원가입 DB 기본 경로(membershipSecure)
    const members = membersSnap && membersSnap.exists() ? membersSnap.val() || {} : {};
    Object.keys(members).forEach((code) => addMemberMapRecord(map, code, members[code]));

    // 2순위: 이전 파일에서 사용하던 busSeatApp/membership 경로. 신규 저장은 하지 않고 기존 자료 승인/정리 호환만 유지한다.
    const legacySecureMembers = legacySecureMembersSnap && legacySecureMembersSnap.exists() ? legacySecureMembersSnap.val() || {} : {};
    Object.keys(legacySecureMembers).forEach((code) => addMemberMapRecord(map, code, legacySecureMembers[code]));

    // 3순위: 승인 처리 때 별도로 미러링되는 memberList/joinCodes 경로
    // 단, 삭제(deleted) 기록은 멤버리스트의 승인결과 칸 갱신용 기록일 뿐
    // 회원관리 목록에는 다시 승인대기/회원카드로 생성하지 않는다.
    const joinCodes = joinCodesSnap && joinCodesSnap.exists() ? joinCodesSnap.val() || {} : {};
    Object.keys(joinCodes).forEach((code) => {
      const joinRecord = joinCodes[code] || {};
      if (String(joinRecord.status || "") === "deleted" || String(joinRecord.approvalResult || "") === "삭제" || String(joinRecord.joinStatus || "") === "삭제") {
        return;
      }
      addMemberMapRecord(map, code, joinRecord, { status: "active", approved: true, role: "member" });
    });

    // 4순위: 과거/백업 호환 경로
    const rootMembershipMembers = rootMembershipSnap && rootMembershipSnap.exists() ? rootMembershipSnap.val() || {} : {};
    Object.keys(rootMembershipMembers).forEach((code) => addMemberMapRecord(map, code, rootMembershipMembers[code]));
    const rootMembers = rootMembersSnap && rootMembersSnap.exists() ? rootMembersSnap.val() || {} : {};
    Object.keys(rootMembers).forEach((code) => addMemberMapRecord(map, code, rootMembers[code]));
    const busSeatRootMembers = busSeatRootMembersSnap && busSeatRootMembersSnap.exists() ? busSeatRootMembersSnap.val() || {} : {};
    Object.keys(busSeatRootMembers).forEach((code) => addMemberMapRecord(map, code, busSeatRootMembers[code]));

    // pending 경로에 코드만 남아 있고 members 객체가 누락된 경우도 표시한다.
    const pendingSources = [
      { snap: pendingSnap, path: `${MANAGE_MEMBERS_ROOT}/pending` },
      { snap: legacySecurePendingSnap, path: "busSeatApp/membership/pending" },
      { snap: membershipPendingSnap, path: "membership/pending" },
      { snap: rootPendingSnap, path: "pending" },
      { snap: busSeatRootPendingSnap, path: "busSeatApp/pending" }
    ];
    pendingSources.forEach(({ snap, path }) => {
      const pending = snap && snap.exists() ? snap.val() || {} : {};
      Object.keys(pending).forEach((code) => {
        const rawPending = pending[code];
        if (!map.has(code)) {
          if (rawPending && typeof rawPending === "object") {
            addMemberMapRecord(map, code, { ...rawPending, code, approved: false, status: rawPending.status || "pending", role: rawPending.role || "pending", __pendingPath: path });
          } else {
            addMemberMapRecord(map, code, { code, name: "가입정보 없음", approved: false, status: "pending", role: "pending", __pendingPath: path });
          }
        } else {
          const prev = map.get(code);
          if (!prev.status) prev.status = "pending";
          if (!prev.__pendingPath) prev.__pendingPath = path;
        }
      });
    });

    return Array.from(map.values())
      .filter((m) => String(m && m.status || "") !== "deleted")
      .sort((a,b) => {
        // 승인대기자는 항상 회원관리 목록 최상단에 표시한다.
        // 삭제 상태는 위에서 제외되므로 회원관리 목록에 재생성되지 않는다.
        const rank = { pending: 0, blocked: 1, withdrawn: 2, rejected: 3, active: 4 };
        const rankDiff = (rank[a.status] ?? 9) - (rank[b.status] ?? 9);
        if (rankDiff) return rankDiff;
        const timeDiff = Number(b.createdAt || b.requestedAt || b.updatedAt || 0) - Number(a.createdAt || a.requestedAt || a.updatedAt || 0);
        if (timeDiff) return timeDiff;
        return String(a.code).localeCompare(String(b.code));
      });
  }

  function normalizeDuplicateJoinName(value) {
    return String(value || "").replace(/\s+/g, "").trim();
  }
  function buildDuplicateJoinNameSet(members) {
    const approvedNames = new Set();
    (members || []).forEach((m) => {
      const name = normalizeDuplicateJoinName(m && m.name);
      if (!name) return;
      const status = String(m && m.status || "");
      if ((status === "active" && m && m.approved) || (m && m.approved === true)) approvedNames.add(name);
    });
    return approvedNames;
  }
  function isDuplicateJoinMember(m, approvedNames) {
    const name = normalizeDuplicateJoinName(m && m.name);
    if (!name || !approvedNames || !approvedNames.has(name)) return false;
    const status = String(m && m.status || "");
    return status === "pending" || !m.approved;
  }
  function updateMemberManageTabPendingBlink(pendingCount) {

  function renderMembers(members) {

      return;
    }

    list.innerHTML = `

        <span>승인완료 ${approvedCount}명</span> / <span class="pending-count ${pendingCount > 0 ? 'has-pending' : ''}">승인대기 ${pendingCount}명</span> / <span>전체 ${members.length}명</span>
        ${duplicateJoinCount ? `<span class="duplicate-join-badge">중복가입 ${duplicateJoinCount}명</span>` : ''}
      </div>
      ${members.map((m) => {
        const approvedCardClass = (m.approved && m.status === 'active') ? ' approved-member' : '';
        const duplicateJoin = isDuplicateJoinMember(m, duplicateJoinNames);
        const resultText = joinResultLabel(m);
        const resultSegment = resultText === "승인" ? "" : ` · 승인결과: ${esc(resultText)}`;
        return `
        <div class="member-approval-card${approvedCardClass}${duplicateJoin ? ' duplicate-join-person' : ''}" data-member-code="${esc(m.code)}" data-member-name="${esc(m.name || '')}">
          <div class="member-approval-card-title">${esc(m.name || '-')} / ${esc(m.code)} / ${esc(label(m))}${duplicateJoin ? '<span class="duplicate-join-badge">중복가입</span>' : ''}</div>
          <div>성별: ${esc(m.gender || '-')} · 출생년도: ${esc(m.birthYear || '-')} · 거주지: ${esc(m.dong || '-')}</div>
          <div>전화: ${esc(m.phone || '-')}</div>
          <div>등급: ${esc(m.role || '-')} · ${m.adminAccess ? '관리자' : '회원'} · 가입일: ${esc(fmt(m.createdAt))}${resultSegment}</div>
          <div class="member-approval-card-actions">
            ${(m.approved && m.status === "active") ? "" : `<button class="approve" data-forced-member-action="approve" data-code="${esc(m.code)}">승인</button>`}
            <button class="block" data-forced-member-action="block" data-code="${esc(m.code)}">차단</button>
            <button class="admin" data-forced-member-action="toggle-admin" data-code="${esc(m.code)}">관리자</button>
            <button class="withdraw" data-forced-member-action="withdraw" data-code="${esc(m.code)}">탈퇴</button>
            <button class="delete" data-forced-member-action="delete" data-code="${esc(m.code)}">삭제</button>
          </div>
        </div>`;
      }).join('')}`;
  }
  function makeMemberJsonBackupFileName() {
    const d = new Date();
    const pad = (n) => String(n).padStart(2, "0");
    return `회원가입백업_${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}.json`;
  }

  async function prepareMemberBackupSaveHandle() {
    const fileName = makeMemberJsonBackupFileName();
    if (!window.showSaveFilePicker) return { handle: null, fileName };
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName: fileName,
        types: [{
          description: "회원 로그인 복구용 JSON 백업",
          accept: { "application/json": [".json"] }
        }]
      });
      return { handle, fileName };
    } catch (error) {
      if (error && error.name === "AbortError") return { cancelled: true, fileName };
      console.warn("저장 위치 선택창을 열 수 없어 일반 다운로드로 전환합니다.", error);
      return { handle: null, fileName };
    }
  }

  async function downloadMemberJsonBackup(payload, saveTarget = {}) {
    const jsonText = JSON.stringify(payload, null, 2);
    if (saveTarget && saveTarget.handle) {
      const writable = await saveTarget.handle.createWritable();
      await writable.write(new Blob([jsonText], { type: "application/json;charset=utf-8" }));
      await writable.close();
      return;
    }
    const blob = new Blob([jsonText], { type: "application/json;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = saveTarget.fileName || makeMemberJsonBackupFileName();
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  function readMemberJsonFile(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => {
        try { resolve(JSON.parse(String(reader.result || "{}"))); }
        catch (error) { reject(error); }
      };
      reader.onerror = () => reject(reader.error || new Error("파일 읽기 실패"));
      reader.readAsText(file, "utf-8");
    });
  }

  function isPlainObject(value) {
    return !!value && typeof value === "object" && !Array.isArray(value);
  }

  function normalizeMemberNameKey(name) {
    return String(name || "").replace(/\s+/g, "").trim();
  }

  function mergeObjectsByCode(...sources) {
    const merged = {};
    sources.forEach((source) => {
      if (!isPlainObject(source)) return;
      Object.entries(source).forEach(([code, value]) => {
        if (!code || !isPlainObject(value)) return;
        const key = String(value.code || code).trim();
        if (!key) return;
        merged[key] = { ...(merged[key] || {}), ...value, code: key };
      });
    });
    return Object.keys(merged).length ? merged : null;
  }

  function buildNameIndexFromMembers(members) {
    const index = {};
    if (!isPlainObject(members)) return null;
    Object.entries(members).forEach(([code, member]) => {
      if (!isPlainObject(member)) return;
      const key = String(member.code || code).trim();
      const nameKey = normalizeMemberNameKey(member.name || member.memberName || member.userName || member.displayName);
      if (!key || !nameKey) return;
      if (!index[nameKey]) index[nameKey] = {};
      index[nameKey][key] = true;
      const lower = nameKey.toLowerCase();
      if (lower !== nameKey) {
        if (!index[lower]) index[lower] = {};
        index[lower][key] = true;
      }
    });
    return Object.keys(index).length ? index : null;
  }

  function buildJoinCodesFromMembers(members, existingJoinCodes = null) {
    const result = isPlainObject(existingJoinCodes) ? { ...existingJoinCodes } : {};
    if (!isPlainObject(members)) return Object.keys(result).length ? result : null;
    Object.entries(members).forEach(([code, member]) => {
      if (!isPlainObject(member)) return;
      const key = String(member.code || code).trim();
      if (!key) return;
      result[key] = {
        ...(result[key] || {}),
        code: key,
        name: member.name || result[key]?.name || "",
        gender: member.gender || result[key]?.gender || "",
        birthYear: member.birthYear || result[key]?.birthYear || "",
        phone: member.phone || result[key]?.phone || "",
        phoneLast4: member.phoneLast4 || result[key]?.phoneLast4 || "",
        dong: member.dong || result[key]?.dong || "",
        status: member.status || result[key]?.status || "pending",
        approvalResult: joinResultLabel(member),
        joinStatus: joinResultLabel(member),
        approved: !!member.approved,
        role: member.role || result[key]?.role || "member",
        adminAccess: !!member.adminAccess,
        memberType: member.memberType || result[key]?.memberType || "",
        createdAt: member.createdAt || result[key]?.createdAt || Date.now(),
        updatedAt: Date.now()
      };
    });
    return Object.keys(result).length ? result : null;
  }

  function hasLoginPasswordData(members) {
    if (!isPlainObject(members)) return false;
    return Object.values(members).some((member) => {
      if (!isPlainObject(member)) return false;
      return !!(member.passwordHash || member.password || member.passHash || member.pwHash);
    });
  }

  async function readPathSafe(path) {
    const snap = await get(ref(manageDb, path)).catch(() => null);
    return snap && snap.exists() ? snap.val() : null;
  }

  async function handleMemberJsonBackup() {
    try {
      const proceed = confirm(
        '회원 로그인 복구용 JSON 백업을 진행할까요?\n\n' +
        '백업에는 로그인 복구에 필요한 members/passwordHash, pending, nameIndex, joinCodes가 함께 포함됩니다.'
      );
      if (!proceed) return;

      const saveTarget = await prepareMemberBackupSaveHandle();
      if (saveTarget && saveTarget.cancelled) return;

      const busSeatMembership = {
        members: await readPathSafe("busSeatApp/membership/members"),
        pending: await readPathSafe("busSeatApp/membership/pending"),
        nameIndex: await readPathSafe("busSeatApp/membership/nameIndex")
      };
      const legacyMembership = {
        members: await readPathSafe("membership/members"),
        pending: await readPathSafe("membership/pending"),
        nameIndex: await readPathSafe("membership/nameIndex")
      };
      const rootMembers = await readPathSafe("members");
      const rootPending = await readPathSafe("pending");
      const rootNameIndex = await readPathSafe("nameIndex");
      const busSeatRootMembers = await readPathSafe("busSeatApp/members");
      const busSeatRootPending = await readPathSafe("busSeatApp/pending");
      const busSeatRootNameIndex = await readPathSafe("busSeatApp/nameIndex");
      const joinCodes = await readPathSafe(MANAGE_JOIN_CODES_PATH);
      const memberListMain = await readPathSafe(MANAGE_MEMBER_LIST_MAIN_PATH);

      const mergedMembers = mergeObjectsByCode(busSeatMembership.members, legacyMembership.members, rootMembers, busSeatRootMembers);
      const mergedPending = mergeObjectsByCode(busSeatMembership.pending, legacyMembership.pending, rootPending, busSeatRootPending);
      const mergedNameIndex = busSeatMembership.nameIndex || legacyMembership.nameIndex || rootNameIndex || busSeatRootNameIndex || buildNameIndexFromMembers(mergedMembers);
      const mergedJoinCodes = buildJoinCodesFromMembers(mergedMembers, joinCodes);

      const payload = {
        backupType: "bus-seat-membership-login-recovery-backup",
        version: 2,
        exportedAt: new Date().toISOString(),
        note: "로그인 복구용 전체 백업: members/passwordHash, pending, nameIndex, memberList/joinCodes를 함께 포함합니다.",
        data: {
          membership: {
            members: mergedMembers,
            pending: mergedPending,
            nameIndex: mergedNameIndex
          },
          memberList: {
            joinCodes: mergedJoinCodes,
            main: memberListMain || null
          },
          rawPaths: {
            busSeatAppMembership: busSeatMembership,
            legacyMembership,
            rootMembers,
            rootPending,
            rootNameIndex,
            busSeatRootMembers,
            busSeatRootPending,
            busSeatRootNameIndex
          }
        }
      };

      if (!hasLoginPasswordData(mergedMembers)) {
        const ok = confirm(
          '주의: 현재 DB에서 로그인용 passwordHash가 있는 members 데이터를 찾지 못했습니다.\n\n' +
          '이 백업은 회원관리 표시 정보 복구에는 사용할 수 있지만, 회원 로그인 복구에는 부족할 수 있습니다.\n\n' +
          '그래도 JSON 백업 파일을 만들까요?'
        );
        if (!ok) return;
      }

      await downloadMemberJsonBackup(payload, saveTarget);
      alert('회원 로그인 복구용 JSON 백업이 완료되었습니다.');
      const btn = q('#memberJsonBackupBtn');
      if (btn) {
        btn.classList.add('btn-success-flash');
        setTimeout(() => btn.classList.remove('btn-success-flash'), 900);
      }
    } catch (error) {
      console.error('회원 JSON 백업 실패:', error);
      alert('회원 JSON 백업 실패: Firebase 연결 또는 읽기 권한을 확인하세요.');
    }
  }

  function normalizeRestoredMemberBackup(backup) {
    const data = backup?.data || backup || {};
    const raw = data?.rawPaths || {};
    const membership = data?.membership || data?.busSeatApp?.membership || data?.[MANAGE_MEMBERS_ROOT] || {};
    const legacyMembership = data?.legacyMembership || raw?.legacyMembership || {};
    const busSeatMembership = raw?.busSeatAppMembership || {};

    const members = mergeObjectsByCode(
      membership?.members,
      busSeatMembership?.members,
      legacyMembership?.members,
      data?.members,
      data?.rootMembers,
      raw?.rootMembers,
      raw?.busSeatRootMembers,
      backup?.members
    );

    const pending = mergeObjectsByCode(
      membership?.pending,
      busSeatMembership?.pending,
      legacyMembership?.pending,
      data?.pending,
      data?.rootPending,
      raw?.rootPending,
      raw?.busSeatRootPending,
      backup?.pending
    );

    const nameIndex =
      membership?.nameIndex ||
      busSeatMembership?.nameIndex ||
      legacyMembership?.nameIndex ||
      data?.nameIndex ||
      data?.rootNameIndex ||
      raw?.rootNameIndex ||
      raw?.busSeatRootNameIndex ||
      backup?.nameIndex ||
      buildNameIndexFromMembers(members);

    const joinCodes =
      data?.memberList?.joinCodes ||
      backup?.memberList?.joinCodes ||
      data?.joinCodes ||
      backup?.joinCodes ||
      buildJoinCodesFromMembers(members);

    const memberListMain = data?.memberList?.main || backup?.memberList?.main || null;

    return { members, pending, nameIndex, joinCodes, memberListMain };
  }

  function chooseMemberRestoreMode(restored) {
    const hasMembers = !!(restored && restored.members && typeof restored.members === 'object' && Object.keys(restored.members).length);
    const hasJoinCodes = !!(restored && restored.joinCodes && typeof restored.joinCodes === 'object' && Object.keys(restored.joinCodes).length);
    const text =
      '복구 방식을 선택하세요.\n\n' +
      '1 = 전체복구\n' +
      '    members/passwordHash + pending + nameIndex + memberList/joinCodes 모두 복구\n\n' +
      '2 = 로그인DB만 복구\n' +
      '    members/passwordHash + pending + nameIndex만 복구\n\n' +
      '3 = 표시DB만 복구\n' +
      '    memberList/joinCodes만 복구\n\n' +
      `현재 JSON 상태: 로그인DB ${hasMembers ? '있음' : '없음'} / 표시DB ${hasJoinCodes ? '있음' : '없음'}\n\n` +
      '취소하려면 빈칸 또는 취소를 누르세요.';
    const choice = prompt(text, '1');
    const value = String(choice || '').trim();
    if (!value) return null;
    if (value === '1' || value === '전체' || value === '전체복구') return 'full';
    if (value === '2' || value === '로그인' || value === '로그인DB' || value === '로그인DB만') return 'login';
    if (value === '3' || value === '표시' || value === '표시DB' || value === '표시DB만') return 'display';
    alert('복구 방식은 1, 2, 3 중에서 선택해야 합니다.');
    return null;
  }

  function describeMemberRestoreMode(mode) {
    if (mode === 'login') return '로그인DB만 복구';
    if (mode === 'display') return '표시DB만 복구';
    return '전체복구';
  }

  async function handleMemberJsonRestoreFile(event) {
    const input = event.target;
    const file = input?.files?.[0];
    if (input) input.value = '';
    if (!file) return;
    try {
      const backup = await readMemberJsonFile(file);
      const restored = normalizeRestoredMemberBackup(backup);
      const preselectedMode = window.__memberJsonRestoreSelectedMode || null;
      window.__memberJsonRestoreSelectedMode = null;
      const restoreMode = preselectedMode || chooseMemberRestoreMode(restored);
      if (!restoreMode) return;

      const hasMembers = !!(restored.members && typeof restored.members === 'object' && Object.keys(restored.members).length);
      const hasJoinCodes = !!(restored.joinCodes && typeof restored.joinCodes === 'object' && Object.keys(restored.joinCodes).length);

      if ((restoreMode === 'full' || restoreMode === 'login') && !hasMembers) {
        alert('선택한 복구 방식에는 로그인용 members 데이터가 필요합니다.\n\n이 JSON에는 members/passwordHash 데이터가 없어 로그인DB 복구를 할 수 없습니다.\n표시DB만 복구하려면 복구 방식 3번을 선택하세요.');
        return;
      }
      if (restoreMode === 'display' && !hasJoinCodes && !hasMembers) {
        alert('표시DB로 복구할 memberList/joinCodes 데이터가 없습니다.');
        return;
      }

      if ((restoreMode === 'full' || restoreMode === 'login') && !hasLoginPasswordData(restored.members)) {
        const okNoHash = confirm(
          '이 JSON 안의 members 데이터에 passwordHash가 보이지 않습니다.\n\n' +
          '복구하면 회원 코드/이름은 복원될 수 있지만, 회원 로그인은 계속 안 될 수 있습니다.\n\n' +
          '그래도 복구할까요?'
        );
        if (!okNoHash) return;
      }

      const modeLabel = describeMemberRestoreMode(restoreMode);
      const ok = confirm(
        `${modeLabel}를 실행할까요?\n\n` +
        (restoreMode === 'full'
          ? '- 로그인 DB: members/passwordHash 복구\n- 승인대기 DB: pending 복구\n- 이름색인 DB: nameIndex 복구\n- 회원관리 표시 DB: memberList/joinCodes 복구\n\n'
          : restoreMode === 'login'
            ? '- 로그인 DB: members/passwordHash 복구\n- 승인대기 DB: pending 복구\n- 이름색인 DB: nameIndex 복구\n- 회원관리 표시 DB는 건드리지 않음\n\n'
            : '- 회원관리 표시 DB: memberList/joinCodes 복구\n- 로그인 DB는 건드리지 않음\n\n') +
        '현재 해당 DB 경로가 백업 파일 기준으로 덮어쓰기 됩니다.'
      );
      if (!ok) return;

      const nameIndex = restored.nameIndex || buildNameIndexFromMembers(restored.members);
      const joinCodes = restored.joinCodes || buildJoinCodesFromMembers(restored.members);
      const updates = {};

      if (restoreMode === 'full' || restoreMode === 'login') {
        Object.assign(updates, {
          'busSeatApp/membership/members': restored.members || null,
          'busSeatApp/membership/pending': restored.pending || null,
          'busSeatApp/membership/nameIndex': nameIndex || null,
          'membership/members': restored.members || null,
          'membership/pending': restored.pending || null,
          'membership/nameIndex': nameIndex || null,
          'members': restored.members || null,
          'pending': restored.pending || null,
          'nameIndex': nameIndex || null,
          'busSeatApp/members': restored.members || null,
          'busSeatApp/pending': restored.pending || null,
          'busSeatApp/nameIndex': nameIndex || null
        });
      }

      if (restoreMode === 'full' || restoreMode === 'display') {
        updates[MANAGE_JOIN_CODES_PATH] = joinCodes || null;
        if (restored.memberListMain) updates[MANAGE_MEMBER_LIST_MAIN_PATH] = restored.memberListMain;
      }

      if (!Object.keys(updates).length) {
        alert('복구할 데이터가 없습니다.');
        return;
      }

      await update(ref(manageDb), updates);
      await forceLoadMemberManageList();
      const btn = q('#memberJsonRestoreBtn');
      if (btn) {
        btn.classList.add('btn-success-flash');
        setTimeout(() => btn.classList.remove('btn-success-flash'), 900);
      }
      alert(`${modeLabel} 완료`);
    } catch (error) {
      console.error('회원 JSON 복구 실패:', error);
      alert('회원 JSON 복구 실패: 올바른 회원 백업 JSON 파일인지 확인하세요.');
    }
  }

      overlay.addEventListener('click', (event) => {
        if (event.target === overlay) {
          overlay.remove();
          resolve(null);

        const btn = event.target.closest('button[data-restore-mode]');
        if (!btn) return;
        const mode = btn.getAttribute('data-restore-mode');
        overlay.remove();
        resolve(mode === 'cancel' ? null : mode);
      });
      document.body.appendChild(overlay);
    });
  }

  async function auditMemberDefaultLoginPasswords() {
    const ok = confirm(
      '로그인점검을 실행할까요?\n\n' +
      '검사 기준: 아이디=이름, 비밀번호=전화번호 끝4자리+0\n' +
      '실제 로그인/로그아웃은 하지 않고 DB 읽기 검사만 합니다.\n' +
      '자료 삭제나 수정은 절대 실행하지 않습니다.'
    );
    if (!ok) return;

    const normalizeDigits = (value) => String(value || '').replace(/\D/g, '');
    const normalizeNameForAudit = (value) => String(value || '').replace(/\s+/g, '').trim();
    const makeAuditNameKey = (value) => {
      try {
        if (typeof makeManageNameKey === 'function') return makeManageNameKey(value);
      } catch (e) {}
      return normalizeNameForAudit(value);
    };
    const hashText = async (value) => {
      const text = String(value ?? '');
      const bytes = new TextEncoder().encode(text);
      const digest = await crypto.subtle.digest('SHA-256', bytes);
      return Array.from(new Uint8Array(digest)).map((b) => b.toString(16).padStart(2, '0')).join('');
    };
    const readObj = async (path) => {
      try {
        const snap = await get(ref(manageDb, path));
        return snap && snap.exists() ? (snap.val() || {}) : {};
      } catch (error) {
        return { __readError: error?.code || error?.message || String(error), __path: path };
      }
    };
    const getPhoneLast4 = (member) => {
      const raw = member?.raw && typeof member.raw === 'object' ? member.raw : {};
      const direct = String(member?.phoneLast4 || raw.phoneLast4 || '').replace(/\D/g, '').slice(-4);
      if (direct.length === 4) return direct;
      const digits = normalizeDigits(member?.phone || raw.phone || raw.phoneDigits || raw.tel || raw.contact || raw.phoneNumber);
      return digits.slice(-4);
    };
    const isAuditLoginAllowedStatus = (member) => {
      const status = String(member?.status || member?.raw?.status || '').toLowerCase();
      if (['blocked', 'withdrawn', 'deleted', 'rejected'].includes(status)) return false;
      if (status.includes('차단') || status.includes('탈퇴') || status.includes('삭제') || status.includes('거절')) return false;
      if (member?.approved === true || member?.raw?.approved === true) return true;
      return ['active', 'approved', 'member', 'admin'].includes(status);
    };
    const recordPasswordMatches = (record, expectedPassword, expectedHash) => {
      const r = record && typeof record === 'object' ? record : {};
      const savedHashes = [r.passwordHash, r.passHash, r.pwHash, r.memberPasswordHash]
        .map((v) => String(v || '').trim())
        .filter(Boolean);
      if (savedHashes.includes(expectedHash)) return true;
      const savedPlain = [r.password, r.pass, r.pw, r.memberPassword, r.loginPassword]
        .map((v) => String(v || ''))
        .filter(Boolean);
      return savedPlain.includes(String(expectedPassword || ''));
    };
    const hasAnyPasswordData = (records) => records.some((record) => {
      const r = record && typeof record === 'object' ? record : {};
      return !!(r.passwordHash || r.passHash || r.pwHash || r.memberPasswordHash || r.password || r.pass || r.pw || r.memberPassword || r.loginPassword);
    });
    const memberText = (member, extra = '') => {
      const code = String(member?.code || '').trim() || '-';
      const name = String(member?.name || member?.raw?.name || '').trim() || '-';
      const phone = String(member?.phone || member?.raw?.phone || member?.raw?.phoneDigits || '').trim() || '-';
      return `${code} / ${name} / ${phone}${extra ? ' / ' + extra : ''}`;
    };
    const showList = (title, list, limit = 28) => {
      if (!list.length) return `${title}: 0건`;
      const body = list.slice(0, limit).map((v, i) => `  ${i + 1}. ${v}`).join('\n');
      const more = list.length > limit ? `\n  ...외 ${list.length - limit}건` : '';
      return `${title}: ${list.length}건\n${body}${more}`;
    };

    const members = await readAllMembers();
    const activeMembers = (members || []).filter((m) => {
      const status = String(m?.status || m?.raw?.status || '').toLowerCase();
      if (status === 'pending' || status.includes('대기')) return false;
      return isAuditLoginAllowedStatus(m);
    });

    const loginIndexPaths = [
      `${MANAGE_MEMBERS_ROOT}/loginIndex`,
      'busSeatApp/membership/loginIndex',
      'membership/loginIndex',
      'loginIndex'
    ];
    const loginIndexRoots = await Promise.all(loginIndexPaths.map(async (path) => ({ path, value: await readObj(path) })));
    const readErrors = loginIndexRoots
      .filter((item) => item.value && item.value.__readError)
      .map((item) => `${item.path}: ${item.value.__readError}`);

    const loginFail = [];
    const loginOk = [];
    const warnings = [];
    const skipped = [];

    for (const member of activeMembers) {
      const name = String(member?.name || member?.raw?.name || '').trim();
      const code = String(member?.code || '').trim();
      if (!name) {
        loginFail.push(memberText(member, '이름 없음'));
        continue;
      }
      const last4 = getPhoneLast4(member);
      if (last4.length !== 4) {
        loginFail.push(memberText(member, '전화번호 끝4자리 확인 불가'));
        continue;
      }
      const expectedPassword = `${last4}0`;
      const expectedHash = await hashText(expectedPassword);
      const nameKey = makeAuditNameKey(name);
      const records = [member, member.raw || {}];
      let hasLoginIndexForCode = false;
      loginIndexRoots.forEach(({ value }) => {
        if (!value || typeof value !== 'object' || value.__readError) return;
        const branch = value[nameKey] || value[nameKey.toLowerCase && nameKey.toLowerCase()] || value[name] || null;
        if (!branch || typeof branch !== 'object') return;
        Object.keys(branch).forEach((idxCode) => {
          const rec = branch[idxCode] || {};
          const recCode = String(rec.code || idxCode || '').trim();
          if (!code || recCode === code) {
            hasLoginIndexForCode = true;
            records.push({ ...rec, code: recCode });
          }
        });
      });

      if (!isAuditLoginAllowedStatus(member)) {
        skipped.push(memberText(member, `로그인 허용 상태 아님: ${member.status || member.raw?.status || '-'}`));
        continue;
      }

      const passwordOk = records.some((record) => recordPasswordMatches(record, expectedPassword, expectedHash));
      if (passwordOk) {
        loginOk.push(memberText(member));
        if (!hasLoginIndexForCode) {
          warnings.push(memberText(member, 'loginIndex 누락 가능성: members 직접조회가 막히면 로그인 실패 가능'));
        }
      } else {
        const reason = hasAnyPasswordData(records)
          ? `기준 비밀번호(${expectedPassword})와 저장 비밀번호 불일치`
          : '저장된 passwordHash/비밀번호 없음';
        loginFail.push(memberText(member, reason));
      }
    }

    const report = [
      '로그인점검 완료',
      '검사 기준: 아이디=이름 / 비밀번호=전화번호 끝4자리+0',
      '실제 로그인/로그아웃 기록은 만들지 않았습니다.',
      '',
      `검사대상 승인회원: ${activeMembers.length}명`,
      `로그인 가능 예상: ${loginOk.length}명`,
      `로그인 불가 예상: ${loginFail.length}명`,
      `주의 필요: ${warnings.length}명`,
      '',
      showList('로그인 불가 예상 회원', loginFail),
      '',
      showList('주의 필요 회원', warnings),
      '',
      showList('검사 제외/상태 확인 회원', skipped, 12),
      '',
      readErrors.length ? showList('읽기 실패 경로', readErrors, 10) : '읽기 실패 경로: 0건',
      '',
      '※ 이 점검은 DB를 삭제/수정하지 않는 읽기 전용 검사입니다.'
    ].join('\n');

    console.log('[회원 로그인점검 결과]', report, { loginFail, warnings, loginOk });
    alert(report);
  }

  async function repairOrphanJoinCodesToLoginDb() {
    const ok = confirm(
      '고아코드 복구를 실행할까요?\n\n' +
      '대상: memberList/joinCodes에는 있지만 members/pending에는 없는 고아 joinCodes\n' +

      try {
        const snap = await get(ref(manageDb, path));
        return snap && snap.exists() ? (snap.val() || {}) : {};
      } catch (error) {
        return { __readError: error?.code || error?.message || String(error), __path: path };
      }
    };
    const hashText = async (value) => {
      const text = String(value ?? '');
      const bytes = new TextEncoder().encode(text);
      const digest = await crypto.subtle.digest('SHA-256', bytes);
      return Array.from(new Uint8Array(digest)).map((b) => b.toString(16).padStart(2, '0')).join('');
    };
    const compactCode = (value) => String(value || '').trim();
    const addCodesFromObject = (targetSet, obj) => {
      if (!obj || typeof obj !== 'object' || obj.__readError) return;
      Object.keys(obj).forEach((key) => {
        const code = compactCode(key);
        if (code) targetSet.add(code);
      });
    };
    const pick = (obj, keys) => {
      const source = obj && typeof obj === 'object' ? obj : {};
      for (const key of keys) {
        const value = source[key];
        if (value !== undefined && value !== null && String(value).trim() !== '') return String(value).trim();
      }
      return '';
    };
    const normalizeDigits = (value) => String(value || '').replace(/\D/g, '');
    const isDeletedLike = (obj) => {
      const text = [obj?.status, obj?.approvalResult, obj?.result, obj?.joinStatus, obj?.승인결과]
        .map((v) => String(v || '').toLowerCase())
        .join(' ');
      return text.includes('deleted') || text.includes('delete') || text.includes('withdraw') ||
        text.includes('blocked') || text.includes('삭제') || text.includes('탈퇴') || text.includes('차단');
    };
    const makeMemberText = (code, obj, extra = '') => {
      const name = pick(obj, ['name','loginName','nameKey','memberName','userName','displayName']);
      const phone = pick(obj, ['phone','phoneDigits','phoneNumber','tel','contact']);
      return `${code}${name ? ' / ' + name : ''}${phone ? ' / ' + phone : ''}${extra ? ' / ' + extra : ''}`;
    };

    const paths = {
      membersMain: `${MANAGE_MEMBERS_ROOT}/members`,
      pendingMain: `${MANAGE_MEMBERS_ROOT}/pending`,
      membersLegacySecure: 'busSeatApp/membership/members',
      pendingLegacySecure: 'busSeatApp/membership/pending',
      membersLegacy: 'membership/members',
      pendingLegacy: 'membership/pending',
      membersRoot: 'members',
      pendingRoot: 'pending',
      membersBusSeat: 'busSeatApp/members',
      pendingBusSeat: 'busSeatApp/pending',
      joinCodes: MANAGE_JOIN_CODES_PATH,
      deletedJoinCodes: MANAGE_DELETED_JOIN_CODES_PATH
    };
    const entries = await Promise.all(Object.entries(paths).map(async ([key, path]) => [key, path, await readObj(path)]));
    const data = Object.fromEntries(entries.map(([key, path, value]) => [key, value]));
    const readErrors = entries.filter(([key, path, value]) => value && value.__readError).map(([key, path, value]) => `${path}: ${value.__readError}`);

    const validMemberCodes = new Set();
    ['membersMain','membersLegacySecure','membersLegacy','membersRoot','membersBusSeat'].forEach((key) => addCodesFromObject(validMemberCodes, data[key]));
    const pendingCodes = new Set();
    ['pendingMain','pendingLegacySecure','pendingLegacy','pendingRoot','pendingBusSeat'].forEach((key) => addCodesFromObject(pendingCodes, data[key]));

    const joinCodes = data.joinCodes && !data.joinCodes.__readError ? data.joinCodes : {};
    const deletedJoinCodes = data.deletedJoinCodes && !data.deletedJoinCodes.__readError ? data.deletedJoinCodes : {};
    const orphanCodes = Object.keys(joinCodes || {})
      .map(compactCode)
      .filter((code) => code && !validMemberCodes.has(code) && !pendingCodes.has(code));

    if (!orphanCodes.length) {
      alert('복구할 고아 joinCodes가 없습니다.');
      return;
    }

    const preview = orphanCodes.slice(0, 20).map((code, i) => `${i + 1}. ${makeMemberText(code, joinCodes[code])}`).join('\n');
    const input = prompt(
      '복구할 고아코드를 입력하세요.\n\n' +
      '여러 명은 쉼표 또는 줄바꿈으로 구분합니다.\n' +
      '전체 복구는 all 을 입력하세요.\n\n' +
      `검색된 고아코드: ${orphanCodes.length}건\n${preview}${orphanCodes.length > 20 ? '\n...외 ' + (orphanCodes.length - 20) + '건' : ''}`
    );
    if (input === null) return;
    const rawInput = String(input || '').trim();
    if (!rawInput) {
      alert('복구할 회원코드를 입력하지 않아 실행하지 않았습니다.');
      return;
    }
    let targetCodes = [];
    if (/^(all|전체)$/i.test(rawInput)) {
      const okAll = confirm(`고아코드 ${orphanCodes.length}건 전체를 복구할까요?\n\n삭제/탈퇴/차단 기록으로 보이는 코드는 자동 제외합니다.`);
      if (!okAll) return;
      targetCodes = orphanCodes;
    } else {
      const orphanSet = new Set(orphanCodes);
      targetCodes = rawInput.split(/[\s,，、]+/).map(compactCode).filter(Boolean).filter((code, idx, arr) => arr.indexOf(code) === idx);
      const notFound = targetCodes.filter((code) => !orphanSet.has(code));

        alert('입력한 코드 중 현재 고아 joinCodes 목록에 없는 코드가 있습니다.\n\n' + notFound.join(', '));
        return;
      }
    }

    const updates = {};
    const restored = [];
    const skipped = [];
    const now = Date.now();

    for (const code of targetCodes) {
      const source = joinCodes[code] || {};
      if (!source || typeof source !== 'object') {
        skipped.push(`${code} / joinCodes 자료 형식 오류`);
        continue;

      if (isDeletedLike(source) || deletedJoinCodes[code]) {

      }
      const defaultPassword = `${last4}0`;
      const passwordHash = await hashText(defaultPassword);
      const nameKey = makeManageNameKey(name);
      const member = {

        phone: phoneRaw || source.phone || source.phoneDigits || '',
        phoneDigits: phoneDigits || source.phoneDigits || '',
        phoneLast4: last4,
        passwordHash,
        approved: true,
        status: 'active',
        role: source.adminAccess ? 'admin' : (source.role || 'member'),
        adminAccess: !!source.adminAccess,
        apps: source.apps || { busSeat: true, tripSchedule: true, memberList: !!source.adminAccess, busRute: true },
        orphanRepairedAt: now,

      };

    const finalOk = confirm(

      restored.slice(0, 20).map((v, i) => `${i + 1}. ${v}`).join('\n'),

      skipped.length ? '\n제외 대상:\n' + skipped.slice(0, 12).map((v, i) => `${i + 1}. ${v}`).join('\n') : '',
      skipped.length > 12 ? `...외 ${skipped.length - 12}건` : '',

      return;
    }

    const actualByCode = {};
    const mergeActual = (code, record) => {
      const key = compactCode(code || record?.code);
      if (!key || !isObject(record)) return;
      const previous = actualByCode[key] || {};
      actualByCode[key] = { ...previous, ...record, code: key };
    };
    Object.keys(joinCodes || {}).forEach((code) => mergeActual(code, joinCodes[code]));
    Object.keys(membersMain || {}).forEach((code) => mergeActual(code, membersMain[code]));

    const updates = {};
    const movedLoginIndex = [];
    const movedNameIndex = [];
    const orphanLoginIndex = [];
    const orphanNameIndex = [];
    const skippedNoName = [];

    alert('인덱스 정리 진행중...\n2/4 loginIndex 검사중');

    if (isObject(loginIndex)) {
      Object.keys(loginIndex).forEach((nameKey) => {
        const branch = loginIndex[nameKey];
        if (!isObject(branch)) return;
        Object.keys(branch).forEach((code) => {
          const key = compactCode(code);
          if (!key) return;
          const record = isObject(branch[code]) ? branch[code] : {};
          const actual = actualByCode[key];
          if (!actual) {
            orphanLoginIndex.push(`${nameKey} / ${key}`);
            return;
          }
          const actualName = getMemberName(actual) || getMemberName(record);
          if (!actualName) {
            skippedNoName.push(`loginIndex: ${nameKey} / ${key}`);
            return;
          }
          const correctNameKey = makeManageNameKey(actualName);
          if (!correctNameKey) return;
          const currentNameKey = String(nameKey || '').trim();
          const shouldMove = currentNameKey !== correctNameKey || getMemberName(record) !== actualName || String(record.code || key).trim() !== key;
          if (shouldMove) {
            const fixedMember = {
              ...actual,
              ...record,
              code: key,
              name: actualName,
              passwordHash: String(record.passwordHash || actual.passwordHash || '')
            };
            updates[`${MANAGE_MEMBERS_ROOT}/loginIndex/${currentNameKey}/${key}`] = null;
            updates[`${MANAGE_MEMBERS_ROOT}/loginIndex/${correctNameKey}/${key}`] = makeManageMemberLoginIndexRecord(fixedMember);
            movedLoginIndex.push(makeReportLine('loginIndex', currentNameKey, correctNameKey, key, actualName));
          }
        });
      });
    }

    alert('인덱스 정리 진행중...\n3/4 nameIndex 검사중');

    if (isObject(nameIndex)) {
      Object.keys(nameIndex).forEach((nameKey) => {
        const branch = nameIndex[nameKey];
        if (!isObject(branch)) return;
        Object.keys(branch).forEach((code) => {
          const key = compactCode(code);
          if (!key) return;
          const actual = actualByCode[key];
          if (!actual) {
            orphanNameIndex.push(`${nameKey} / ${key}`);
            return;
          }
          const actualName = getMemberName(actual);
          if (!actualName) {
            skippedNoName.push(`nameIndex: ${nameKey} / ${key}`);
            return;
          }
          const correctNameKey = makeManageNameKey(actualName);
          if (!correctNameKey) return;
          const currentNameKey = String(nameKey || '').trim();
          if (currentNameKey !== correctNameKey || branch[code] !== true) {
            updates[`${MANAGE_MEMBERS_ROOT}/nameIndex/${currentNameKey}/${key}`] = null;
            updates[`${MANAGE_MEMBERS_ROOT}/nameIndex/${correctNameKey}/${key}`] = true;
            movedNameIndex.push(makeReportLine('nameIndex', currentNameKey, correctNameKey, key, actualName));
          }
        });
      });
    }

    const updateKeys = Object.keys(updates);
    if (!updateKeys.length) {
      alert([
        '인덱스 정리 완료',
        '',
        '정리할 오염 인덱스가 없습니다.',
        `고아 loginIndex: ${orphanLoginIndex.length}건`,
        `고아 nameIndex: ${orphanNameIndex.length}건`,
        skippedNoName.length ? `이름확인 불가: ${skippedNoName.length}건` : ''
      ].filter(Boolean).join('\n'));
      return;
    }

    const preview = [...movedLoginIndex, ...movedNameIndex].slice(0, 20).join('\n');
    const ok2 = confirm([
      '오염 인덱스를 정리할까요?',
      '',
      `loginIndex 이동/수정: ${movedLoginIndex.length}건`,
      `nameIndex 이동/수정: ${movedNameIndex.length}건`,
      `DB 업데이트 항목: ${updateKeys.length}건`,
      '',
      preview,
      movedLoginIndex.length + movedNameIndex.length > 20 ? `...외 ${movedLoginIndex.length + movedNameIndex.length - 20}건` : '',
      '',
      '※ 좌석/회원명부/비밀번호 값은 변경하지 않고 인덱스 경로만 정리합니다.'
    ].filter(Boolean).join('\n'));
    if (!ok2) {
      alert('인덱스 정리를 취소했습니다.');
      return;
    }

    alert('인덱스 정리 진행중...\n4/4 Firebase 저장중');
    try {
      await update(ref(manageDb), updates);
      alert([
        '인덱스 정리 완료',
        '',
        `loginIndex 정리: ${movedLoginIndex.length}건`,
        `nameIndex 정리: ${movedNameIndex.length}건`,
        `고아 loginIndex 참고: ${orphanLoginIndex.length}건`,
        `고아 nameIndex 참고: ${orphanNameIndex.length}건`,
        '',
        [...movedLoginIndex, ...movedNameIndex].slice(0, 20).join('\n'),
        movedLoginIndex.length + movedNameIndex.length > 20 ? `...외 ${movedLoginIndex.length + movedNameIndex.length - 20}건` : '',
        skippedNoName.length ? '\n이름 확인 불가:\n' + skippedNoName.slice(0, 10).join('\n') : ''
      ].filter(Boolean).join('\n'));
      try { await forceLoadMemberManageList(); } catch (e) {}
    } catch (error) {
      alert('인덱스 정리 실패: Firebase 저장 권한 또는 네트워크를 확인하세요.\n\n' + (error?.code || error?.message || error));
      throw error;
    }
  }

  async function cleanupOrphanMemberDb() {
    const ok = confirm(
      'DB점검을 실행할까요?\n\n' +
      '이 기능은 memberList/회원관리 DB의 고아 코드와 잘못된 인덱스를 검사만 합니다.\n' +
      '자료 삭제나 수정은 절대 실행하지 않습니다.'
    );
    if (!ok) return;

    const readObj = async (path) => {
      try {
        const snap = await get(ref(manageDb, path));
        return snap && snap.exists() ? (snap.val() || {}) : {};
      } catch (error) {
        return { __readError: error?.code || error?.message || String(error) };
      }
    };
    const compactCode = (value) => String(value || '').trim();
    const addCodesFromObject = (targetSet, obj) => {
      if (!obj || typeof obj !== 'object' || obj.__readError) return;
      Object.keys(obj).forEach((key) => {
        const code = compactCode(key);
        if (code) targetSet.add(code);
      });
    };
    const collectIndexCodes = (obj) => {
      const result = new Set();
      if (!obj || typeof obj !== 'object' || obj.__readError) return result;
      Object.keys(obj).forEach((nameKey) => {
        const branch = obj[nameKey];
        if (!branch || typeof branch !== 'object') return;
        Object.keys(branch).forEach((code) => {
          const key = compactCode(code);
          if (key) result.add(key);
        });
      });
      return result;
    };
    const isBadStatus = (member) => {
      const status = String(member?.status || member?.approvalResult || member?.result || member?.승인결과 || '').toLowerCase();
      return status.includes('delete') || status.includes('withdraw') || status.includes('blocked') ||
        status.includes('삭제') || status.includes('탈퇴') || status.includes('차단');
    };
    const makeMemberText = (code, obj) => {
      const name = obj && typeof obj === 'object' ? (obj.name || obj.nameKey || obj.memberName || obj.userName || obj.displayName || '') : '';
      const phone = obj && typeof obj === 'object' ? (obj.phone || obj.phoneNumber || obj.tel || obj.contact || '') : '';
      return `${code}${name ? ' / ' + name : ''}${phone ? ' / ' + phone : ''}`;
    };

    const paths = {
      membersMain: `${MANAGE_MEMBERS_ROOT}/members`,
      pendingMain: `${MANAGE_MEMBERS_ROOT}/pending`,
      loginIndexMain: `${MANAGE_MEMBERS_ROOT}/loginIndex`,
      nameIndexMain: `${MANAGE_MEMBERS_ROOT}/nameIndex`,
      membersLegacySecure: 'busSeatApp/membership/members',
      pendingLegacySecure: 'busSeatApp/membership/pending',
      loginIndexLegacySecure: 'busSeatApp/membership/loginIndex',
      nameIndexLegacySecure: 'busSeatApp/membership/nameIndex',
      membersLegacy: 'membership/members',
      pendingLegacy: 'membership/pending',
      loginIndexLegacy: 'membership/loginIndex',
      nameIndexLegacy: 'membership/nameIndex',
      membersRoot: 'members',
      pendingRoot: 'pending',
      loginIndexRoot: 'loginIndex',
      nameIndexRoot: 'nameIndex',
      membersBusSeat: 'busSeatApp/members',
      pendingBusSeat: 'busSeatApp/pending',
      nameIndexBusSeat: 'busSeatApp/nameIndex',
      joinCodes: MANAGE_JOIN_CODES_PATH,
      deletedJoinCodes: MANAGE_DELETED_JOIN_CODES_PATH,
      activeSessions: ACTIVE_SESSIONS_PATH
    };

    const entries = await Promise.all(Object.entries(paths).map(async ([key, path]) => [key, path, await readObj(path)]));
    const data = Object.fromEntries(entries.map(([key, path, value]) => [key, value]));
    const readErrors = entries.filter(([key, path, value]) => value && value.__readError).map(([key, path, value]) => `${path}: ${value.__readError}`);

    const validMemberCodes = new Set();
    ['membersMain','membersLegacySecure','membersLegacy','membersRoot','membersBusSeat'].forEach((key) => addCodesFromObject(validMemberCodes, data[key]));

    const pendingCodes = new Set();
    ['pendingMain','pendingLegacySecure','pendingLegacy','pendingRoot','pendingBusSeat'].forEach((key) => addCodesFromObject(pendingCodes, data[key]));

    const joinCodes = data.joinCodes && !data.joinCodes.__readError ? data.joinCodes : {};
    const deletedJoinCodes = data.deletedJoinCodes && !data.deletedJoinCodes.__readError ? data.deletedJoinCodes : {};

    const orphanJoinCodes = [];
    Object.keys(joinCodes || {}).forEach((code) => {
      const key = compactCode(code);
      if (!key) return;
      if (!validMemberCodes.has(key) && !pendingCodes.has(key)) orphanJoinCodes.push(makeMemberText(key, joinCodes[key]));
    });

    const deletedStillActiveJoinCodes = [];
    Object.keys(deletedJoinCodes || {}).forEach((code) => {
      const key = compactCode(code);
      if (!key) return;
      if (validMemberCodes.has(key)) deletedStillActiveJoinCodes.push(makeMemberText(key, deletedJoinCodes[key]));
    });

    const badStatusMembers = [];
    ['membersMain','membersLegacySecure','membersLegacy','membersRoot','membersBusSeat'].forEach((sourceKey) => {
      const obj = data[sourceKey];
      if (!obj || typeof obj !== 'object' || obj.__readError) return;
      Object.keys(obj).forEach((code) => {
        if (isBadStatus(obj[code])) badStatusMembers.push(`${sourceKey}: ${makeMemberText(code, obj[code])}`);
      });
    });

    const orphanLoginIndex = [];
    ['loginIndexMain','loginIndexLegacySecure','loginIndexLegacy','loginIndexRoot'].forEach((sourceKey) => {
      collectIndexCodes(data[sourceKey]).forEach((code) => {
        if (!validMemberCodes.has(code)) orphanLoginIndex.push(`${sourceKey}: ${code}`);
      });
    });

    const orphanNameIndex = [];
    ['nameIndexMain','nameIndexLegacySecure','nameIndexLegacy','nameIndexRoot','nameIndexBusSeat'].forEach((sourceKey) => {
      collectIndexCodes(data[sourceKey]).forEach((code) => {
        if (!validMemberCodes.has(code) && !pendingCodes.has(code)) orphanNameIndex.push(`${sourceKey}: ${code}`);
      });
    });

    const pendingOnly = [];
    pendingCodes.forEach((code) => {
      if (!validMemberCodes.has(code)) pendingOnly.push(code);
    });

    const activeSessionCodes = new Set();
    const activeSessions = data.activeSessions && !data.activeSessions.__readError ? data.activeSessions : {};
    Object.keys(activeSessions || {}).forEach((code) => activeSessionCodes.add(compactCode(code)));
    const orphanActiveSessions = [];
    activeSessionCodes.forEach((code) => {
      if (code && !validMemberCodes.has(code)) orphanActiveSessions.push(code);
    });

    const showList = (title, list, limit = 20) => {
      if (!list.length) return `${title}: 0건`;
      const body = list.slice(0, limit).map((v, i) => `  ${i + 1}. ${v}`).join('\n');
      const more = list.length > limit ? `\n  ...외 ${list.length - limit}건` : '';
      return `${title}: ${list.length}건\n${body}${more}`;
    };

    const totalIssues = orphanJoinCodes.length + deletedStillActiveJoinCodes.length + badStatusMembers.length + orphanLoginIndex.length + orphanNameIndex.length + orphanActiveSessions.length;
    const report = [
      `DB점검 완료: ${totalIssues}건의 점검 대상 발견`,
      `정상 회원코드: ${validMemberCodes.size}건`,
      `가입대기 코드: ${pendingOnly.length}건`,
      '',
      showList('고아 joinCodes(member/pending에 없음)', orphanJoinCodes),
      '',
      showList('삭제기록과 충돌하는 활성 회원코드', deletedStillActiveJoinCodes),
      '',
      showList('members 내부 삭제/탈퇴/차단 상태 잔류', badStatusMembers),
      '',
      showList('고아 loginIndex', orphanLoginIndex),
      '',
      showList('고아 nameIndex', orphanNameIndex),
      '',
      showList('고아 activeSessions', orphanActiveSessions),
      '',
      readErrors.length ? showList('읽기 실패 경로', readErrors, 10) : '읽기 실패 경로: 0건',
      '',
      '※ 이 점검은 삭제/수정 없이 읽기만 실행합니다.'
    ].join('\n');

    console.log('[회원 DB점검 결과]', report);
    alert(report);
  }


  async function forceUpdateMember(code, action) {
    const key = String(code || '').trim();
    if (!key) return;

    // 신규 보안 구조에서는 가입신청자가 members에 미리 존재하지 않고 pending에만 존재한다.
    // 따라서 승인/차단/관리자/탈퇴는 members → pending 순서로 찾고, 승인 시 pending 자료를 members로 승격한다.
    const lookupPaths = [
      { type: 'members', membersPath: `${MANAGE_MEMBERS_ROOT}/members`, pendingPath: `${MANAGE_MEMBERS_ROOT}/pending`, nameIndexPath: `${MANAGE_MEMBERS_ROOT}/nameIndex`, loginIndexPath: `${MANAGE_MEMBERS_ROOT}/loginIndex` },
      { type: 'pending', membersPath: `${MANAGE_MEMBERS_ROOT}/members`, pendingPath: `${MANAGE_MEMBERS_ROOT}/pending`, nameIndexPath: `${MANAGE_MEMBERS_ROOT}/nameIndex`, loginIndexPath: `${MANAGE_MEMBERS_ROOT}/loginIndex` },
      // 이전 파일이 잘못 저장한 가입대기 자료도 한 번 승인할 수 있도록 읽기 호환 유지. 저장은 membershipSecure로 승격한다.
      { type: 'members', membersPath: 'busSeatApp/membership/members', pendingPath: 'busSeatApp/membership/pending', nameIndexPath: 'busSeatApp/membership/nameIndex', loginIndexPath: 'busSeatApp/membership/loginIndex' },
      { type: 'pending', membersPath: 'busSeatApp/membership/members', pendingPath: 'busSeatApp/membership/pending', nameIndexPath: 'busSeatApp/membership/nameIndex', loginIndexPath: 'busSeatApp/membership/loginIndex' },
      { type: 'members', membersPath: 'membership/members', pendingPath: 'membership/pending', nameIndexPath: 'membership/nameIndex', loginIndexPath: 'membership/loginIndex' },
      { type: 'pending', membersPath: 'membership/members', pendingPath: 'membership/pending', nameIndexPath: 'membership/nameIndex', loginIndexPath: 'membership/loginIndex' },
      { type: 'members', membersPath: 'members', pendingPath: 'pending', nameIndexPath: 'nameIndex', loginIndexPath: 'loginIndex' },
      { type: 'pending', membersPath: 'members', pendingPath: 'pending', nameIndexPath: 'nameIndex', loginIndexPath: 'loginIndex' }
    ];

    let member = null;
    let source = null;
    for (const cfg of lookupPaths) {
      const path = cfg.type === 'pending' ? `${cfg.pendingPath}/${key}` : `${cfg.membersPath}/${key}`;
      const snap = await get(ref(manageDb, path)).catch(() => null);
      if (snap && snap.exists()) {
        member = snap.val() || {};
        source = cfg;
        break;
      }
    }

    if (!member) {
      member = await findMemberForDeleteFromAnyVisibleDb(key);
      if (action !== 'delete') {
        alert('해당 회원코드를 가입대기/회원 DB에서 찾지 못했습니다. 새로고침 후 다시 확인하거나 회원 JSON을 복구하세요.');
        return;
      }
    }

    code = key;
    const now = Date.now();
    const updates = {};
    const nameKeyBefore = makeManageNameKey(member.name || member.nameKey || '');
    const legacyPendingPath = source && source.pendingPath ? source.pendingPath : null;
    const legacyMembersPath = source && source.membersPath ? source.membersPath : null;
    const legacyNameIndexPath = source && source.nameIndexPath ? source.nameIndexPath : null;
    const legacyLoginIndexPath = source && source.loginIndexPath ? source.loginIndexPath : null;

    if (action === 'approve') {
      Object.assign(member, {
        code,
        approved: true,
        status: 'active',
        role: member.adminAccess ? 'admin' : 'member',
        apps: { busSeat: true, tripSchedule: true, memberList: !!member.adminAccess, busRute: true },
        approvedAt: member.approvedAt || now,
        approvedBy: 'bus-seat-admin',
        updatedAt: now
      });
      updates[`${MANAGE_MEMBERS_ROOT}/pending/${code}`] = null;
      updates[`${MANAGE_DELETED_JOIN_CODES_PATH}/${code}`] = null;
      if (legacyPendingPath && legacyPendingPath !== `${MANAGE_MEMBERS_ROOT}/pending`) updates[`${legacyPendingPath}/${code}`] = null;
    } else if (action === 'block') {
      Object.assign(member, {
        code,
        approved: false,
        status: 'blocked',
        role: 'blocked',
        adminAccess: false,
        apps: { busSeat: false, tripSchedule: false, memberList: false, busRute: false },
        updatedAt: now
      });
      updates[`${MANAGE_MEMBERS_ROOT}/pending/${code}`] = null;
      if (legacyPendingPath && legacyPendingPath !== `${MANAGE_MEMBERS_ROOT}/pending`) updates[`${legacyPendingPath}/${code}`] = null;
    } else if (action === 'toggle-admin') {
      const nextAdmin = !member.adminAccess;
      Object.assign(member, {
        code,
        approved: true,
        status: 'active',
        role: nextAdmin ? 'admin' : 'member',
        adminAccess: nextAdmin,
        apps: { busSeat: true, tripSchedule: true, memberList: nextAdmin, busRute: true },
        approvedAt: member.approvedAt || now,
        approvedBy: member.approvedBy || 'bus-seat-admin',
        updatedAt: now
      });
      updates[`${MANAGE_MEMBERS_ROOT}/pending/${code}`] = null;
      if (legacyPendingPath && legacyPendingPath !== `${MANAGE_MEMBERS_ROOT}/pending`) updates[`${legacyPendingPath}/${code}`] = null;
    } else if (action === 'withdraw') {
      Object.assign(member, {
        code,
        approved: false,
        status: 'withdrawn',
        role: 'withdrawn',
        adminAccess: false,
        passwordHash: null,
        apps: { busSeat: false, tripSchedule: false, memberList: false, busRute: false },
        withdrawnAt: now,
        withdrawnBy: 'bus-seat-admin',
        updatedAt: now
      });
      updates[`${MANAGE_MEMBERS_ROOT}/pending/${code}`] = null;
      if (legacyPendingPath && legacyPendingPath !== `${MANAGE_MEMBERS_ROOT}/pending`) updates[`${legacyPendingPath}/${code}`] = null;
    } else if (action === 'delete') {
      Object.assign(updates, makeDeleteUpdatesForMemberEverywhere(code, member));
      await update(ref(manageDb), updates);
      await removeManageMemberFromMemberListMain(code, member).catch((error) => {
        console.warn('멤버리스트 표 행 삭제 실패:', error);
      });
      alert(`${member.name || code} / ${code} 회원자료를 모든 회원 DB에서 삭제했습니다.
같은 이름/전화번호로 재가입할 수 있습니다.`);
      await forceLoadMemberManageList();
      return;
    }

    const nameKey = makeManageNameKey(member.name || member.nameKey || '');
    const lowerNameKey = String(nameKey || '').toLowerCase();
    const loginNameKeys = Array.from(new Set([nameKey, lowerNameKey].filter(Boolean)));
    updates[`${MANAGE_MEMBERS_ROOT}/members/${code}`] = member;
    loginNameKeys.forEach((key) => {
      updates[`${MANAGE_MEMBERS_ROOT}/nameIndex/${key}/${code}`] = (member.status === 'active' && member.approved) ? true : null;
    });

    // 기존 잘못 저장된 members/nameIndex/loginIndex는 보안 경로로 승격한 뒤 삭제한다.
    if (legacyMembersPath && legacyMembersPath !== `${MANAGE_MEMBERS_ROOT}/members`) updates[`${legacyMembersPath}/${code}`] = null;
    if (legacyNameIndexPath && legacyNameIndexPath !== `${MANAGE_MEMBERS_ROOT}/nameIndex`) {
      if (nameKeyBefore) updates[`${legacyNameIndexPath}/${nameKeyBefore}/${code}`] = null;
      if (nameKey) updates[`${legacyNameIndexPath}/${nameKey}/${code}`] = null;
    }
    if (legacyLoginIndexPath && legacyLoginIndexPath !== `${MANAGE_MEMBERS_ROOT}/loginIndex`) {
      if (nameKeyBefore) updates[`${legacyLoginIndexPath}/${nameKeyBefore}/${code}`] = null;
      if (nameKey) updates[`${legacyLoginIndexPath}/${nameKey}/${code}`] = null;
    }

    const loginIndexRecord = makeManageMemberLoginIndexRecord(member);
    loginNameKeys.forEach((key) => {
      const loginIndexPath = `${MANAGE_MEMBERS_ROOT}/loginIndex/${key}/${code}`;
      if (member.status === 'active' && member.approved && member.passwordHash) {
        updates[loginIndexPath] = loginIndexRecord;
      } else {
        updates[loginIndexPath] = null;
      }
    });

    await update(ref(manageDb), updates);
    await mirrorJoinCode(member);
    await mergeManageMemberIntoMemberListMain(member);
    await forceLoadMemberManageList();
  }

  window.__loadMembershipApprovalMembers = forceLoadMemberManageList;

  // 복구 파일 선택 후 실제 복구가 실행되도록 change 이벤트를 명시적으로 연결한다.
